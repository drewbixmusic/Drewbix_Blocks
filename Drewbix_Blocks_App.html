<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>◈ Flow Builder</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg0: #080810; --bg1: #0d0d1a; --bg2: #111122; --bg3: #1a1a2e;
    --border: #1e1e3a; --text: #e2e8f0; --muted: #475569; --dim: #334155;
    --cyan: #00d4ff; --orange: #ff6b35; --purple: #a855f7;
    --green: #10b981; --amber: #f59e0b; --red: #ef4444; --indigo: #6366f1;
    --radius: 7px; --font: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
  }
  html, body { height: 100%; overflow: hidden; background: var(--bg0); color: var(--text); font-family: var(--font); font-size: 13px; }

  /* ── Scrollbars ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg1); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100vh; }
  #topbar { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--bg1); border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 200; flex-wrap: wrap; }
  #logo { font-size: 16px; font-weight: 700; color: var(--cyan); letter-spacing: 2px; white-space: nowrap; }
  #flow-name { background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--text); padding: 4px 8px; font-family: var(--font); font-size: 12px; width: 150px; outline: none; }
  #flow-name:focus { border-color: var(--cyan); }
  .tb-btn { background: transparent; border: 1px solid transparent; color: var(--muted); border-radius: 4px; padding: 5px 10px; font-family: var(--font); font-size: 11px; cursor: pointer; white-space: nowrap; transition: all 0.15s; display: flex; align-items: center; gap: 5px; }
  .tb-btn:hover, .tb-btn.active { border-color: currentColor; opacity: 1; }
  .tb-btn.cyan { color: var(--cyan); }
  .tb-btn.green { color: var(--green); }
  .tb-btn.purple { color: var(--purple); }
  .tb-btn.amber { color: var(--amber); }
  .tb-btn.red { color: var(--red); }
  .tb-btn.indigo { color: var(--indigo); }
  #tb-spacer { flex: 1; }
  #zoom-label { font-size: 10px; color: var(--dim); white-space: nowrap; }

  #body { display: flex; flex: 1; overflow: hidden; position: relative; }

  /* ── Sidebar ── */
  #sidebar { width: 220px; background: var(--bg1); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: transform 0.25s; z-index: 150; }
  #sidebar.hidden { transform: translateX(-100%); position: absolute; top: 0; bottom: 0; left: 0; }
  .tab-bar { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab-btn { flex: 1; padding: 8px 4px; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--muted); cursor: pointer; font-family: var(--font); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; transition: all 0.15s; }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .sidebar-scroll { flex: 1; overflow-y: auto; }
  .cat-header { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; padding: 8px 12px 3px; opacity: 0.6; }
  .mod-item { display: flex; align-items: center; gap: 8px; padding: 6px 12px; cursor: grab; border-left: 3px solid transparent; transition: all 0.12s; user-select: none; }
  .mod-item:active { cursor: grabbing; }
  .mod-item:hover { border-left-color: var(--item-color, #fff); background: color-mix(in srgb, var(--item-color, #fff) 10%, transparent); }
  .mod-icon { font-size: 14px; flex-shrink: 0; }
  .mod-label { font-size: 12px; color: var(--text); }
  .mod-desc { font-size: 9px; color: var(--muted); }
  .sidebar-hint { padding: 8px 12px; border-top: 1px solid var(--border); font-size: 9px; color: var(--dim); flex-shrink: 0; }

  /* Saved flows list */
  .flow-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 5px; padding: 8px 10px; margin: 6px 8px; }
  .flow-card-name { font-size: 12px; color: var(--text); margin-bottom: 3px; }
  .flow-card-meta { font-size: 10px; color: var(--muted); margin-bottom: 6px; }
  .flow-card-btns { display: flex; gap: 5px; }
  .mini-btn { flex: 1; background: transparent; border-radius: 3px; padding: 3px 0; font-family: var(--font); font-size: 10px; cursor: pointer; border: 1px solid transparent; transition: all 0.12s; }
  .mini-btn:hover { opacity: 0.85; }
  .empty-state-side { color: var(--dim); font-size: 11px; text-align: center; padding: 24px 16px; }

  /* Credentials panel */
  .cred-section { padding: 8px 10px; }
  .cred-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 5px; padding: 8px 10px; margin-bottom: 8px; position: relative; }
  .cred-card.active-acct { border-color: var(--green); }
  .cred-card-head { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .cred-acct-name { font-size: 12px; color: var(--text); flex: 1; background: transparent; border: none; font-family: var(--font); outline: none; }
  .cred-acct-name:focus { color: var(--cyan); }
  .cred-env { font-size: 9px; border-radius: 3px; padding: 1px 6px; }
  .cred-env.paper { background: var(--amber)22; color: var(--amber); border: 1px solid var(--amber)44; }
  .cred-env.live { background: var(--red)22; color: var(--red); border: 1px solid var(--red)44; }
  .cred-field { margin-bottom: 6px; }
  .cred-label { font-size: 9px; color: var(--muted); display: block; margin-bottom: 2px; letter-spacing: 1px; text-transform: uppercase; }
  .cred-input { width: 100%; background: var(--bg0); border: 1px solid var(--border); border-radius: 3px; color: var(--text); padding: 4px 7px; font-family: var(--font); font-size: 10px; outline: none; }
  .cred-input:focus { border-color: var(--cyan); }
  .cred-input.secret { -webkit-text-security: disc; letter-spacing: 2px; }
  .cred-actions { display: flex; gap: 5px; margin-top: 6px; }
  .cycle-bar { background: var(--bg2); border: 1px solid var(--border); border-radius: 5px; padding: 8px 10px; margin-bottom: 8px; }
  .cycle-title { font-size: 10px; color: var(--cyan); margin-bottom: 6px; letter-spacing: 1px; }
  .cycle-acct-row { display: flex; align-items: center; gap: 6px; padding: 4px 0; }
  .cycle-check { accent-color: var(--cyan); width: 13px; height: 13px; cursor: pointer; }
  .cycle-acct-label { font-size: 11px; color: var(--text); flex: 1; }
  .cycle-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; }
  .cycle-controls { display: flex; gap: 5px; margin-top: 8px; align-items: center; }
  .cycle-status { font-size: 10px; color: var(--muted); }
  .cycle-active-label { font-size: 10px; padding: 2px 8px; border-radius: 3px; background: var(--green)22; color: var(--green); border: 1px solid var(--green)44; }

  /* ── Canvas ── */
  #canvas-wrap { flex: 1; position: relative; overflow: hidden; background: var(--bg0); touch-action: none; }
  #canvas-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }
  #edges-group path.edge-hit { pointer-events: stroke; cursor: pointer; }
  #edges-group path.edge-hit:hover ~ path.edge-vis { stroke: #ef4444 !important; opacity: 1 !important; }
  #canvas-nodes { position: absolute; inset: 0; transform-origin: 0 0; }
  #canvas-empty { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; gap: 6px; }
  #canvas-empty .em-icon { font-size: 48px; opacity: 0.07; }
  #canvas-empty .em-text { font-size: 12px; color: var(--border); letter-spacing: 2px; text-transform: uppercase; }
  #canvas-empty .em-sub { font-size: 10px; color: var(--bg3); }

  /* ── Nodes ── */
  .flow-node { position: absolute; border-radius: var(--radius); border: 1px solid var(--node-color, #fff); background: var(--bg1); cursor: grab; user-select: none; }
  .flow-node:active { cursor: grabbing; }
  .flow-node.selected { box-shadow: 0 0 22px color-mix(in srgb, var(--node-color, #fff) 40%, transparent); z-index: 10; }
  .node-header { border-radius: calc(var(--radius) - 1px) calc(var(--radius) - 1px) 0 0; padding: 6px 8px; display: flex; align-items: center; gap: 6px; height: 34px; }
  .node-icon { font-size: 13px; }
  .node-label-wrap { display: flex; flex-direction: column; flex: 1; min-width: 0; overflow: hidden; }
  .node-user-label { font-size: 9px; letter-spacing: 1px; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 700; }
  .node-label { font-size: 11px; font-weight: 600; color: var(--node-color, #fff); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .node-del { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; padding: 0 2px; transition: color 0.1s; }
  .node-del:hover { color: var(--red); }
  .node-ports { position: relative; }
  .port-row { position: absolute; display: flex; align-items: center; gap: 0; }
  .port-row.out { right: 0; flex-direction: row-reverse; }
  .port-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--bg1); border: 2px solid color-mix(in srgb, var(--node-color, #fff) 55%, transparent); cursor: crosshair; transition: all 0.12s; flex-shrink: 0; }
  .port-dot:hover, .port-dot.hover { background: var(--node-color, #fff); transform: scale(1.5); }
  .port-row.out .port-dot { margin-right: -5px; }
  .port-row.in .port-dot { margin-left: -5px; }
  .port-label { font-size: 8px; color: var(--muted); }
  .port-row.out .port-label { margin-right: 5px; }
  .port-row.in .port-label { margin-left: 5px; }

  /* ── Inspector ── */
  #inspector { width: 250px; background: var(--bg1); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; transition: transform 0.25s; z-index: 150; }
  #inspector.hidden { transform: translateX(100%); position: absolute; top: 0; right: 0; bottom: 0; }
  .insp-header { padding: 12px 12px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .insp-icon { font-size: 16px; }
  .insp-name { font-size: 13px; font-weight: 600; }
  .insp-id { font-size: 9px; color: var(--muted); }
  .insp-section { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .insp-section-title { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .field-group { margin-bottom: 12px; }
  .field-label { font-size: 10px; color: var(--dim); display: block; margin-bottom: 4px; }
  .field-input { width: 100%; background: var(--bg0); border: 1px solid var(--border); border-radius: 3px; color: var(--text); padding: 5px 7px; font-family: var(--font); font-size: 11px; outline: none; }
  .field-input:focus { border-color: var(--cyan); }
  .field-select { width: 100%; background: var(--bg0); border: 1px solid var(--border); border-radius: 3px; color: var(--text); padding: 5px 7px; font-family: var(--font); font-size: 11px; outline: none; cursor: pointer; }
  .field-select:focus { border-color: var(--cyan); }
  .multi-chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip { border-radius: 3px; padding: 3px 8px; font-size: 10px; cursor: pointer; transition: all 0.1s; border: 1px solid var(--border); color: var(--muted); background: transparent; font-family: var(--font); }
  .chip.on { border-color: var(--node-color, #fff); color: var(--node-color, #fff); background: color-mix(in srgb, var(--node-color, #fff) 15%, transparent); }
  .cond-row { display: flex; gap: 4px; align-items: center; margin-bottom: 5px; }
  .cond-row select, .cond-row input { flex: 1; min-width: 0; background: var(--bg0); border: 1px solid var(--border); border-radius: 3px; color: var(--text); padding: 4px 5px; font-family: var(--font); font-size: 10px; outline: none; }
  .cond-row select:focus, .cond-row input:focus { border-color: var(--cyan); }
  .cond-del { background: transparent; border: none; color: var(--dim); cursor: pointer; font-size: 15px; line-height: 1; flex-shrink: 0; padding: 0 2px; }
  .cond-del:hover { color: var(--red); }
  .cond-add { width: 100%; background: transparent; border: 1px dashed var(--border); border-radius: 3px; color: var(--muted); padding: 3px 0; font-family: var(--font); font-size: 10px; cursor: pointer; margin-top: 2px; transition: all 0.12s; }
  .cond-add:hover { border-color: var(--cyan); color: var(--cyan); }
  .bool-row { display: flex; gap: 6px; }
  .bool-btn { flex: 1; padding: 4px 0; border-radius: 3px; font-size: 11px; cursor: pointer; border: 1px solid var(--border); color: var(--muted); background: transparent; font-family: var(--font); transition: all 0.1s; }
  .bool-btn.on { border-color: var(--node-color, #fff); color: var(--node-color, #fff); background: color-mix(in srgb, var(--node-color, #fff) 15%, transparent); }
  .port-list-item { font-size: 10px; color: var(--muted); padding: 2px 0; }
  .conn-row { display: flex; align-items: center; gap: 6px; font-size: 10px; padding: 3px 0; }
  .conn-del { background: transparent; border: none; color: var(--dim); cursor: pointer; font-size: 14px; margin-left: auto; }
  .conn-del:hover { color: var(--red); }
  .no-cfg { padding: 12px; color: var(--dim); font-size: 11px; }
  .field-textarea { width: 100%; background: var(--bg0); border: 1px solid var(--border); border-radius: 3px; color: var(--text); padding: 5px 7px; font-family: var(--font); font-size: 11px; outline: none; min-height: 80px; resize: vertical; }
  .field-textarea:focus { border-color: var(--cyan); }

  /* ── Column order widget ── */
  .colorder-wrap { display: flex; flex-direction: column; gap: 3px; }
  .colorder-hint { font-size: 9px; color: var(--dim); margin-bottom: 4px; }
  .col-item { display: flex; align-items: center; gap: 6px; padding: 5px 6px; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; cursor: grab; user-select: none; transition: background 0.1s; }
  .col-item:active { cursor: grabbing; }
  .col-item.drag-over { border-color: var(--cyan); background: var(--bg3); }
  .col-item.dragging  { opacity: 0.4; }
  .col-drag-handle { color: var(--dim); font-size: 11px; flex-shrink: 0; }
  .col-check { accent-color: var(--cyan); width: 13px; height: 13px; cursor: pointer; flex-shrink: 0; }
  .col-name  { font-size: 10px; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .colorder-actions { display: flex; gap: 4px; margin-top: 5px; }
  .colorder-btn { flex: 1; background: transparent; border: 1px solid var(--border); border-radius: 3px; color: var(--muted); padding: 3px 0; font-family: var(--font); font-size: 9px; cursor: pointer; transition: all 0.1s; }
  .colorder-btn:hover { border-color: var(--cyan); color: var(--cyan); }
  .colorder-empty { font-size: 10px; color: var(--dim); padding: 6px 0; }

  /* ── Status bar ── */
  #statusbar { display: flex; gap: 14px; padding: 3px 12px; background: var(--bg0); border-top: 1px solid var(--border); font-size: 9px; color: var(--dim); flex-shrink: 0; overflow-x: auto; white-space: nowrap; }
  #status-connect { color: var(--cyan); }

  /* ── Mobile overlay ── */
  #mobile-menu-btn { display: none; background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--muted); padding: 5px 8px; cursor: pointer; font-size: 14px; }
  #insp-toggle-btn { display: none; background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--muted); padding: 5px 8px; cursor: pointer; font-size: 14px; }
  .overlay-backdrop { display: none; position: fixed; inset: 0; background: #00000088; z-index: 140; }
  .overlay-backdrop.show { display: block; }

  /* ── Modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: #000000aa; z-index: 500; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--bg1); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; max-width: 420px; width: 90%; max-height: 80vh; overflow-y: auto; }
  .modal-title { font-size: 14px; color: var(--cyan); margin-bottom: 14px; font-weight: 600; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .modal-btn { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 4px; font-family: var(--font); font-size: 12px; cursor: pointer; transition: all 0.12s; }
  .modal-btn.primary { border-color: var(--cyan); color: var(--cyan); }
  .modal-btn:hover { opacity: 0.8; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    #mobile-menu-btn, #insp-toggle-btn { display: flex; align-items: center; }
    #sidebar { position: absolute; top: 0; bottom: 0; left: 0; width: 240px; transform: translateX(-100%); }
    #sidebar.show { transform: translateX(0); }
    #inspector { position: absolute; top: 0; right: 0; bottom: 0; width: 260px; transform: translateX(100%); }
    #inspector.show { transform: translateX(0); }
    #flow-name { width: 110px; }
    .tb-btn span.label { display: none; }
    #statusbar .hide-mobile { display: none; }
  }

  @media (max-width: 480px) {
    #flow-name { width: 90px; }
    #topbar { gap: 6px; padding: 6px 8px; }
  }

  /* ── Touch drag ghost ── */
  #drag-ghost { position: fixed; pointer-events: none; z-index: 999; opacity: 0.75; display: none; background: var(--bg1); border: 1px solid var(--cyan); border-radius: 5px; padding: 5px 10px; font-size: 11px; color: var(--cyan); }

  /* ── Run status badges on canvas nodes ── */
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .node-status-badge { position: absolute; top: 4px; right: 26px; font-size: 8px; padding: 1px 5px; border-radius: 3px; pointer-events: none; }
  .node-status-badge.running { background: var(--amber)33; color: var(--amber); border: 1px solid var(--amber)55; animation: pulse 0.8s infinite; }
  .node-status-badge.done    { background: var(--green)33; color: var(--green); border: 1px solid var(--green)55; }
  .node-status-badge.error   { background: var(--red)33;   color: var(--red);   border: 1px solid var(--red)55; }

  /* ── Data Table Modal ── */
  #tbl-overlay { display:none; position:fixed; inset:0; background:#000000bb; z-index:600; align-items:center; justify-content:center; }
  #tbl-overlay.show { display:flex; }
  #tbl-modal { background:var(--bg1); border:1px solid var(--border); border-radius:var(--radius); display:flex; flex-direction:column; width:92vw; height:88vh; max-width:1400px; overflow:hidden; }
  #tbl-modal-header { display:flex; align-items:center; gap:10px; padding:8px 14px; background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0; }
  #tbl-modal-title { font-size:12px; color:var(--cyan); letter-spacing:1px; flex:1; }
  #tbl-modal-meta { font-size:10px; color:var(--muted); }
  #tbl-modal-close { background:transparent; border:none; color:var(--muted); cursor:pointer; font-size:20px; line-height:1; padding:0 4px; }
  #tbl-modal-close:hover { color:var(--red); }
  #tbl-controls { display:flex; align-items:center; gap:10px; padding:6px 14px; border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; }
  #tbl-controls label { font-size:10px; color:var(--muted); }
  #tbl-rpp { background:var(--bg0); border:1px solid var(--border); border-radius:3px; color:var(--text); padding:3px 6px; font-family:var(--font); font-size:10px; outline:none; cursor:pointer; }
  #tbl-page-info { font-size:10px; color:var(--muted); margin-left:auto; }
  .tbl-page-btn { background:transparent; border:1px solid var(--border); border-radius:3px; color:var(--muted); padding:2px 8px; font-family:var(--font); font-size:10px; cursor:pointer; transition:all 0.1s; }
  .tbl-page-btn:hover:not(:disabled) { border-color:var(--cyan); color:var(--cyan); }
  .tbl-page-btn:disabled { opacity:0.3; cursor:default; }
  #tbl-scroll-wrap { flex:1; overflow:auto; }
  #tbl-table { border-collapse:collapse; font-size:11px; min-width:100%; }
  #tbl-table th { position:sticky; top:0; background:var(--bg2); padding:6px 10px; text-align:left; white-space:nowrap; color:var(--muted); font-weight:600; border-bottom:1px solid var(--border); cursor:pointer; user-select:none; z-index:2; }
  #tbl-table th:hover { color:var(--text); }
  #tbl-table th .sort-arrow { margin-left:4px; opacity:0.4; font-size:9px; }
  #tbl-table th.sort-asc .sort-arrow, #tbl-table th.sort-desc .sort-arrow { opacity:1; color:var(--cyan); }
  #tbl-table td { padding:4px 10px; border-bottom:1px solid var(--border)44; white-space:nowrap; color:var(--text); }
  #tbl-table td.num { text-align:right; font-variant-numeric:tabular-nums; color:var(--cyan); }
  #tbl-table tr:hover td { background:var(--bg3); }
  #tbl-error { padding:20px; color:var(--red); font-size:12px; }
  #tbl-col-picker-wrap { flex-shrink:0; }
  #tbl-col-picker { padding:10px 14px; border-bottom:1px solid var(--border); background:var(--bg2); max-height:160px; overflow-y:auto; }
  /* run progress toast */
  #run-toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--bg1); border:1px solid var(--border); border-radius:6px; padding:8px 18px; font-size:11px; color:var(--text); z-index:700; display:none; gap:10px; align-items:center; min-width:220px; }
  #run-toast.show { display:flex; }
  #run-toast-bar-wrap { flex:1; height:3px; background:var(--border); border-radius:2px; }
  #run-toast-bar { height:100%; background:var(--cyan); border-radius:2px; width:0%; transition:width 0.2s; }
  #run-toast-msg { white-space:nowrap; }
</style>
</head>
<body>
<div id="app">
  <!-- Top bar -->
  <div id="topbar">
    <button id="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
    <div id="logo">◈ FLOW</div>
    <div style="width:1px;height:20px;background:var(--border);flex-shrink:0"></div>
    <input id="flow-name" type="text" value="My Flow" placeholder="Flow name…">
    <div id="tb-spacer"></div>
    <button class="tb-btn cyan" onclick="saveFlow()">💾 <span class="label">Save</span></button>
    <button class="tb-btn purple" onclick="saveFunction()">ƒ <span class="label">Save Flow</span></button>
    <button class="tb-btn green" onclick="exportFlow()">⬇ <span class="label">Export</span></button>
    <button class="tb-btn amber" onclick="generateCode()">⬡ <span class="label">Diagnostics</span></button>
    <button class="tb-btn amber" onclick="generateExecutableCode()">＜/＞ <span class="label">Code</span></button>
    <button class="tb-btn indigo" id="import-btn-label">⬆ <span class="label">Import</span>
      <input type="file" accept=".json" id="import-input" style="display:none" onchange="importFlow(event)">
    </button>
    <button class="tb-btn green" onclick="runFlow(false)" id="btn-run">▶ <span class="label">Run</span></button>
    <button class="tb-btn purple" onclick="runFlow(true)" id="btn-dry">⬡ <span class="label">Dry Run</span></button>
    <button class="tb-btn red" onclick="clearCanvas()">🗑 <span class="label">Clear</span></button>
    <button id="insp-toggle-btn" onclick="toggleInspector()">⚙</button>
    <span id="zoom-label">100%</span>
  </div>

  <div id="body">
    <!-- Sidebar -->
    <div id="sidebar">
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-modules" onclick="switchTab('modules')">Modules</button>
        <button class="tab-btn" id="tab-creds" onclick="switchTab('creds')">Accounts</button>
        <button class="tab-btn" id="tab-saved" onclick="switchTab('saved')">Saved</button>
        <button class="tab-btn" id="tab-funcs" onclick="switchTab('funcs')">Flows</button>
      </div>
      <div class="sidebar-scroll" id="tab-content-modules"></div>
      <div class="sidebar-scroll" id="tab-content-creds" style="display:none"></div>
      <div class="sidebar-scroll" id="tab-content-saved" style="display:none"></div>
      <div class="sidebar-scroll" id="tab-content-funcs" style="display:none"></div>
      <div class="sidebar-hint" id="sidebar-hint">Drag to canvas · Tap to add · Pinch to zoom</div>
    </div>

    <!-- Backdrop for mobile -->
    <div class="overlay-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>
    <div class="overlay-backdrop" id="insp-backdrop" onclick="closeInspector()"></div>

    <!-- Canvas -->
    <div id="canvas-wrap">
      <svg id="canvas-svg">
        <defs>
          <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="#1a1a2e" stroke-width="0.5"/></pattern>
          <pattern id="bigGrid" width="100" height="100" patternUnits="userSpaceOnUse"><rect width="100" height="100" fill="url(#smallGrid)"/><path d="M100 0L0 0 0 100" fill="none" stroke="#1e1e3a" stroke-width="1"/></pattern>
        </defs>
        <rect id="grid-bg" width="100%" height="100%" fill="url(#bigGrid)"/>
        <g id="edges-group" style="pointer-events:all"></g>
        <path id="ghost-edge" d="" stroke="var(--cyan)" stroke-width="1.5" fill="none" opacity="0.5" stroke-dasharray="4,4" style="pointer-events:none"/>
      </svg>
      <div id="canvas-nodes"></div>
      <div id="canvas-empty">
        <div class="em-icon">◈</div>
        <div class="em-text">Drag modules onto canvas</div>
        <div class="em-sub">or tap a module to add it</div>
      </div>
    </div>

    <!-- Run progress toast (replaces buggy bottom panel) -->
    <div id="run-toast">
      <span id="run-toast-msg">Running…</span>
      <div id="run-toast-bar-wrap"><div id="run-toast-bar"></div></div>
      <span id="run-toast-pct" style="font-size:10px;color:var(--muted)">0%</span>
    </div>

    <!-- Inspector -->
    <div id="inspector">
      <div style="color:var(--muted);font-size:11px;padding:20px;text-align:center" id="insp-empty">Select a node to inspect</div>
      <div id="insp-content" style="display:none"></div>
    </div>
  </div>

  <!-- Status bar -->
  <div id="statusbar">
    <span id="stat-nodes">0 nodes</span>
    <span id="stat-edges">0 edges</span>
    <span id="stat-pan" class="hide-mobile">Pan: 0,0</span>
    <span id="stat-zoom" class="hide-mobile">Zoom: 100%</span>
    <span id="status-connect" style="display:none"></span>
    <span style="margin-left:auto" class="hide-mobile">Click edge to delete · Scroll/pinch to zoom · Alt+drag to pan</span>
  </div>
</div>

<!-- Drag ghost -->
<div id="drag-ghost"></div>

<!-- Data Table Modal -->
<div id="tbl-overlay" onclick="tblOverlayClick(event)">
  <div id="tbl-modal">
    <div id="tbl-modal-header">
      <span id="tbl-modal-title">◈ RESULTS</span>
      <span id="tbl-modal-meta"></span>
      <button id="tbl-modal-close" onclick="closeTblModal()">×</button>
    </div>
    <div id="tbl-controls">
      <label>Rows per page:</label>
      <select id="tbl-rpp" onchange="tblSetRpp(Number(this.value))">
        <option value="100">100</option>
        <option value="250">250</option>
        <option value="500">500</option>
        <option value="1000" selected>1000</option>
        <option value="5000">5000</option>
      </select>
      <button class="tbl-page-btn" onclick="tblToggleColPicker()" id="tbl-cols-btn">⊞ Columns</button>
      <button class="tbl-page-btn" id="tbl-prev" onclick="tblPage(-1)">◀ Prev</button>
      <button class="tbl-page-btn" id="tbl-next" onclick="tblPage(1)">Next ▶</button>
      <span id="tbl-page-info">—</span>
    </div>
    <div id="tbl-col-picker-wrap"></div>
    <div id="tbl-scroll-wrap">
      <table id="tbl-table"><tbody></tbody></table>
      <div id="tbl-error" style="display:none"></div>
    </div>
  </div>
</div>

<!-- Chart Modal -->
<div id="chart-modal-overlay" style="display:none;position:fixed;inset:0;background:#000000cc;z-index:3000;display:none;flex-direction:column">
  <div id="chart-modal" style="display:flex;flex-direction:column;background:#0d0d1a;border:1px solid #1e1e3a;border-radius:8px;margin:20px;flex:1;overflow:hidden;max-height:calc(100vh - 40px)">
    <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid #1e1e3a;flex-shrink:0">
      <span id="chart-modal-title" style="color:#06b6d4;font-size:12px;font-weight:700;letter-spacing:1px;flex:1">◈ CHART</span>
      <button onclick="closeChartModal()" style="background:transparent;border:none;color:#475569;font-size:16px;cursor:pointer;padding:0 4px">×</button>
    </div>
    <div style="flex:1;overflow:hidden;padding:10px;position:relative">
      <canvas id="chart-canvas" style="width:100%;height:100%;display:block"></canvas>
    </div>
  </div>
</div>

<!-- Chart Grid Modal -->
<div id="chart-grid-overlay" style="display:none;position:fixed;inset:0;background:#000000cc;z-index:3000;flex-direction:column">
  <div style="display:flex;flex-direction:column;background:#0d0d1a;border:1px solid #1e1e3a;border-radius:8px;margin:20px;flex:1;overflow:hidden;max-height:calc(100vh - 40px)">
    <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid #1e1e3a;flex-shrink:0">
      <span id="chart-grid-title" style="color:#06b6d4;font-size:12px;font-weight:700;letter-spacing:1px;flex:1">⊞ CHART GRID</span>
      <button onclick="closeChartGrid()" style="background:transparent;border:none;color:#475569;font-size:16px;cursor:pointer;padding:0 4px">×</button>
    </div>
    <div id="chart-grid-body" style="flex:1;overflow-y:auto;padding:10px;display:grid;gap:8px"></div>
  </div>
</div>

<!-- Import label click passthrough -->
<script>document.getElementById('import-btn-label').addEventListener('click', e => { if(e.target === document.getElementById('import-btn-label') || e.target.tagName === 'SPAN') document.getElementById('import-input').click(); });</script>

// ═══════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════
let nodes = [], edges = [], configs = {}, nodeIdCounter = 1;
let functions = {}; // { name: { name, nodes, edges, configs, viewport, created } }
let pan = {x:0,y:0}, zoom = 1;
let dragging = null, connecting = null, panning = null;
let selectedId = null;
let touchStartDist = null, touchStartZoom = 1;
let savedFlows = [];
// Credentials & accounts
let accounts = []; // [{id,name,env,key,secret,cycleEnabled}]
let activeAccountId = null;
let cycleIndex = 0;
let cycleRunning = false;

const NODE_W = 180, NODE_H = 34, PORT_GAP = 22;

function uid() { return 'n'+(nodeIdCounter++); }
function snap(v, g=20) { return Math.round(v/g)*g; }

// ═══════════════════════════════════════════════════════════════════════
// CANVAS UTILS
// ═══════════════════════════════════════════════════════════════════════
function nodeH(node) {
  if (node.moduleId.startsWith('subflow::')) return NODE_H + 1 * PORT_GAP + 6;
  const def = MOD[node.moduleId];
  return NODE_H + Math.max(def.out.length, def.in.length) * PORT_GAP + 6;
}

function getSubflowDef(moduleId) {
  // Returns a fake MOD-like def for subflow nodes
  const name = moduleId.slice(9);
  const fn = functions[name];
  return {
    label: name,
    color: '#a855f7',
    icon: 'ƒ',
    in: ['enable', 'data'],
    out: ['data', 'status'],
    cfg: {},
    _isSubflow: true,
    _fn: fn
  };
}

function portWorldPos(node, port, type) {
  const def = node.moduleId.startsWith('subflow::') ? getSubflowDef(node.moduleId) : MOD[node.moduleId];
  const arr = type === 'out' ? def.out : def.in;
  const idx = arr.indexOf(port);
  const x = type === 'out' ? node.x + NODE_W : node.x;
  const y = node.y + NODE_H + idx * PORT_GAP + PORT_GAP/2;
  return {x, y};
}

function worldToScreen(x, y) { return { x: x*zoom + pan.x, y: y*zoom + pan.y }; }
function screenToWorld(x, y) { return { x: (x - pan.x)/zoom, y: (y - pan.y)/zoom }; }

function canvasRect() { return document.getElementById('canvas-wrap').getBoundingClientRect(); }

// ═══════════════════════════════════════════════════════════════════════
// RENDER GRID
// ═══════════════════════════════════════════════════════════════════════
function updateGrid() {
  const sg = document.getElementById('smallGrid');
  const bg = document.getElementById('bigGrid');
  const s20 = 20*zoom, s100 = 100*zoom;
  sg.setAttribute('width', s20); sg.setAttribute('height', s20);
  sg.setAttribute('patternTransform', `translate(${pan.x%s20},${pan.y%s20})`);
  bg.setAttribute('width', s100); bg.setAttribute('height', s100);
  bg.setAttribute('patternTransform', `translate(${pan.x%s100},${pan.y%s100})`);
}

// ═══════════════════════════════════════════════════════════════════════
// NODE DOM
// ═══════════════════════════════════════════════════════════════════════
function renderAllNodes() {
  const wrap = document.getElementById('canvas-nodes');
  wrap.style.transform = `translate(${pan.x}px,${pan.y}px) scale(${zoom})`;
  document.getElementById('canvas-empty').style.display = nodes.length ? 'none' : 'flex';

  // Add missing, update existing
  const existingIds = new Set([...wrap.querySelectorAll('.flow-node')].map(el => el.dataset.id));
  nodes.forEach(node => {
    if (!existingIds.has(node.id)) createNodeEl(node);
    updateNodeEl(node);
  });
  // Remove deleted
  [...wrap.querySelectorAll('.flow-node')].forEach(el => {
    if (!nodes.find(n => n.id === el.dataset.id)) el.remove();
  });

  updateStats();
}

function createNodeEl(node) {
  const def = node.moduleId.startsWith('subflow::') ? getSubflowDef(node.moduleId) : MOD[node.moduleId];
  const el = document.createElement('div');
  el.className = 'flow-node';
  el.dataset.id = node.id;
  el.style.setProperty('--node-color', def.color);

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'node-header';
  hdr.style.background = def.color+'22';
  hdr.style.borderBottom = `1px solid ${def.color}33`;
  hdr.innerHTML = `
    <span class="node-icon">${def.icon}</span>
    <span class="node-label-wrap">
      <span class="node-user-label" style="display:none;font-size:9px;color:${def.color};letter-spacing:1px;line-height:1;margin-bottom:1px"></span>
      <span class="node-label">${def.label}</span>
    </span>
    <button class="node-dbg" title="Inspect data" style="display:none;background:transparent;border:1px solid #00d4ff44;color:#00d4ff;border-radius:3px;padding:0 5px;font-size:9px;cursor:pointer;margin-right:3px;font-family:inherit">DBG</button>
    <button class="node-del" title="Delete node">×</button>`;
  hdr.querySelector('.node-dbg').addEventListener('pointerdown', e => { e.stopPropagation(); showNodeDebug(node.id); });
  hdr.querySelector('.node-del').addEventListener('pointerdown', e => { e.stopPropagation(); deleteNode(node.id); });
  el.appendChild(hdr);

  // Ports container
  const portsDiv = document.createElement('div');
  portsDiv.className = 'node-ports';
  el.appendChild(portsDiv);

  // Drag
  el.addEventListener('pointerdown', e => onNodePointerDown(e, node.id));
  document.getElementById('canvas-nodes').appendChild(el);
}

function updateNodeEl(node) {
  const def = node.moduleId.startsWith('subflow::') ? getSubflowDef(node.moduleId) : MOD[node.moduleId];
  const el = document.querySelector(`.flow-node[data-id="${node.id}"]`);
  if (!el) return;
  const h = nodeH(node);
  el.style.left = node.x + 'px';
  el.style.top = node.y + 'px';
  el.style.width = NODE_W + 'px';
  el.style.height = h + 'px';
  el.classList.toggle('selected', node.id === selectedId);
  // Update user label (shown above module type name)
  const userLabelEl = el.querySelector('.node-user-label');
  const userLabelVal = configs[node.id]?._label?.trim();
  if (userLabelEl) {
    userLabelEl.textContent = userLabelVal || '';
    userLabelEl.style.display = userLabelVal ? 'block' : 'none';
  }
  // Shrink type label font if user label present
  const nodeLabelEl = el.querySelector('.node-label');
  if (nodeLabelEl) nodeLabelEl.style.fontSize = userLabelVal ? '9px' : '';

  const portsDiv = el.querySelector('.node-ports');
  portsDiv.style.height = (h - NODE_H) + 'px';
  portsDiv.innerHTML = '';

  const allPorts = [...def.in.map((p,i)=>({p,i,type:'in'})), ...def.out.map((p,i)=>({p,i,type:'out'}))];
  allPorts.forEach(({p, i, type}) => {
    const row = document.createElement('div');
    row.className = `port-row ${type}`;
    row.style.top = (i * PORT_GAP + PORT_GAP/2 - 5) + 'px';
    if (type === 'out') { row.style.right = '0'; } else { row.style.left = '0'; }

    const isSeqPort = (p === 'enable' || p === 'status');
    const dot = document.createElement('div');
    dot.className = 'port-dot';
    if (isSeqPort) {
      dot.style.cssText = 'width:8px;height:8px;border-radius:1px;background:#94a3b8;border:1px solid #94a3b8;flex-shrink:0';
    }
    dot.dataset.port = p;
    dot.dataset.type = type;
    dot.dataset.nodeId = node.id;
    dot.addEventListener('pointerdown', e => { e.stopPropagation(); onPortPointerDown(e, node.id, p, type); });
    dot.addEventListener('pointerup', e => { e.stopPropagation(); onPortPointerUp(e, node.id, p, type); });

    const lbl = document.createElement('span');
    lbl.className = 'port-label';
    lbl.textContent = p;
    if (isSeqPort) lbl.style.color = '#94a3b8';

    if (type === 'out') { row.appendChild(lbl); row.appendChild(dot); }
    else { row.appendChild(dot); row.appendChild(lbl); }
    portsDiv.appendChild(row);
  });
}

// ═══════════════════════════════════════════════════════════════════════
// EDGES
// ═══════════════════════════════════════════════════════════════════════
function bezier(fx, fy, tx, ty) {
  const dx = Math.abs(tx - fx) * 0.55;
  return `M${fx},${fy} C${fx+dx},${fy} ${tx-dx},${ty} ${tx},${ty}`;
}

function renderEdges() {
  const g = document.getElementById('edges-group');
  g.innerHTML = '';
  edges.forEach(edge => {
    const fn = nodes.find(n=>n.id===edge.from), tn = nodes.find(n=>n.id===edge.to);
    if (!fn || !tn) return;
    const fdef = MOD[fn.moduleId];
    const fp = portWorldPos(fn, edge.fromPort, 'out');
    const tp = portWorldPos(tn, edge.toPort, 'in');
    const fsx = fp.x*zoom+pan.x, fsy = fp.y*zoom+pan.y;
    const tsx = tp.x*zoom+pan.x, tsy = tp.y*zoom+pan.y;

    const isSeqEdge = edge.toPort === 'enable' || edge.fromPort === 'status';
    const edgeColor = isSeqEdge ? '#94a3b8' : (fdef?.color || '#475569');

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', bezier(fsx,fsy,tsx,tsy));
    path.setAttribute('stroke', edgeColor);
    path.setAttribute('stroke-width', isSeqEdge ? '1' : '1.5');
    path.setAttribute('fill','none');
    path.setAttribute('opacity', isSeqEdge ? '0.5' : '0.75');
    path.setAttribute('stroke-dasharray', isSeqEdge ? '6,5' : '4,4');
    if (!isSeqEdge) {
      const a2 = document.createElementNS('http://www.w3.org/2000/svg','animate');
      a2.setAttribute('attributeName','stroke-dashoffset');
      a2.setAttribute('from','0'); a2.setAttribute('to','-16');
      a2.setAttribute('dur','1s'); a2.setAttribute('repeatCount','indefinite');
      path.appendChild(a2);
    }

    // hit target — wide invisible stroke for easy clicking, pointer-events enabled explicitly
    const hit = document.createElementNS('http://www.w3.org/2000/svg','path');
    hit.setAttribute('d', bezier(fsx,fsy,tsx,tsy));
    hit.setAttribute('stroke','transparent');
    hit.setAttribute('stroke-width','14');
    hit.setAttribute('fill','none');
    hit.style.cursor = 'pointer';
    hit.style.pointerEvents = 'stroke';
    hit.addEventListener('pointerdown', e => { e.stopPropagation(); });
    hit.addEventListener('click', e => { e.stopPropagation(); deleteEdge(edge.id); });
    // hover: turn line red
    hit.addEventListener('pointerenter', () => { visPath.setAttribute('stroke','#ef4444'); visPath.setAttribute('opacity','1'); });
    hit.addEventListener('pointerleave', () => { visPath.setAttribute('stroke', edgeColor); visPath.setAttribute('opacity', isSeqEdge ? '0.5' : '0.75'); });

    // rename path to visPath so hover handler can reference it
    const visPath = path;

    // dot at target
    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx', tsx); dot.setAttribute('cy', tsy);
    dot.setAttribute('r','3'); dot.setAttribute('fill', edgeColor);
    dot.style.pointerEvents = 'none';

    g.appendChild(visPath); g.appendChild(hit); g.appendChild(dot);
  });
}

// ═══════════════════════════════════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════════════════════════════════
function onNodePointerDown(e, id) {
  if (e.button !== 0 && e.pointerType !== 'touch') return;
  e.stopPropagation();
  const rect = canvasRect();
  const wx = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
  const node = nodes.find(n => n.id === id);
  dragging = { id, ox: wx.x - node.x, oy: wx.y - node.y };
  selectedId = id;
  renderAllNodes();
  renderInspector();
}

function onPortPointerDown(e, nodeId, port, type) {
  e.stopPropagation();
  connecting = { fromId: nodeId, fromPort: port, fromType: type };
  document.getElementById('ghost-edge').style.display = 'block';
}

function onPortPointerUp(e, nodeId, port, type) {
  if (!connecting) return;
  e.stopPropagation();
  if (connecting.fromId === nodeId) { connecting = null; hideGhost(); return; }
  let from, fromPort, to, toPort;
  if (connecting.fromType === 'out' && type === 'in') {
    from = connecting.fromId; fromPort = connecting.fromPort; to = nodeId; toPort = port;
  } else if (connecting.fromType === 'in' && type === 'out') {
    from = nodeId; fromPort = port; to = connecting.fromId; toPort = connecting.fromPort;
  } else { connecting = null; hideGhost(); return; }
  // avoid dupes
  const dup = edges.find(ed => ed.from===from && ed.fromPort===fromPort && ed.to===to && ed.toPort===toPort);
  if (!dup) {
    edges.push({ id: `${from}:${fromPort}->${to}:${toPort}`, from, fromPort, to, toPort });
  }
  connecting = null; hideGhost(); renderEdges(); updateStats(); renderInspector();
}

function hideGhost() { document.getElementById('ghost-edge').setAttribute('d',''); }

// Canvas pointer events
const canvasWrap = document.getElementById('canvas-wrap');

canvasWrap.addEventListener('pointerdown', e => {
  if (e.target === canvasWrap || e.target === document.getElementById('canvas-svg') || e.target.id === 'grid-bg') {
    if (e.altKey || e.button === 1) {
      panning = { sx: e.clientX, sy: e.clientY, px: pan.x, py: pan.y };
    } else {
      panning = { sx: e.clientX, sy: e.clientY, px: pan.x, py: pan.y };
      connecting = null; hideGhost();
    }
    selectedId = null; renderAllNodes(); renderInspector();
  }
});

canvasWrap.addEventListener('pointermove', e => {
  const rect = canvasRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;

  if (panning && !dragging) {
    pan.x = panning.px + (e.clientX - panning.sx);
    pan.y = panning.py + (e.clientY - panning.sy);
    updateGrid(); renderAllNodes(); renderEdges();
    document.getElementById('stat-pan').textContent = `Pan: ${Math.round(pan.x)},${Math.round(pan.y)}`;
  }

  if (dragging) {
    const w = screenToWorld(mx, my);
    const node = nodes.find(n => n.id === dragging.id);
    if (node) {
      node.x = snap(w.x - dragging.ox);
      node.y = snap(w.y - dragging.oy);
      renderAllNodes(); renderEdges();
    }
  }

  if (connecting) {
    const fn = nodes.find(n => n.id === connecting.fromId);
    if (fn) {
      const fp = portWorldPos(fn, connecting.fromPort, connecting.fromType);
      const fsx = fp.x*zoom+pan.x, fsy = fp.y*zoom+pan.y;
      const d = connecting.fromType === 'out'
        ? bezier(fsx,fsy,mx,my)
        : bezier(mx,my,fsx,fsy);
      document.getElementById('ghost-edge').setAttribute('d', d);
    }
    const sc = document.getElementById('status-connect');
    sc.style.display = 'inline';
    sc.textContent = `Connecting: ${connecting.fromPort} → drop on a port`;
  } else {
    document.getElementById('status-connect').style.display = 'none';
  }
});

canvasWrap.addEventListener('pointerup', e => {
  dragging = null; panning = null;
  if (connecting) { connecting = null; hideGhost(); document.getElementById('status-connect').style.display='none'; }
});

canvasWrap.addEventListener('pointerleave', () => { dragging = null; panning = null; });

// Wheel zoom
canvasWrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvasRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const newZoom = Math.max(0.2, Math.min(3, zoom * factor));
  // zoom toward mouse
  pan.x = mx - (mx - pan.x) * (newZoom/zoom);
  pan.y = my - (my - pan.y) * (newZoom/zoom);
  zoom = newZoom;
  updateGrid(); renderAllNodes(); renderEdges(); updateZoomLabel();
}, {passive:false});

// Pinch zoom (touch)
canvasWrap.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    touchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    touchStartZoom = zoom;
    e.preventDefault();
  }
}, {passive:false});

canvasWrap.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && touchStartDist) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    zoom = Math.max(0.2, Math.min(3, touchStartZoom * (d / touchStartDist)));
    updateGrid(); renderAllNodes(); renderEdges(); updateZoomLabel();
    e.preventDefault();
  }
}, {passive:false});

// Drag from palette (desktop)
canvasWrap.addEventListener('dragover', e => e.preventDefault());
canvasWrap.addEventListener('drop', e => {
  e.preventDefault();
  const moduleId = e.dataTransfer.getData('moduleId');
  if (!moduleId) return;
  const rect = canvasRect();
  const w = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
  addNode(moduleId, snap(w.x - NODE_W/2), snap(w.y - 40));
});

function updateZoomLabel() {
  const pct = Math.round(zoom*100)+'%';
  document.getElementById('zoom-label').textContent = pct;
  document.getElementById('stat-zoom').textContent = 'Zoom: '+pct;
}

function updateStats() {
  document.getElementById('stat-nodes').textContent = nodes.length + ' nodes';
  document.getElementById('stat-edges').textContent = edges.length + ' edges';
}

// ═══════════════════════════════════════════════════════════════════════
// NODE MGMT
// ═══════════════════════════════════════════════════════════════════════
function addNode(moduleId, x, y) {
  // Sub-flow nodes use moduleId like "subflow::Flow Name"
  if (moduleId.startsWith('subflow::')) {
    const sfName = moduleId.slice(9);
    if (!functions[sfName]) return;
    const id = uid();
    nodes.push({ id, moduleId, x: x??snap(100+Math.random()*200), y: y??snap(80+Math.random()*200) });
    configs[id] = { _subflowName: sfName };
    renderAllNodes(); renderEdges();
    document.getElementById('canvas-empty').style.display = 'none';
    return;
  }
  const def = MOD[moduleId];
  if (!def) return;
  const id = uid();
  nodes.push({id, moduleId, x: x??snap(100 + Math.random()*200), y: y??snap(80 + Math.random()*200)});
  configs[id] = Object.fromEntries(Object.entries(def.cfg).map(([k,v])=>[k,Array.isArray(v.d)?[...v.d]:v.d]));
  renderAllNodes(); renderEdges();
  document.getElementById('canvas-empty').style.display = 'none';
}

function deleteNode(id) {
  nodes = nodes.filter(n => n.id !== id);
  edges = edges.filter(e => e.from !== id && e.to !== id);
  delete configs[id];
  if (selectedId === id) { selectedId = null; renderInspector(); }
  renderAllNodes(); renderEdges();
}

function deleteEdge(id) {
  edges = edges.filter(e => e.id !== id);
  renderEdges(); updateStats();
  renderInspector();
}

// ═══════════════════════════════════════════════════════════════════════
// INSPECTOR
// ═══════════════════════════════════════════════════════════════════════
function renderInspector() {
  const empty = document.getElementById('insp-empty');
  const content = document.getElementById('insp-content');
  const node = nodes.find(n => n.id === selectedId);
  if (!node) { empty.style.display='block'; content.style.display='none'; content.innerHTML=''; return; }
  const def = node.moduleId.startsWith('subflow::') ? getSubflowDef(node.moduleId) : MOD[node.moduleId];
  empty.style.display = 'none'; content.style.display = 'block';
  document.getElementById('inspector').style.setProperty('--node-color', def.color);

  let html = `
  <div class="insp-header">
    <span class="insp-icon">${def.icon}</span>
    <div><div class="insp-name" style="color:${def.color}">${def.label}</div><div class="insp-id">${node.id}</div></div>
  </div>`;

  if (node.moduleId.startsWith('subflow::')) {
    const sfName = node.moduleId.slice(9);
    const fn = functions[sfName];
    html += `<div class="insp-section">
      <div class="insp-section-title">Sub-Flow</div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:4px">${escH(sfName)}</div>
      <div style="font-size:9px;color:var(--dim)">${fn?.nodes?.length||0} nodes · ${fn?.edges?.length||0} edges</div>
      <div style="font-size:9px;color:var(--dim);margin-top:6px">Inputs: data in → data out. Receives parent data on entry nodes, returns last node output.</div>
    </div>`;
    content.innerHTML = html;
    return;
  }
  const cfgEntries = Object.entries(modCfg(def));
  if (cfgEntries.length) {
    html += `<div class="insp-section"><div class="insp-section-title">Configuration</div>`;
    function renderField(nodeId, key, cfg, val) {
        let f = '';
        if (cfg.t === 'sel') {
          f += `<select class="field-select" data-node="${nodeId}" data-key="${key}" onchange="updateCfg(this)">
            ${cfg.opts.map(o=>`<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('')}
          </select>`;
        } else if (cfg.t === 'dynfield') {
          if (key === 'key_field') {
            const p0Val = configs[nodeId]?.p0 || 'min';
            if (!['first','mid','last'].includes(p0Val)) return '';
          }
          const upFields = getUpstreamFields(nodeId);
          if (upFields.length) {
            f += `<select class="field-select" data-node="${nodeId}" data-key="${key}" onchange="updateCfg(this)">
              <option value="">— select field —</option>
              ${upFields.map(fd=>`<option value="${fd}" ${val===fd?'selected':''}>${fd}</option>`).join('')}
            </select>`;
          } else {
            f += `<input class="field-input" type="text" value="${escH(String(val??''))}" placeholder="Connect a node first, or type field name" data-node="${nodeId}" data-key="${key}" oninput="updateCfg(this)">
              <div style="font-size:9px;color:var(--dim);margin-top:2px">⚡ Connect upstream node to populate dropdown</div>`;
          }
        } else if (cfg.t === 'multi') {
          f += `<div class="multi-chips">`;
          const arr = Array.isArray(val) ? val : [];
          cfg.opts.forEach(o => {
            f += `<button class="chip ${arr.includes(o)?'on':''}" data-node="${nodeId}" data-key="${key}" data-val="${o}" onclick="toggleChip(this)">${o}</button>`;
          });
          f += `</div>`;
        } else if (cfg.t === 'sidechain') {
          const scEdge = edges.find(e => e.to === nodeId && e.toPort === 'sc');
          const scNode = scEdge ? nodes.find(n => n.id === scEdge.from) : null;
          const scNodeLabel = scNode ? (configs[scNode.id]?._label || MOD[scNode.moduleId]?.label || scNode.id) : null;
          const scFields = scNode ? (configs[scNode.id]?._headers || MOD[scNode.moduleId]?.out.filter(p=>p!=='data') || []) : [];
          f += `<select class="field-select" data-node="${nodeId}" data-key="${key}" onchange="updateCfg(this)">
            <option value="manual" ${val==='manual'||!val?'selected':''}>manual entry</option>
            ${scFields.map(fd => { const ov=`sc::${fd}`; return `<option value="${ov}" ${val===ov?'selected':''}>${escH(scNodeLabel)}.${escH(fd)}</option>`; }).join('')}
          </select>`;
          if (!scEdge) f += `<div style="font-size:9px;color:var(--dim);margin-top:3px">⚡ Connect a node to the <em>sc</em> port to use as comparison value</div>`;
        } else if (cfg.t === 'number' || cfg.t === 'text') {
          f += `<input class="field-input" type="${cfg.t==='number'?'number':'text'}" value="${escH(String(val??''))}" data-node="${nodeId}" data-key="${key}" oninput="updateCfg(this)">`;
        } else if (cfg.t === 'bool') {
          f += `<div class="bool-row">
            <button class="bool-btn ${val===true?'on':''}" data-node="${nodeId}" data-key="${key}" data-val="true" onclick="toggleBool(this)">True</button>
            <button class="bool-btn ${val===false?'on':''}" data-node="${nodeId}" data-key="${key}" data-val="false" onclick="toggleBool(this)">False</button>
          </div>`;
        } else if (cfg.t === 'textarea') {
          f += `<textarea class="field-input" rows="3" data-node="${nodeId}" data-key="${key}" oninput="updateCfg(this)">${escH(String(val??''))}</textarea>`;
        }
        return f;
      }

    cfgEntries.forEach(([key, cfg]) => {
      const val = configs[node.id]?.[key] ?? cfg.d;
      html += `<div class="field-group"><label class="field-label">${cfg.l}</label>`;
      // ── Clock offset source smart rendering ──
      if (node.moduleId === 'clock' && key === 'offset_src') {
        const hasConn = edges.some(e => e.toId === node.id && e.toPort === 'offset');
        // Auto-switch to input if connection just appeared and src hasn't been manually set to manual
        if (hasConn && (configs[node.id].offset_src === undefined)) {
          configs[node.id].offset_src = 'input';
        }
        const curSrc = configs[node.id]?.offset_src ?? (hasConn ? 'input' : 'manual');
        html += `<select style="width:100%;box-sizing:border-box;background:#080810;border:1px solid #1e1e3a;border-radius:3px;color:#e2e8f0;padding:4px 6px;font-family:var(--font);font-size:10px;margin-bottom:4px"
          onchange="configs['${node.id}'].offset_src=this.value;renderInspector()">
          <option value="input" ${curSrc==='input'?'selected':''}>Input${hasConn?' (connected)':' (no connection)'}</option>
          <option value="manual" ${curSrc==='manual'?'selected':''}>Manual Entry</option>
        </select>`;
        if (!hasConn && curSrc === 'input') {
          html += `<div style="font-size:8px;color:#f59e0b;margin-bottom:4px">⚠ No offset input connected — connect a node to the offset port or switch to Manual Entry.</div>`;
        }
        // Only show manual fields when src is manual (or no connection)
        if (curSrc === 'manual' || !hasConn) {
          const ov = configs[node.id]?.offset_val ?? 0;
          const ou = configs[node.id]?.offset_unit ?? 'days';
          html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">`;
          html += `<div><div style="font-size:9px;color:#475569;margin-bottom:2px">Value</div>
            <input type="number" value="${ov}" step="any"
              style="width:100%;box-sizing:border-box;background:#080810;border:1px solid #1e1e3a;border-radius:3px;color:#e2e8f0;padding:4px 6px;font-family:var(--font);font-size:10px"
              onchange="configs['${node.id}'].offset_val=Number(this.value)"></div>`;
          html += `<div><div style="font-size:9px;color:#475569;margin-bottom:2px">Unit</div>
            <select style="width:100%;box-sizing:border-box;background:#080810;border:1px solid #1e1e3a;border-radius:3px;color:#e2e8f0;padding:4px 6px;font-family:var(--font);font-size:10px"
              onchange="configs['${node.id}'].offset_unit=this.value">
              ${['minutes','hours','days','weeks','years'].map(u=>`<option value="${u}" ${ou===u?'selected':''}>${u}</option>`).join('')}
            </select></div>`;
          html += `</div>`;
          // Show computed days equivalent as hint
          const unitToDaysHint = {minutes:1/1440,hours:1/24,days:1,weeks:7,years:365};
          const computedDays = Math.round(ov * (unitToDaysHint[ou]||1) * 1e4)/1e4;
          if (computedDays !== 0) {
            html += `<div style="font-size:8px;color:#475569;margin-top:3px">≈ ${computedDays} day(s) offset</div>`;
          }
        } else {
          html += `<div style="font-size:8px;color:#94a3b8;margin-top:2px">Offset value (in days) will be read from connected input at run time.</div>`;
        }
        html += `</div>`; // close field-group
        return; // skip generic rendering for this key
      }
      // Hide the generic offset_val / offset_unit fields — rendered inline above
      if (node.moduleId === 'clock' && (key === 'offset_val' || key === 'offset_unit')) {
        html += `</div>`; // close empty field-group opened by forEach
        return;
      }

      // ── RF stored model info panel (injected after model_mode) ──
      if (node.moduleId === 'rand_forest' && key === 'model_mode') {
        html += renderField(node.id, key, cfg, val);
        // Show stored model registry info
        const modelName = configs[node.id]?.model_name || '';
        const registry = configs['__rf_models__'] || {};
        const storedNames = Object.keys(registry);
        if (storedNames.length) {
          html += `<div style="margin-top:6px;border:1px solid #1e2a1e;border-radius:4px;overflow:hidden">`;
          html += `<div style="font-size:9px;color:#84cc16;padding:4px 6px;background:#0a1a0a;font-weight:700;text-transform:uppercase;letter-spacing:0.5px">Stored Models</div>`;
          storedNames.forEach(nm => {
            const m = registry[nm];
            const isActive = nm === modelName;
            html += `<div style="padding:5px 8px;border-top:1px solid #1e2a1e;background:${isActive?'#0d1a0d':'transparent'}">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
                <span style="font-size:9px;color:${isActive?'#84cc16':'#94a3b8'};font-weight:700">${isActive?'▶ ':''}${escH(nm)}</span>
                <button onclick="rfDeleteModel('${nm}')" style="margin-left:auto;background:transparent;border:none;color:#475569;font-size:10px;cursor:pointer;padding:0 2px" title="Delete model">🗑</button>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px 8px;font-size:8px;color:#475569">
                <span>Runs: <b style="color:#94a3b8">${m.runCount||0}</b></span>
                <span>Samples: <b style="color:#94a3b8">${m.totalSamples||0}</b></span>
                <span>Trees: <b style="color:#94a3b8">${Object.values(m.trees||{}).reduce((s,a)=>{if(!Array.isArray(a))return s;if(m.kFoldMode&&a[0]?.trees)return s+a.reduce((ss,f)=>ss+(f.trees?.length??0),0);return s+a.length;},0)}</b></span>
                <span>Dep vars: <b style="color:#94a3b8">${(m.depVars||[]).length}</b></span>
                <span>Features: <b style="color:#94a3b8">${Object.keys(Object.values(m.featureRegistries||m.featureRegistry||{})[0]||{}).length}</b></span>
              </div>
            </div>`;
          });
          html += `</div>`;
        } else {
          html += `<div style="font-size:9px;color:#475569;font-style:italic;margin-top:4px">No stored models yet — run with a Model Name to create one.</div>`;
        }
        html += `</div>`;
        return;
      }
      if (cfg.t === 'sel') {
        html += renderField(node.id, key, cfg, val);
      } else if (cfg.t === 'dynfield') {
        // Hide key_field unless p0 is first/mid/last
        if (key === 'key_field') {
          const p0Val = configs[node.id]?.p0 || 'min';
          if (!['first','mid','last'].includes(p0Val)) { html += `</div>`; return; }
        }
        html += renderField(node.id, key, cfg, val);
      } else if (cfg.t === 'multi') {
        html += renderField(node.id, key, cfg, val);
      } else if (cfg.t === 'sidechain') {
        html += renderField(node.id, key, cfg, val);
      } else if (cfg.t === 'seriesrows') {
        const upFields = getUpstreamFields(node.id);
        const seriesArr = Array.isArray(val) ? val : [];
        const COLORS = ['#00d4ff','#f59e0b','#10b981','#a855f7','#ef4444','#f472b6','#6366f1','#84cc16','#ff6b35','#06b6d4'];
        const LINE_STYLES = ['off','straight','dashed','dotted','bar','segment','ray'];
        const MARKER_STYLES = ['off','o','x','+','*','-'];
        const AXES = ['pri','sec'];
        const sx = `width:100%;box-sizing:border-box;background:#080810;border:1px solid #1e1e3a;border-radius:3px;color:#e2e8f0;padding:4px 6px;font-family:var(--font);font-size:10px`;
        const lbl = (t) => `<div style="font-size:9px;color:#475569;margin-bottom:2px">${t}</div>`;
        const row1 = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px">`;
        const row3 = `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:5px">`;
        const endr = `</div>`;
        const fieldSel = (fld, placeholder, changeExpr) => upFields.length
          ? `<select style="${sx}" onchange="${changeExpr}"><option value="">${placeholder}</option>${upFields.map(f=>`<option value="${f}" ${fld===f?'selected':''}>${f}</option>`).join('')}</select>`
          : `<input type="text" placeholder="${placeholder}" value="${escH(fld||'')}" style="${sx}" onchange="${changeExpr}">`;

        html += `<div id="seriesrows-${node.id}">`;
        seriesArr.forEach((s, i) => {
          const sc = s.color || COLORS[i % COLORS.length];
          const alpha = s.line_alpha ?? s.marker_alpha ?? 80;
          html += `<div style="background:#111122;border:1px solid #1e1e3a;border-radius:5px;padding:8px;margin-bottom:8px">`;

          // ── Header: S# label + color + remove button
          html += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:7px">
            <span style="font-size:9px;color:#475569;font-weight:600;flex:0 0 auto">S${i+1}</span>
            <input type="color" value="${sc}" title="Color" style="width:22px;height:22px;border:none;background:transparent;cursor:pointer;padding:0;flex:0 0 auto" onchange="updateSeriesRow('${node.id}',${i},'color',this.value)">
            <span style="flex:1"></span>
            <button onclick="removeSeriesRow('${node.id}',${i})" title="Remove series" style="background:#1a0a0a;border:1px solid #3a1a1a;border-radius:3px;color:#ef4444;cursor:pointer;font-size:12px;padding:2px 7px;line-height:1">✕ remove</button>
          </div>`;

          // ── X / Y fields
          html += row1;
          html += `<div>${lbl('X Field')}${fieldSel(s.x_field,'x field…',`updateSeriesRow('${node.id}',${i},'x_field',this.value)`)}</div>`;
          html += `<div>${lbl('Y Field')}${fieldSel(s.y_field,'y field…',`updateSeriesRow('${node.id}',${i},'y_field',this.value)`)}</div>`;
          html += endr;

          // ── Line style / weight / axis
          html += row3;
          html += `<div>${lbl('Line Style')}<select style="${sx}" onchange="updateSeriesRow('${node.id}',${i},'line_style',this.value)">${LINE_STYLES.map(ls=>`<option value="${ls}" ${(s.line_style||'straight')===ls?'selected':''}>${ls}</option>`).join('')}</select></div>`;
          html += `<div>${lbl('Weight')}<input type="number" min="0.5" max="8" step="0.5" value="${s.line_weight||1.5}" style="${sx}" onchange="updateSeriesRow('${node.id}',${i},'line_weight',Number(this.value))"></div>`;

            html += `<div>${lbl('X2 Field')}${fieldSel(s.x2_field,'x2 field…',`updateSeriesRow('${node.id}',${i},'x2_field',this.value)`)}</div>`;
            html += `<div>${lbl('Y2 Field')}${fieldSel(s.y2_field,'y2 field…',`updateSeriesRow('${node.id}',${i},'y2_field',this.value)`)}</div>`;
            html += endr;

          }

            html += row3;

            html += `<div>${lbl('Intercept (b)')}${fieldSel(s.b_field,'b field…',`updateSeriesRow('${node.id}',${i},'b_field',this.value)`)}</div>`;

            html += endr;
