        const prices = [o, bull ? l : h, bull ? h : l, c];
        prices.forEach((price, si) => {
          rawRows.push({ symbol: sym, t_rel: barIdx + subOffsets[si], price, v: v / 4 });
        });
      });

      // ── Pass 2: apply x_ref offset to t_rel ──────────────────────────
      // Offset is the actual generated t_rel of the reference point in the time series:
      // first → open of first bar (subOffsets[0])
      // mid   → open of mid bar
      // last  → close of last bar (subOffsets[3]) — the final generated point
      const refBarIdx = xRef === 'last' ? n - 1
                      : xRef === 'mid'  ? Math.floor((n - 1) / 2)
                      : 0;
      const refSubIdx = xRef === 'last' ? 3 : 0; // close for last, open for first/mid
      const tRelOffset = refBarIdx + subOffsets[refSubIdx];
      rawRows.forEach(r => { r.t_rel = r.t_rel - tRelOffset; });

      // ── Pass 3: y_fmt — price or percent ─────────────────────────────
      // p0 = price of the reference time-series point (after t_rel shift)
      // For 'last': p0 = close of last bar. For 'first': p0 = open of first bar.
      // For 'mid':  p0 = open of mid bar.
      let p0 = null;
      if (yFmt === 'percent') {
        const refPrices = { 0: Number(sorted[refBarIdx]?.row[oF]) };
        if (xRef === 'last') {
          p0 = Number(sorted[refBarIdx]?.row[cF]); // close of last bar
        } else {
          p0 = Number(sorted[refBarIdx]?.row[oF]); // open of first/mid bar
        }
      }

      // ── Pass 4: volume scaling ────────────────────────────────────────
      const vRef = cfg.v_ref || 'raw';
      const allV = rawRows.map(r => r.v).filter(v => v !== null && !isNaN(v));
      let vMin = 0, vMax = 1, vMed = 1;
      if (allV.length) {
        vMin = Math.min(...allV);
        vMax = Math.max(...allV);
        const sv = [...allV].sort((a,b) => a-b);
        vMed = sv.length % 2 === 0
          ? (sv[sv.length/2-1] + sv[sv.length/2]) / 2
          : sv[Math.floor(sv.length/2)];
      }

      const scaleV = (v) => {
        if (v === null || isNaN(v)) return null;
        if (vRef === 'norm') return vMax === vMin ? 0 : (v - vMin) / (vMax - vMin);
        if (vRef === 'min')  return vMin === 0 ? null : v / vMin;
        if (vRef === 'max')  return vMax === 0 ? null : v / vMax;
        if (vRef === 'med')  return vMed === 0 ? null : v / vMed;
        return v; // raw
      };

      const outRows = rawRows.map(r => ({
        symbol: r.symbol,
        t_rel:  r.t_rel,
        p_rel:  yFmt === 'percent' && p0 !== null && p0 !== 0 && !isNaN(r.price)
                  ? (r.price - p0) / p0
                  : isNaN(r.price) ? null : r.price,
        v: scaleV(r.v)
      }));

      configs[node.id]._headers = ['symbol', 't_rel', 'p_rel', 'v'];
      return { data: outRows, _rows: outRows };
    }

    case 'raw_to_prel': {
      const rawPrel = inputs.data || [];
      const dataPrel = Array.isArray(rawPrel) ? rawPrel : [];
      if (!dataPrel.length) return { data: [], _rows: [] };
      const prelField = cfg.field || '';
      if (!prelField) return { data: dataPrel, _rows: dataPrel };
      const vals = dataPrel.map(row => Number(row[prelField])).filter(v => !isNaN(v));
      if (!vals.length) return { data: dataPrel, _rows: dataPrel };
      const p0Mode = cfg.p0 || 'min';
      let p0;
      if (['first','mid','last'].includes(p0Mode)) {
        // Use key field to determine position, then read value field at that row
        const keyField = cfg.key_field || '';
        if (!keyField) {
          // No key field set — fall back to row index order
          const idx = p0Mode === 'first' ? 0
            : p0Mode === 'last' ? dataPrel.length - 1
            : Math.floor(dataPrel.length / 2);
          p0 = Number(dataPrel[idx]?.[prelField]);
        } else {
          // Sort rows by key field to find first/mid/last
          const withKey = dataPrel
            .map((row, i) => ({ row, key: Number(row[keyField]), i }))
            .filter(x => !isNaN(x.key))
            .sort((a, b) => a.key - b.key);
          const ki = p0Mode === 'first' ? 0
            : p0Mode === 'last' ? withKey.length - 1
            : Math.floor(withKey.length / 2);
          p0 = Number(withKey[ki]?.row[prelField]);
        }
      } else {
        const sortedVals = [...vals].sort((a,b)=>a-b);
        const nm = sortedVals.length;
        const p0Med = nm % 2 === 0
          ? (sortedVals[nm/2-1] + sortedVals[nm/2]) / 2
          : sortedVals[Math.floor(nm/2)];
        p0 = p0Mode === 'max' ? Math.max(...vals) : p0Mode === 'med' ? p0Med : Math.min(...vals);
      }
      const out = dataPrel.map(row => {
        const raw = Number(row[prelField]);
        const prel = isNaN(raw) || isNaN(p0) || p0 === 0 ? null : (raw - p0) / p0;
        return { ...row, [`${prelField}_prel`]: prel };
      });
      if (out.length) configs[node.id]._headers = Object.keys(out[0]).filter(k => !k.startsWith('_'));
      return { data: out, _rows: out };
    }

    case 'math_add':
    case 'math_sub':
    case 'math_mul':
    case 'math_div': {
      // A comes from port 'a', B from port 'b' (or constant)
      const aRows = Array.isArray(inputs.a) ? inputs.a
                  : Array.isArray(inputs.data) ? inputs.data : [];
      const bRows = Array.isArray(inputs.b) ? inputs.b : [];
      const aField   = cfg.a_field  || '';
      const bMode    = cfg.b_mode   || 'constant';
      const bField   = cfg.b_field  || '';
      const bConst   = Number(cfg.b_const ?? (node.moduleId === 'math_mul' ? 1 : 0));
      const outField = cfg.out_field || 'result';
      if (!aField) return { data: [], _rows: [] };
      const p4 = v => Math.round(v * 1e4) / 1e4;
      const out = aRows.map((row, i) => {
        const a = Number(row[aField]);
        const b = bMode === 'field'
          ? Number((bRows[i] || bRows[0] || {})[bField])
          : bConst;
        if (isNaN(a) || isNaN(b)) return { [outField]: null };
        let result;
        if (node.moduleId === 'math_add') result = p4(a + b);
        if (node.moduleId === 'math_sub') result = p4(a - b);
        if (node.moduleId === 'math_mul') result = p4(a * b);
        if (node.moduleId === 'math_div') result = b !== 0 ? p4(a / b) : null;
        return { [outField]: result };
      });
      if (out.length) configs[node.id]._headers = Object.keys(out[0]).filter(k => !k.startsWith('_'));
      return { data: out, _rows: out };
    }

    case 'moving_avg': {
      const p4 = v => Math.round(v * 1e4) / 1e4;
      const rawMA = inputs.data || [];
      const dataMA = Array.isArray(rawMA) ? rawMA : [];
      if (!dataMA.length) return { data: [], _rows: [] };

      const xF        = cfg.x_field     || 't_rel';
      const yF        = cfg.y_field     || 'p_rel';
      const symF      = cfg.sym_field   || 'symbol';
      const bucketPct = parseFloat((cfg.bucket_pct || '20%').replace('%','')) / 100;
      const direction = cfg.direction   || 'closest';
      const nBands    = parseInt(cfg.bands || '1');
      const composite = cfg.composite === true || cfg.composite === 'true';
      const bktMode   = cfg.bkt_mode    || 'blend';
      const bktCount  = parseInt(cfg.bkt_count || '5');
      const bktComp   = parseFloat(cfg.bkt_compound || '2.00');

      const bandSuffixes = {
        1: ['_MA'],
        2: ['_MA_L','_MA_H'],
        3: ['_MA_L','_MA_m','_MA_H'],
        4: ['_MA_LL','_MA_L','_MA_H','_MA_HH'],
        5: ['_MA_LL','_MA_L','_MA_m','_MA_H','_MA_HH']
      };
      const suffixes  = bandSuffixes[nBands] || ['_MA'];
      const compColY  = `${yF}_MA`;

      function mean(arr) {
        return arr.length ? p4(arr.reduce((s,v)=>s+v,0)/arr.length) : null;
      }
      function bandSlice(sortedY, bandIdx) {
        const total = sortedY.length;
        if (!total) return [];
        const start = Math.floor(bandIdx * total / nBands);
        const end   = Math.min(total, Math.ceil((bandIdx + 1) * total / nBands));
        return sortedY.slice(start, end);
      }

      // ── Compute bucket x-boundaries for compound geometric spacing ──────
      // widths: w_i = w0 * c^i, sum = xRange
      // c=1: uniform; c>1: later buckets wider
      function bucketBounds(xMin, xMax, n, c) {
        const range = xMax - xMin;
        const bounds = [xMin]; // n+1 boundaries
        if (Math.abs(c - 1.0) < 0.001) {
          // Uniform
          for (let i = 1; i <= n; i++) bounds.push(xMin + range * i / n);
        } else {
          // Geometric: w0 * (c^n - 1)/(c - 1) = range → w0 = range*(c-1)/(c^n-1)
          const w0 = range * (c - 1) / (Math.pow(c, n) - 1);
          let cur = xMin;
          for (let i = 0; i < n; i++) {
            cur += w0 * Math.pow(c, i);
            bounds.push(Math.min(xMax, cur));
          }
          bounds[n] = xMax; // clamp last to exact end
        }
        return bounds;
      }

      // ── Interpolate bucket values to fill empty buckets ──────────────────
      // Two-pass: first find real neighbors for every null slot, then fill.
      // Leading nulls → interpolate from 0 to first real value.
      // Trailing nulls → hold last real value.
      // Interior nulls → linear interp between real neighbors using bucket centers.
      function interpolateBuckets(bucketCenters, bucketVals) {
        const n = bucketCenters.length;
        const src = [...bucketVals]; // original, never modified during scan
        const out = [...bucketVals];

        for (let i = 0; i < n; i++) {
          if (src[i] !== null) continue; // already has a real value

          // Scan for real neighbors in src (not out) to avoid cascade errors
          let prevI = -1, nextI = -1;
          for (let j = i-1; j >= 0; j--) { if (src[j] !== null) { prevI = j; break; } }
          for (let j = i+1; j < n; j++) { if (src[j] !== null) { nextI = j; break; } }

          if (prevI === -1 && nextI === -1) {
            out[i] = 0; // no data at all
          } else if (prevI === -1) {
            // Leading bucket: interpolate from 0 at a virtual point before bucket 0
            // Treat x=bucketCenters[nextI] as anchor; linearly come from 0 at x=-∞ approx
            // Simple: scale by position fraction between 0-center and next-center
            const t = (bucketCenters[i] - bucketCenters[0]) /
                      (bucketCenters[nextI] - bucketCenters[0] || 1);
            out[i] = p4(0 + t * src[nextI]);
          } else if (nextI === -1) {
            out[i] = src[prevI]; // hold last real value
          } else {
            const span = bucketCenters[nextI] - bucketCenters[prevI];
            const t = span > 0
              ? (bucketCenters[i] - bucketCenters[prevI]) / span
              : 0;
            out[i] = p4(src[prevI] + t * (src[nextI] - src[prevI]));
          }
        }
        return out;
      }

      // Group by symbol
      const bySymbol = {};
      dataMA.forEach((row, originalIdx) => {
        const s = String(row[symF] ?? '');
        if (!bySymbol[s]) bySymbol[s] = [];
        const x = Number(row[xF]), y = Number(row[yF]);
        bySymbol[s].push({ x, y, originalIdx, valid: !isNaN(x) && !isNaN(y) });
      });

      const outRows = dataMA.map(row => ({ ...row }));

      Object.entries(bySymbol).forEach(([sym, pts]) => {
        const sorted = pts.filter(p => p.valid).sort((a,b) => a.x - b.x);
        const n = sorted.length;
        if (n < 2) return;

        // ── PASS 1: Rolling MA (always run — needed for MA/blend bucket modes) ──
        const bucketSize = Math.max(2, Math.round(n * bucketPct));
        const half = Math.floor(bucketSize / 2);

        sorted.forEach((pt, si) => {
          let wStart, wEnd;
          if (direction === 'look_back') {
            wStart = Math.max(0, si - bucketSize + 1); wEnd = si + 1;
          } else if (direction === 'look_ahead') {
            wStart = si; wEnd = Math.min(n, si + bucketSize);
          } else {
            wStart = Math.max(0, si - half); wEnd = Math.min(n, si + half + 1);
          }
          const win = sorted.slice(wStart, wEnd);
          const sortedY = win.map(p => p.y).sort((a,b) => a - b);
          if (composite && nBands > 1) outRows[pt.originalIdx][compColY] = mean(sortedY);
          suffixes.forEach((suffix, bi) => {
            outRows[pt.originalIdx][`${yF}${suffix}`] = mean(bandSlice(sortedY, bi));
          });
        });

        // ── PASS 2: Bucketing (skip if bypass) ──────────────────────────────
        if (bktMode === 'bypass') return;

        const xMin = sorted[0].x, xMax = sorted[n-1].x;
        const bounds = bucketBounds(xMin, xMax, bktCount, bktComp);
        const bktCenters = [];
        for (let b = 0; b < bktCount; b++) bktCenters.push((bounds[b] + bounds[b+1]) / 2);

        // For each suffix (band) + composite, compute bucket aggregate values
        const allCols = [...suffixes.map((s,bi) => ({ col:`${yF}${s}`, bi }))];
        if (composite && nBands > 1) allCols.unshift({ col: compColY, bi: -1 }); // bi=-1 = full

        // ── PASS 2a: StDev_Pred and Vlty_Pred per bucket (whole bucket, not per band) ──
        // Uses raw y values across entire bucket regardless of band configuration.
        {
          const stdevPredCol = `${yF}_StDev_Pred`;
          const vltyPredCol  = `${yF}_Vlty_Pred`;
          const bktRawY = Array.from({length: bktCount}, () => []);

          sorted.forEach(pt => {
            let bIdx = bktCount - 1;
            for (let b = 0; b < bktCount; b++) {
              if (pt.x <= bounds[b+1]) { bIdx = b; break; }
            }
            bktRawY[bIdx].push(pt.y);
          });

          const bktStDev = bktRawY.map(ys => {
            if (ys.length < 2) return null;
            const mu = ys.reduce((s,v)=>s+v,0)/ys.length;
            return p4(Math.sqrt(ys.reduce((s,v)=>s+(v-mu)**2,0)/ys.length));
          });
          const bktVlty = bktRawY.map(ys => {
            if (ys.length < 2) return null;
            const rets = [];
            for (let i = 1; i < ys.length; i++) {
              if (ys[i-1] !== 0) rets.push((ys[i]-ys[i-1])/Math.abs(ys[i-1]));
            }
            if (rets.length < 2) return null;
            const mu = rets.reduce((s,v)=>s+v,0)/rets.length;
            return p4(Math.sqrt(rets.reduce((s,v)=>s+(v-mu)**2,0)/rets.length));
          });

          const filledStDev = interpolateBuckets(bktCenters, bktStDev);
          const filledVlty  = interpolateBuckets(bktCenters, bktVlty);

          sorted.forEach(pt => {
            let bIdx = bktCount - 1;
            for (let b = 0; b < bktCount; b++) {
              if (pt.x <= bounds[b+1]) { bIdx = b; break; }
            }
            // Smooth interpolation between bucket centers
            let sSD, sVl;
            if (pt.x <= bktCenters[0]) {
              sSD = filledStDev[0]; sVl = filledVlty[0];
            } else if (pt.x >= bktCenters[bktCount-1]) {
              sSD = filledStDev[bktCount-1]; sVl = filledVlty[bktCount-1];
            } else {
              let lo = 0;
              for (let b = 0; b < bktCount-1; b++) {
                if (pt.x >= bktCenters[b] && pt.x <= bktCenters[b+1]) { lo = b; break; }
              }
              const hi2 = lo+1;
              const span = bktCenters[hi2]-bktCenters[lo];
              const t = span > 0 ? (pt.x-bktCenters[lo])/span : 0;
              sSD = p4((filledStDev[lo]??0) + t*((filledStDev[hi2]??filledStDev[lo]??0)-(filledStDev[lo]??0)));
              sVl = p4((filledVlty[lo]??0)  + t*((filledVlty[hi2]??filledVlty[lo]??0) -(filledVlty[lo]??0)));
            }
            outRows[pt.originalIdx][stdevPredCol] = sSD !== null ? p4(sSD) : null;
            outRows[pt.originalIdx][vltyPredCol]  = sVl !== null ? p4(sVl) : null;
          });
        }

        // (Actuals bucketing removed — use convergences 'actuals' output port instead)

        allCols.forEach(({ col, bi }) => {
          // Collect y values per bucket
          const bktYSets = Array.from({length: bktCount}, () => []);

          sorted.forEach(pt => {
            // Determine data source value for this point
            let rawY = pt.y;
            let maY  = outRows[pt.originalIdx][col]; // from rolling pass
            if (maY === null || maY === undefined) maY = rawY;

            let srcY;
            if (bktMode === 'raw')   srcY = rawY;
            else if (bktMode === 'MA') srcY = maY;
            else                      srcY = p4((rawY + maY) / 2); // blend

            // Find which bucket this x falls into
            let bIdx = bktCount - 1;
            for (let b = 0; b < bktCount; b++) {
              if (pt.x <= bounds[b+1]) { bIdx = b; break; }
            }
            bktYSets[bIdx].push(srcY);
          });

          // Compute per-bucket aggregate using x_treatment for the y direction
          // (x_treatment applies to y bands the same way: first=lowest, last=highest,
          //  mean=average, med=median of the band slice)
          const bktVals = bktYSets.map((ys, bIdx) => {
            if (!ys.length) return null;
            const sorted_ys = [...ys].sort((a,b) => a - b);
            const slice = bi === -1 ? sorted_ys : bandSlice(sorted_ys, bi);
            if (!slice.length) return null;
            const xTreat = cfg.x_treatment || 'mean';
            if (xTreat === 'first') return slice[0];
            if (xTreat === 'last')  return slice[slice.length - 1];
            if (xTreat === 'med')   return slice[Math.floor(slice.length / 2)];
            return mean(slice); // mean
          });

          // Interpolate empty buckets
          const filled = interpolateBuckets(bktCenters, bktVals);

          // Write back to each row: find its bucket, apply that bucket's value
          sorted.forEach(pt => {
            let bIdx = bktCount - 1;
            for (let b = 0; b < bktCount; b++) {
              if (pt.x <= bounds[b+1]) { bIdx = b; break; }
            }
            outRows[pt.originalIdx][col] = filled[bIdx] !== null ? p4(filled[bIdx]) : null;
          });
        });
      });

      if (outRows.length) configs[node.id]._headers = Object.keys(outRows[0]).filter(k => !k.startsWith('_'));
      return { data: outRows, _rows: outRows };
    }

    case 'convergences': {
      const p4 = v => Math.round(v * 1e4) / 1e4;
      const rawC = inputs.data || [];
      const dataC = Array.isArray(rawC) ? rawC : [];
      if (dataC.length < 2) return { data: [], _rows: [] };

      const xF       = cfg.x_field   || 't_rel';
      const yF       = cfg.y_field   || 'p_rel';
      const symF     = cfg.sym_field || 'symbol';
      const vF       = cfg.v_field   || '';
      const slicePct = parseFloat((cfg.slice || '50%').replace('%','')) / 100;
      const trajMode = cfg.traj_mode || 'Fwd';
      const pvDetect = (cfg.pv_detect || 'Enabled') === 'Enabled';

      // Helpers
      const deg = rad => p4(rad * 180 / Math.PI);
      const stdev = arr => {
        if (arr.length < 2) return 0;
        const mu = arr.reduce((s,v)=>s+v,0) / arr.length;
        return p4(Math.sqrt(arr.reduce((s,v)=>s+(v-mu)**2,0) / arr.length));
      };
      const vlty = arr => {
        // Volatility: stdev of period-over-period returns
        if (arr.length < 2) return 0;
        const rets = [];
        for (let i = 1; i < arr.length; i++) {
          if (arr[i-1] !== 0) rets.push((arr[i] - arr[i-1]) / Math.abs(arr[i-1]));
        }
        return stdev(rets);
      };

      // PV detection: returns filtered array keeping only peaks, valleys, and edges
      function extractPV(pts) {
        if (pts.length <= 2) return pts;
        const keep = new Array(pts.length).fill(false);
        // Always keep first and last
        keep[0] = true; keep[pts.length-1] = true;

        for (let i = 1; i < pts.length - 1; i++) {
          const prev = pts[i-1].y, cur = pts[i].y, next = pts[i+1].y;
          // Standard peak: both neighbors lower
          if (prev < cur && next < cur) { keep[i] = true; continue; }
          // Standard valley: both neighbors higher
          if (prev > cur && next > cur) { keep[i] = true; continue; }
          // Plateau peak edges: prev < cur && next === cur  OR  prev === cur && next < cur
          if (prev < cur && next === cur) { keep[i] = true; continue; }
          if (prev === cur && next < cur) { keep[i] = true; continue; }
          // Plateau valley edges: prev > cur && next === cur  OR  prev === cur && next > cur
          if (prev > cur && next === cur) { keep[i] = true; continue; }
          if (prev === cur && next > cur) { keep[i] = true; continue; }
        }
        return pts.filter((_, i) => keep[i]);
      }

      // Group by symbol
      const bySymbol = {};
      dataC.forEach(row => {
        const s = String(row[symF] ?? '');
        if (!bySymbol[s]) bySymbol[s] = [];
        bySymbol[s].push({
          x: p4(Number(row[xF])),
          y: p4(Number(row[yF])),
          v: vF ? Number(row[vF]) : null,
          sym: s,
          _row: row
        });
      });

      const allOut = [];
      const allActuals = [];

      Object.entries(bySymbol).forEach(([sym, pts]) => {
        const valid = pts.filter(p => !isNaN(p.x) && !isNaN(p.y))
                        .sort((a,b) => a.x - b.x);
        if (valid.length < 2) return;

        // Last volume value for this symbol (most recent before slice)
        const lastV = vF ? (valid.map(p=>p.v).filter(v=>v!==null&&!isNaN(v)).pop() ?? null) : null;

        // ── Slice ────────────────────────────────────────────────────
        const cutIdx   = Math.max(2, Math.round(valid.length * slicePct));
        const modelPts = valid.slice(0, cutIdx);
        const validPts = valid.slice(cutIdx);

        const t0 = modelPts[modelPts.length - 1].x;
        const p0 = modelPts[modelPts.length - 1].y;

        // Rescale
        const scaled = modelPts.map(p => ({
          ...p,
          x: p4(p.x - t0),
          y: p4(p.y - p0)
        }));

        const xMin  = scaled[0].x;
        const xMax  = scaled[scaled.length - 1].x;
        const yVals = scaled.map(p => p.y);
        const yMin  = Math.min(...yVals), yMax = Math.max(...yVals);
        const xRange = xMax - xMin || 1;
        const yRange = yMax - yMin || 1;
        const xAbsMax = Math.max(...scaled.map(p => Math.abs(p.x))) || 1;
        const envA = xAbsMax > 0 ? yRange / Math.log(xAbsMax + 1) : 1; // log envelope coefficient for this symbol

        // Model stats (on rescaled y values)
        const StDev_Mod = stdev(yVals);
        const Vlty_Mod  = vlty(yVals);

        // ── PV Detection: filter model points to peaks/valleys only ──
        const trajPts = pvDetect ? extractPV(scaled) : scaled;

        // ── Envelope coefficient (model-derived log curve) ────────────
        // envA calibrated so f(xAbsMax) = yRange using f(x) = envA * ln(|x|+1)
        // envA already computed above — used for cx_env+/cx_env- on intersections
        // and for reflected envelope on actuals output.
        const asym = v => p4(v / (1 + Math.abs(v)));
        const evalEnv = absX => p4(Math.max(0, envA * Math.log(Math.abs(absX) + 1)));

        const trajEnvFilter = (cfg.traj_env_filter || 'Off') === 'On';

        // ── Trajectory + intersection generation (single pass, full point set) ──
        // cProx = average of the 4 x-values from the two generating trajectories.
        // Near 0 = generated from recent data. More negative = older data.

        const xFutureCutoff = p4(xMax + Math.abs(xRange));
        const cyFilterVal = cfg.cy_filter || 'Off';

        // Generate trajectories from all trajPts — max and min slope per point per direction
        const genTrajectories = (pts) => {
          const trajs = [];
          pts.forEach((p0s, i) => {
            const isLastPoint = i === pts.length - 1;
            const fwd = (trajMode === 'Fwd' || trajMode === 'Both')
              ? pts.filter((_, j) => j > i) : [];
            const bwd = (trajMode === 'Bkwd' || trajMode === 'Both') && !isLastPoint
              ? pts.filter((_, j) => j < i) : [];

            const slopesDir = (others) => {
              if (!others.length) return [];
              const slopes = others.map(p1 => {
                const dx = p4(p1.x - p0s.x);
                if (dx === 0) return null;
                const m = p4((p1.y - p0s.y) / dx);
                const b = p4(p0s.y - m * p0s.x);
                return { m, b, x1: p1.x, y1: p1.y };
              }).filter(Boolean);
              if (!slopes.length) return [];
              const maxM = slopes.reduce((a,c) => a.m >= c.m ? a : c);
              const minM = slopes.reduce((a,c) => a.m <= c.m ? a : c);
              const res = [maxM];
              if (minM.m !== maxM.m) res.push(minM);
              return res;
            };

            [...slopesDir(fwd), ...slopesDir(bwd)].forEach(line => {
              trajs.push({ sym, x0: p0s.x, y0: p0s.y, x1: line.x1, y1: line.y1, m: line.m, b: line.b });
            });
          });
          return trajs;
        };

        const intersectionMap = new Map();
        const trajectories = genTrajectories(trajPts);

        // Deduplicate lines by m|b
        let allLines = trajectories.filter((t, idx, arr) => {
          const lk = `${t.m}|${t.b}`;
          return arr.findIndex(x => `${x.m}|${x.b}` === lk) === idx;
        });

        // ── Trajectory envelope filter (optional) ────────────────────
        // Keep only trajectories that at some point in the PREDICTION space
        // [0, xFutureCutoff] pass through OR graze the envelope.
        // Uses analytic sign-change detection: checks if the gap between the
        // line and each envelope boundary changes sign anywhere in the range,
        // meaning the line crosses or touches that boundary — i.e. enters the
        // envelope. Also keeps lines that are fully inside the envelope at any
        // sampled point. 3 checks per boundary: x=0, x=midpoint, x=xFutureCutoff.
        // Sign change between any two adjacent checks = crossing = keep.
        if (trajEnvFilter) {
          // Check beyond xFutureCutoff too — a trajectory that enters the envelope
          // past the prediction cutoff is still a valid trajectory worth keeping.
          // Use 2x xFutureCutoff as the scan limit, with 40 steps for tight gap coverage.
          const scanLimit = xFutureCutoff * 2;
          const steps = 40;
          const checkXs = [];
          for (let s = 0; s <= steps; s++) checkXs.push(p4(scanLimit * s / steps));
          allLines = allLines.filter(t => {
            // Compute gap between line and envelope at each check point
            // gap > 0 means line is above env_pos (outside high)
            // gap < 0 means line is below env_pos (inside or below)
            // For env_neg: gap > 0 means line is above env_neg (inside or above)
            //              gap < 0 means line is below env_neg (outside low)
            let prevGapPos = null, prevGapNeg = null;
            for (const x of checkXs) {
              const yLine   = t.m * x + t.b;
              const envPos  = evalEnv(x);
              const envNeg  = asym(-envPos);
              const gapPos  = yLine - envPos;   // neg = below pos boundary = potentially inside
              const gapNeg  = yLine - envNeg;   // pos = above neg boundary = potentially inside

              // If line is between both boundaries at this point — it's inside the envelope
              if (gapPos <= 0 && gapNeg >= 0) return true;

              // If gap to either boundary changes sign from previous point — line crossed it
              if (prevGapPos !== null) {
                if (prevGapPos * gapPos < 0) return true; // crossed env_pos
                if (prevGapNeg * gapNeg < 0) return true; // crossed env_neg
              }
              prevGapPos = gapPos;
              prevGapNeg = gapNeg;
            }
            return false;
          });
        }

        // Both loops use allLines (filtered when filter is on, full dedup set when off)
        for (let i = 0; i < allLines.length; i++) {
          const t1 = allLines[i];
          for (let j = i + 1; j < allLines.length; j++) {
            const t2 = allLines[j];
            if (t1.m === t2.m) continue;
            const denom = p4(t1.m - t2.m);
            if (denom === 0) continue;
            const cx = p4((t2.b - t1.b) / denom);
            const cy = p4((t1.m * t2.b - t2.m * t1.b) / denom);

            if (cx <= xMax) continue;
            if (cx > xFutureCutoff) continue;
            if (cyFilterVal !== 'Off') {
              const cyMult = parseFloat(cyFilterVal);
              // Filter using envelope bounds at cy's distance rather than flat yRange multiple.
              // envPos/envNeg at cx give the expected range at that forecast distance.
              const envAtCx = evalEnv(Math.abs(cx));
              const filterPos =  envAtCx * cyMult;
              const filterNeg =  asym(-envAtCx) * cyMult;
              if (cy > filterPos || cy < filterNeg) continue;
            }

            const key = `${cx}|${cy}`;
            if (intersectionMap.has(key)) continue;

            const OA = deg(Math.atan2(cy, cx));
            const mProd = t1.m * t2.m;
            const CA = deg(Math.atan(Math.abs(t1.m - t2.m) / (1 + (mProd === -1 ? 0.0001 : mProd))));

            // cProx: average of the 4 x-values from the two trajectories that produced this intersection.
            // Values near 0 = recently generated. More negative = generated from older historical data.
            const cProx = p4((t1.x0 + t1.x1 + t2.x0 + t2.x1) / 4);

            // Envelope at cx — forecast distance envelope bounds
            const cxEnvPos = evalEnv(Math.abs(cx));
            const cxEnvNeg = asym(-cxEnvPos);

            intersectionMap.set(key, {
              symbol: sym,
              x0: t1.x0, y0: t1.y0,
              x1: t1.x1, y1: t1.y1,
              m1: t1.m,  b1: t1.b,
              x20: t2.x0, y20: t2.y0,
              x21: t2.x1, y21: t2.y1,
              m2: t2.m,   b2: t2.b,
              cx, cy,
              x_ray_end: xMax,
              OA, CA,
              StDev_Mod, Vlty_Mod,
              v: lastV,
              cProx,
              ci: null,
              cx_env_pos: cxEnvPos,
              cx_env_neg: cxEnvNeg,
              val_raw: null, val_avg: null, val_min: null, val_max: null
            });
          }
        }

        // ── Compute CI (Convergence Index) ────────────────────────────
        // For each line key (m|b), collect all intersections it participates in,
        // sort by cx, rank each intersection, normalize to 0-1.
        // CI for an intersection = average of normalized rank across its two lines.

        const allIntersections = [...intersectionMap.values()];

        // Build per-line intersection lists: lineKey → [cx values sorted]
        const lineIntersections = new Map(); // lineKey → sorted array of cx
        allIntersections.forEach(rec => {
          const k1 = `${rec.m1}|${rec.b1}`;
          const k2 = `${rec.m2}|${rec.b2}`;
          if (!lineIntersections.has(k1)) lineIntersections.set(k1, []);
          if (!lineIntersections.has(k2)) lineIntersections.set(k2, []);
          lineIntersections.get(k1).push(rec.cx);
          lineIntersections.get(k2).push(rec.cx);
        });
        // Sort each line's cx list
        lineIntersections.forEach((arr, k) => arr.sort((a,b) => a - b));

        // Assign CI to each intersection
        allIntersections.forEach(rec => {
          const k1 = `${rec.m1}|${rec.b1}`;
          const k2 = `${rec.m2}|${rec.b2}`;
          const arr1 = lineIntersections.get(k1) || [rec.cx];
          const arr2 = lineIntersections.get(k2) || [rec.cx];
          // Normalized rank: position in sorted list / (total - 1), clamped to [0,1]
          const rank1 = arr1.length > 1 ? arr1.indexOf(rec.cx) / (arr1.length - 1) : 0.5;
          const rank2 = arr2.length > 1 ? arr2.indexOf(rec.cx) / (arr2.length - 1) : 0.5;
          rec.ci = p4((rank1 + rank2) / 2);
        });

        // Push all intersections to output
        allIntersections.forEach(rec => allOut.push(rec));

        // ── Step 4: actuals output — full rescaled source data (model + validation) ──
        // Includes ALL points (model side negative x, validation side positive x).
        // Envelope columns use abs(xAct) so the curve is reflected symmetrically on both
        // sides of the y-axis — allows plotting alongside actuals on both model and val side.
        const allPts = valid; // full set, pre-slice
        allPts.forEach(vp => {
          const xAct = p4(vp.x - t0);
          const yAct = p4(vp.y - p0);
          const actEnvPos = evalEnv(Math.abs(xAct));
          const actEnvNeg = asym(-actEnvPos);
          allActuals.push({
            symbol: sym,
            xAct,
            yAct,
            act_env_pos: actEnvPos,
            act_env_neg: actEnvNeg
          });
        });

        // ── Step 5: attach val_raw / val_avg / val_min / val_max to each convergence row ──
        // validPts are in original x space; rescale them to match cx (which is in rescaled space)
        if (validPts.length === 0) {
          // slice=100% — no validation data, leave all val_* null (already null from allOut.push above)
        } else {
          // Rescaled validation points: x relative to t0, y relative to p0
          // Exclude the origin point (0,0) — it is the last model point, not actual validation data
          const valRescaled = validPts
            .map(vp => ({ x: p4(vp.x - t0), y: p4(vp.y - p0) }))
            .sort((a,b) => a.x - b.x);
          // All rescaled val x values are > 0 (they are future relative to model cutoff)

          // Helper: linear interpolate y at target x given sorted array of {x,y} points
          // Anchor: if no point before target, interpolate from (0,0) [not actual data — just anchor]
          // If no point after target, hold last actual point
          const interpAt = (pts, targetX) => {
            if (!pts.length) return p4(0); // no data at all — return 0 (anchor only)
            // Find surrounding points
            let lo = null, hi = null;
            for (let i = pts.length - 1; i >= 0; i--) {
              if (pts[i].x <= targetX) { lo = pts[i]; break; }
            }
            for (let i = 0; i < pts.length; i++) {
              if (pts[i].x >= targetX) { hi = pts[i]; break; }
            }
            if (lo && hi && lo.x === hi.x) return p4(lo.y);
            if (!lo && !hi) return p4(0);
            if (!lo) {
              // No actual point before — interpolate from (0,0) anchor to hi
              const t = hi.x > 0 ? targetX / hi.x : 0;
              return p4(t * hi.y);
            }
            if (!hi) return p4(lo.y); // hold last actual value
            const t = (targetX - lo.x) / (hi.x - lo.x);
            return p4(lo.y + t * (hi.y - lo.y));
          };

          // For each convergence row for this symbol, compute the 4 val fields
          // We need to update the rows we just pushed — iterate allOut from where
          // this symbol's convergence rows start (they have cx !== null)
          allOut.forEach(row => {
            if (row.symbol !== sym || row.cx === null) return;
            const cxVal = row.cx; // in rescaled space, > 0

            // val_raw: interpolated y at exactly cx
            row.val_raw = interpAt(valRescaled, cxVal);

            // Actual points from x=0 to x=cx (exclusive of origin — only real validation points)
            const inRange = valRescaled.filter(vp => vp.x > 0 && vp.x <= cxVal);

            if (inRange.length > 0) {
              // val_avg: average of mean and median of y values in range
              const yArr = inRange.map(vp => vp.y).sort((a,b) => a - b);
              const mn = yArr.reduce((s,v)=>s+v,0) / yArr.length;
              const med = yArr.length % 2 === 0
                ? (yArr[yArr.length/2-1] + yArr[yArr.length/2]) / 2
                : yArr[Math.floor(yArr.length/2)];
              row.val_avg = p4((mn + med) / 2);

              // val_min / val_max: cumulative min/max of actual data in range
              row.val_min = p4(Math.min(...yArr));
              row.val_max = p4(Math.max(...yArr));
            } else {
              // No actual validation points between 0 and cx — interpolate from (0,0) anchor
              const anchoredVal = interpAt(valRescaled, cxVal);
              row.val_avg = anchoredVal;
              row.val_min = anchoredVal;
              row.val_max = anchoredVal;
            }
          });
        }
      });

      if (allOut.length)    configs[node.id]._headers         = Object.keys(allOut[0]).filter(k => !k.startsWith('_'));
      if (allActuals.length) configs[node.id]._headers_actuals = Object.keys(allActuals[0]).filter(k => !k.startsWith('_'));
      return {
        features: allOut, _rows: allOut,
        actuals: allActuals,
        _outputs: { features: allOut, actuals: allActuals }
      };
    }

    case 'asym_damp': {
      // Asymmetric dampening: f(v) = v / (1 + |v|)
      // Maps any real number to (-1, 1), preserving sign.
      // f(1) = 0.5, f(2) = 0.667, f(3) = 0.75, f(-1) = -0.5 etc. — exactly as specified.
      const p4 = v => Math.round(v * 1e4) / 1e4;
      const rawD = inputs.data || [];
      const dataD = Array.isArray(rawD) ? rawD : [];
      if (!dataD.length) return { data: [], _rows: [] };
      const dampField = cfg.field     || 'cy';
      const outField  = cfg.out_field || 'cy_d';
      const out = dataD.map(row => {
        const v = Number(row[dampField]);
        const d = isNaN(v) ? null : p4(v / (1 + Math.abs(v)));
        return { ...row, [outField]: d };
      });
      if (out.length) configs[node.id]._headers = Object.keys(out[0]).filter(k => !k.startsWith('_'));
      return { data: out, _rows: out };
    }

    case 'dyn_envelope': {
      const p4 = v => Math.round(v * 1e4) / 1e4;
      const asym = v => p4(v / (1 + Math.abs(v)));

      // Source data: builds envelope coefficients per symbol
      const rawE = inputs.data || [];
      const dataE = Array.isArray(rawE) ? rawE : [];
      if (dataE.length < 3) return { data: dataE.map(r=>({...r})), _rows: dataE.map(r=>({...r})) };

      // Apply data: where envelope columns are written.
      // If 'apply' port not connected → apply to source data (self-mode).
      const rawA = inputs.apply;
      const hasApply = rawA !== undefined && rawA !== null && (Array.isArray(rawA) ? rawA.length > 0 : true);
      const applyData = hasApply ? (Array.isArray(rawA) ? rawA : [rawA]) : dataE;
      const selfMode = !hasApply; // true = source and apply are the same dataset

      const yF      = cfg.y_field  || 'p_rel';
      const xF      = cfg.x_field  || '';
      const applyXF = cfg.apply_x  || ''; // x field on the APPLY dataset
      const symF    = cfg.sym_field || 'symbol';

      // Output column names always based on y_field for predictability
      const envPosCol = `${yF}_env+`;
      const envNegCol = `${yF}_env-`;

      function makeEnv(xAbsMax, yRange) {
        const a = yRange / Math.log(xAbsMax + 1);
        const eval_ = absX => p4(Math.max(0, a * Math.log(Math.abs(absX) + 1)));
        return { a, eval_ };
      }

      // ── Phase 1: Build per-symbol envelope coefficients from SOURCE data ──
      const symCoeffs = {}; // sym → { a, eval_, xAbsMax, yRange }
      const bySymbolSrc = {};
      dataE.forEach((row, idx) => {
        const s = String(row[symF] ?? '');
        if (!bySymbolSrc[s]) bySymbolSrc[s] = [];
        const y = Number(row[yF]);
        const x = xF ? Number(row[xF]) : idx;
        bySymbolSrc[s].push({ y, x, idx, valid: !isNaN(y) && !isNaN(x) });
      });

      Object.entries(bySymbolSrc).forEach(([sym, pts]) => {
        const sorted = pts.filter(p => p.valid).sort((a,b) => a.x - b.x);
        if (sorted.length < 3) return;
        const yVals   = sorted.map(p => p.y);
        const yRange  = p4(Math.max(...yVals) - Math.min(...yVals)) || 0.00001;
        const xAbsMax = Math.max(...sorted.map(p => Math.abs(p.x))) || 1;
        const { a, eval_ } = makeEnv(xAbsMax, yRange);
        symCoeffs[sym] = { a, eval_, xAbsMax, yRange };
      });

      // ── Phase 2: Apply coefficients to APPLY dataset ──
      // In self-mode this is the source rows. In apply-mode it is the separate dataset.
      const outRows = applyData.map((row, idx) => {
        const outRow = { ...row };
        const sym = String(row[symF] ?? '');
        const coeff = symCoeffs[sym];
        if (!coeff) return outRow; // no source coefficients for this symbol — pass through

        // Determine x value to evaluate envelope at:
        // 1. apply_x field on this row (if configured)
        // 2. x_field on this row (same field name as source)
        // 3. row index as fallback
        let rawX;
        if (applyXF && row[applyXF] !== undefined) {
          rawX = Number(row[applyXF]);
        } else if (xF && row[xF] !== undefined) {
          rawX = Number(row[xF]);
        } else {
          rawX = idx;
        }

        if (isNaN(rawX)) return outRow;

        const envVal = coeff.eval_(rawX);
        outRow[envPosCol]           = envVal;
        outRow[envNegCol]           = asym(-envVal);
        outRow[`${yF}_env_a`]       = p4(coeff.a);
        outRow[`${yF}_env_formula`] = `${p4(coeff.a)}*ln(|x|+1)`;
        return outRow;
      });

      // ── Phase 3: Filter pass (runs on outRows using source-derived coefficients) ──
      const filtXF   = cfg.filt_x  || '';
      const filtYF   = cfg.filt_y  || '';
      const filtPad  = cfg.filt_pad || '2.00';
      const filtDamp = cfg.filt_damp === true || cfg.filt_damp === 'true';

      let filteredRows = outRows;

      if (filtXF && filtYF && filtPad !== 'Off') {
        const pad = parseFloat(filtPad);
        const kept = [];

        for (const row of outRows) {
          const sym    = String(row[symF] ?? '');
          const coeff  = symCoeffs[sym];
          const fx     = Number(row[filtXF]);
          const fy     = Number(row[filtYF]);

          // No source coefficients or invalid values — keep unchanged
          if (!coeff || isNaN(fx) || isNaN(fy)) { kept.push(row); continue; }

          const envVal  = coeff.eval_(fx);
          const envPos  = envVal;
          const envNeg  = asym(-envVal);
          const padPos  = envVal * pad;
          const padNeg  = asym(-envVal) * pad;

          const exceedsEnv = fy > envPos || fy < envNeg;
          const exceedsPad = fy > padPos  || fy < padNeg;

          if (!exceedsEnv) {
            kept.push(row);
          } else if (exceedsPad) {
            // Drop — beyond padded threshold
          } else {
            if (filtDamp) {
              const dampedRow = { ...row };
              dampedRow[filtYF] = fy > envPos
                ? p4((fy + envPos) / 2)
                : p4((fy + envNeg) / 2);
              kept.push(dampedRow);
            }
            // !filtDamp: drop rows in the between-envelope-and-pad zone
          }
        }
        filteredRows = kept;
      }

      if (filteredRows.length) configs[node.id]._headers = Object.keys(filteredRows[0]).filter(k=>!k.startsWith('_'));
      return { data: filteredRows, _rows: filteredRows };
    }

    case 'outlier_clean': {
      const p4 = v => Math.round(v * 1e4) / 1e4;
      const rawOC = inputs.data || [];
      const dataOC = Array.isArray(rawOC) ? rawOC : [];
      if (!dataOC.length) return { data: [], _rows: [] };

      const yF       = cfg.y_field   || '';
      const xF       = cfg.x_field   || '';
      const symF     = cfg.sym_field || 'symbol';
      const method   = cfg.method    || 'iqr';
      const thresh   = parseFloat(cfg.threshold || '2.5');
      const winPct   = parseFloat((cfg.win_pct || '100%').replace('%','')) / 100;

      if (!yF) return { data: dataOC, _rows: dataOC }; // no field selected — passthrough

      // Group by symbol
      const bySymbol = {};
      dataOC.forEach((row, idx) => {
        const s = String(row[symF] ?? '');
        if (!bySymbol[s]) bySymbol[s] = [];
        bySymbol[s].push({ row, idx, y: Number(row[yF]), x: xF ? Number(row[xF]) : idx });
      });

      const killSet = new Set(); // indices of rows to remove

      Object.entries(bySymbol).forEach(([sym, pts]) => {
        const sorted = pts.filter(p => !isNaN(p.y)).sort((a,b) => a.x - b.x);
        const n = sorted.length;
        if (n < 4) return;

        const winSize = Math.max(4, Math.round(n * winPct));

        // Slide window across sorted pts, flag outliers within each window
        for (let wi = 0; wi < n; wi += Math.max(1, Math.floor(winSize / 2))) {
          const wEnd = Math.min(n, wi + winSize);
          const window = sorted.slice(wi, wEnd);
          const yVals = window.map(p => p.y).sort((a,b) => a-b);
          const wn = yVals.length;

          let isOutlier;

          if (method === 'iqr') {
            const q1 = yVals[Math.floor(wn * 0.25)];
            const q3 = yVals[Math.floor(wn * 0.75)];
            const iqr = q3 - q1;
            const lo = q1 - thresh * iqr, hi = q3 + thresh * iqr;
            isOutlier = p => p.y < lo || p.y > hi;
          } else if (method === 'zscore') {
            const mu = yVals.reduce((s,v)=>s+v,0) / wn;
            const sd = Math.sqrt(yVals.reduce((s,v)=>s+(v-mu)**2,0) / wn) || 1;
            isOutlier = p => Math.abs((p.y - mu) / sd) > thresh;
          } else if (method === 'mad') {
            const med = yVals[Math.floor(wn/2)];
            const devs = yVals.map(v => Math.abs(v - med)).sort((a,b)=>a-b);
            const mad = devs[Math.floor(wn/2)] * 1.4826 || 1; // scale to ~sd
            isOutlier = p => Math.abs(p.y - med) / mad > thresh;
          } else if (method === 'pct_change') {
            // Flag rows where abs pct change from prior is > threshold * median abs pct change
            const pctChanges = [];
            for (let i = 1; i < window.length; i++)
              pctChanges.push(Math.abs((window[i].y - window[i-1].y) / (Math.abs(window[i-1].y) || 1)));
            const sortedPct = [...pctChanges].sort((a,b)=>a-b);
            const medPct = sortedPct[Math.floor(sortedPct.length/2)] || 1;
            isOutlier = (p, i) => i > 0 && Math.abs((p.y - window[i-1].y) / (Math.abs(window[i-1].y)||1)) > thresh * medPct;
          }

          window.forEach((p, wi2) => {
            if (isOutlier(p, wi2)) killSet.add(p.idx);
          });
        }

        // If x is provided, also flag any rows where dY/dX is > thresh * median(dY/dX)
        if (xF && sorted.length > 2) {
          const rates = [];
          for (let i = 1; i < sorted.length; i++) {
            const dx = sorted[i].x - sorted[i-1].x;
            if (dx === 0) continue;
            rates.push({ idx: sorted[i].idx, rate: Math.abs((sorted[i].y - sorted[i-1].y) / dx) });
          }
          if (rates.length > 2) {
            const sortedRates = rates.map(r=>r.rate).sort((a,b)=>a-b);
            const medRate = sortedRates[Math.floor(sortedRates.length/2)] || 1;
            rates.forEach(r => {
              if (r.rate > thresh * medRate * 3) killSet.add(r.idx); // stricter — 3x threshold for dY/dX
            });
          }
        }
      });

      const cleaned = dataOC.filter((_, idx) => !killSet.has(idx));
      if (cleaned.length) configs[node.id]._headers = Object.keys(cleaned[0]).filter(k=>!k.startsWith('_'));
      return { data: cleaned, _rows: cleaned };
    }

    default: throw new Error(`No executor for module: ${node.moduleId}`);
  }

  const fullUrl = `${url}?${params}`;
  const resp = await fetch(fullUrl, { headers });
  if (!resp.ok) throw new Error(`${resp.status} ${await resp.text()}`);
  const json = await resp.json();

  // Extract, flatten, and post-process all rows immediately.
  // postProcessRows expands tag-array fields (like Alpaca's `attributes`) into boolean columns.
  const rawRows = extractRows(json).filter(r => r && typeof r === 'object' && !Array.isArray(r));
  const rows = postProcessRows(rawRows);

  // Discover headers from actual flat data and persist into node config so
  // dropdowns in the inspector always reflect real field names, not hardcoded stubs.
  const discoveredHeaders = rows.length ? Object.keys(rows[0]).filter(k => !k.startsWith('_')) : [];
  if (discoveredHeaders.length) configs[node.id]._headers = discoveredHeaders;

  // Always expose flat rows on 'data' port so any downstream node can consume them.
  // Also keep individual named ports for backward compat where they happen to match.
  const out = { data: rows, _rows: rows };
  def.out.forEach(k => {
    if (k === 'data') return; // already set
    if (rows.length && rows[0][k] !== undefined) out[k] = rows.map(r => r[k]);
    else out[k] = null;
  });
  return out;
}

// ── Find terminal nodes (no outgoing edges to non-viz nodes) ──
function findTerminalNodes(order) {
  // A terminal node is one whose outputs don't feed into any non-viz node
  return order.filter(id => {
    const downstream = edges.filter(e => e.from === id).map(e => e.to);
    const nonVizDown = downstream.filter(tid => {
      const n = nodes.find(nd => nd.id === tid);
      return n && !MOD[n.moduleId]?._isViz;
    });
    return nonVizDown.length === 0;
  });
}

// ── Main run entry point ──
async function runFlow(dryRun) {
  if (!nodes.length) { flashMsg('No nodes on canvas', 'var(--amber)'); return; }
  const acct = accounts.find(a => a.id === activeAccountId);
  if (!acct && !dryRun) { flashMsg('Add an account in the Accounts tab first', 'var(--red)'); return; }

  runResults = {};
  nodes.forEach(n => setNodeStatus(n.id, 'pending'));

  const order = topoSort();
  let completed = 0;

  for (const nodeId of order) {
    const node = nodes.find(n => n.id === nodeId);
    if (!node) continue;
    const def = node.moduleId.startsWith('subflow::') ? getSubflowDef(node.moduleId) : MOD[node.moduleId];
    if (!def) continue;

    setNodeStatus(nodeId, 'running');
    toastShow(`Running: ${def.label}…`, (completed / order.length) * 100);

    // viz_table nodes: grab their input data and open modal, don't call API
    if (node.moduleId === 'viz_table') {
      const inputs = resolveInputs(nodeId);
      const rows = inputs.data;
      const title = configs[nodeId]?.title || def.label;
      const colCfg = configs[nodeId]?.columns;
      runResults[nodeId] = { status:'done', data:{ _rows: Array.isArray(rows) ? rows : [rows] } };
      setNodeStatus(nodeId, 'done');
      if (Array.isArray(rows) && rows.length) openTblModal(rows, title, colCfg);
      completed++;
      toastShow(`Done: ${def.label}`, (completed / order.length) * 100);
      continue;
    }

    // viz_chart nodes
    if (node.moduleId === 'viz_chart') {
      const inputs = resolveInputs(nodeId);
      // Merge all connected data inputs — supports multi-port connections
      const rows = mergeVizInputs(inputs);
      const title = configs[nodeId]?.title || 'Chart';
      runResults[nodeId] = { status:'done', data:{ _rows: rows } };
      setNodeStatus(nodeId, 'done');
      if (rows.length) openChartModal(rows, configs[nodeId] || {}, title);
      completed++;
      toastShow(`Done: ${def.label}`, (completed / order.length) * 100);
      continue;
    }

    // viz_chart_grid nodes
    if (node.moduleId === 'viz_chart_grid') {
      const inputs = resolveInputs(nodeId);
      const rows = mergeVizInputs(inputs);
      runResults[nodeId] = { status:'done', data:{ _rows: rows } };
      setNodeStatus(nodeId, 'done');
      if (rows.length) openChartGrid(rows, configs[nodeId] || {});
      completed++;
      toastShow(`Done: Chart Grid`, (completed / order.length) * 100);
      continue;
    }

    try {
      const data = await callModule(node, dryRun);
      runResults[nodeId] = { status:'done', data };
      setNodeStatus(nodeId, 'done');
    } catch(err) {
      runResults[nodeId] = { status:'error', error: err.message };
      setNodeStatus(nodeId, 'error');
      flashMsg(`✕ ${def.label}: ${err.message}`, 'var(--red)');
    }
    // Show DBG button on node after run
    const dbgBtn = document.querySelector(`.flow-node[data-id="${nodeId}"] .node-dbg`);
    if (dbgBtn) dbgBtn.style.display = 'inline-block';

    completed++;
    toastShow(`Done: ${def.label}`, (completed / order.length) * 100);
  }

  toastHide();

  // Auto-open table with terminal node data if no viz_table node present
  const hasVizTable = nodes.some(n => n.moduleId === 'viz_table' || n.moduleId === 'viz_chart');
  if (!hasVizTable) {
    const terminals = findTerminalNodes(order);
    // Pick the last terminal that has rows
    let finalRows = null, finalTitle = '';
    for (const tid of terminals.slice().reverse()) {
      const d = runResults[tid]?.data;
      const rows = d?._rows;
      if (Array.isArray(rows) && rows.length) {
        finalRows = rows;
        finalTitle = MOD[nodes.find(n=>n.id===tid)?.moduleId]?.label || 'Results';
        break;
      }
    }
    if (finalRows) openTblModal(finalRows, finalTitle);
  }

  flashMsg(dryRun ? 'Dry run complete' : 'Flow executed!', 'var(--green)');
}

// ── Account cycle ──
async function runCycleFlow() {
  const enabled = accounts.filter(a => a.cycleEnabled);
  if (!enabled.length) { flashMsg('No accounts in cycle', 'var(--amber)'); return; }
  for (const acct of enabled) {
    activeAccountId = acct.id;
    flashMsg(`Running: ${acct.name}`, 'var(--cyan)');
    renderCredsTab();
    await runFlow(false);
    await new Promise(r => setTimeout(r, 800));
  }
  flashMsg('Cycle complete', 'var(--green)');
}

function loadFunction(name) {
  const fn = functions[name];
  if (!fn) return;
  const dirty = nodes.length > 0;
  if (dirty && !confirm(`Load flow "${name}"? Current canvas will be replaced.`)) return;
  // Restore canvas state
  document.getElementById('flow-name').value = fn.flowName || name;
  nodes = fn.nodes.map(n => ({ id:n.id, moduleId:n.moduleId, x:n.x, y:n.y }));
  edges = [...fn.edges];
  configs = {};
  fn.nodes.forEach(n => { configs[n.id] = n.config || {}; });
  if (fn.viewport) { pan = { ...fn.viewport.pan }; zoom = fn.viewport.zoom || 1; }
  const maxId = nodes.reduce((m,n) => { const num = parseInt(n.id.replace('n','')); return isNaN(num)?m:Math.max(m,num); }, 0);
  nodeIdCounter = maxId + 1;
  runResults = {};
  updateGrid(); renderAllNodes(); renderEdges(); renderInspector(); updateZoomLabel();
  switchTab('modules');
  flashMsg(`Loaded: ${name}`, 'var(--purple)');
}
