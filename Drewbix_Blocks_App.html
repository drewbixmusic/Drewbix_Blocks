          html += `</div>`;
        });
        html += `<button onclick="addSeriesRow('${node.id}')" style="width:100%;padding:6px;background:transparent;border:1px dashed #1e1e3a;border-radius:4px;color:#475569;font-family:var(--font);font-size:10px;cursor:pointer;margin-top:2px">+ Add Series</button>`;
        html += `</div>`;
        if (!upFields.length) html += `<div style="font-size:9px;color:var(--dim);margin-top:3px">⚡ Connect upstream node to populate field dropdowns</div>`;
      } else if (cfg.t === 'condrows') {
        const upFields = getUpstreamFields(node.id);
        const rows = Array.isArray(val) ? val : [];
        const NO_VAL_OPS = ['is_true','is_false'];
        const OPS = ['==','!=','>','<','>=','<=','in','not_in','starts_with','not_starts_with','ends_with','not_ends_with','contains','not_contains','is_true','is_false'];
        // Side-chain node connected to sc port — build nodename.fieldname options
        const scEdge = edges.find(e => e.to === node.id && e.toPort === 'sc');
        const scNode = scEdge ? nodes.find(n => n.id === scEdge.from) : null;
        const scNodeLabel = scNode ? (configs[scNode.id]?._label || MOD[scNode.moduleId]?.label || scNode.id) : null;
        const scFields = scNode ? (configs[scNode.id]?._headers || []) : [];
        const scOptions = scFields.map(f => ({ val: `sc::${f}`, label: `${scNodeLabel}.${f}` }));
        html += `<div id="condrows-${node.id}-${key}">`;
        rows.forEach((row, i) => {
          const needsVal = !NO_VAL_OPS.includes(row.op||'==');
          const rowSrc = row.value_src || 'manual';
          const isManual = rowSrc === 'manual' || !scOptions.length;
          html += `<div class="cond-row" style="flex-wrap:wrap;gap:3px">`;
          // Field dropdown
          if (upFields.length) {
            html += `<select style="flex:1;min-width:70px" onchange="updateCondRow('${node.id}','${key}',${i},'field',this.value)">
              <option value="">field…</option>
              ${upFields.map(f=>`<option value="${f}" ${row.field===f?'selected':''}>${f}</option>`).join('')}
            </select>`;
          } else {
            html += `<input type="text" value="${escH(row.field||'')}" placeholder="field" style="flex:1;min-width:70px" onchange="updateCondRow('${node.id}','${key}',${i},'field',this.value)">`;
          }
          // Operator dropdown
          html += `<select style="flex:0.9;min-width:60px" onchange="updateCondRow('${node.id}','${key}',${i},'op',this.value)">
            ${OPS.map(o=>`<option value="${o}" ${(row.op||'==')=== o?'selected':''}>${o}</option>`).join('')}
          </select>`;
          // Value source — manual or side-chain
          if (needsVal) {
            if (scOptions.length) {
              html += `<select style="flex:0.8;min-width:55px" onchange="updateCondRow('${node.id}','${key}',${i},'value_src',this.value)">
                <option value="manual" ${isManual?'selected':''}>manual</option>
                ${scOptions.map(o=>`<option value="${o.val}" ${rowSrc===o.val?'selected':''}>${escH(o.label)}</option>`).join('')}
              </select>`;
            }
            html += `<input type="text" value="${escH(row.value||'')}" placeholder="value"
              style="flex:1;min-width:60px;display:${isManual&&needsVal?'block':'none'}"
              onchange="updateCondRow('${node.id}','${key}',${i},'value',this.value)">`;
          }
          html += `<button class="cond-del" onclick="removeCondRow('${node.id}','${key}',${i})">×</button>`;
          html += `</div>`;
        });
        html += `<button class="cond-add" onclick="addCondRow('${node.id}','${key}')">+ Add Condition</button>`;
        html += `</div>`;
        if (!upFields.length) {
          html += `<div style="font-size:9px;color:var(--dim);margin-top:3px">⚡ Connect upstream node to populate field dropdowns</div>`;
        }
      } else if (cfg.t === 'rsqcfg') {
        const upFields = getUpstreamFields(node.id);
        const rsqVal = (typeof val === 'object' && val !== null) ? val : { dep: [], indep: [] };
        const dep   = Array.isArray(rsqVal.dep)   ? rsqVal.dep   : [];
        const indep = Array.isArray(rsqVal.indep)  ? rsqVal.indep  : [];
        const sx = `width:100%;box-sizing:border-box;background:#080810;border:1px solid #1e1e3a;border-radius:3px;color:#e2e8f0;padding:4px 6px;font-family:var(--font);font-size:10px`;

        // ── Dependent variables ──
        html += `<div style="font-size:9px;color:#06b6d4;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px">Dependent (Target) Variables</div>`;
        dep.forEach((d, di) => {
          html += `<div style="display:flex;gap:4px;margin-bottom:4px;align-items:center">`;
          if (upFields.length) {
            html += `<select style="${sx}" onchange="rsqUpdateDep('${node.id}','${key}',${di},this.value)">
              <option value="">— field —</option>
              ${upFields.map(f=>`<option value="${f}" ${d===f?'selected':''}>${escH(f)}</option>`).join('')}
            </select>`;
          } else {
            html += `<input type="text" value="${escH(d)}" placeholder="field name" style="${sx}" onchange="rsqUpdateDep('${node.id}','${key}',${di},this.value)">`;
          }
          html += `<button onclick="rsqRemoveDep('${node.id}','${key}',${di})" style="background:#1a0a0a;border:1px solid #3a1a1a;border-radius:3px;color:#ef4444;cursor:pointer;font-size:11px;padding:2px 6px">✕</button>`;
          html += `</div>`;
        });
        html += `<button onclick="rsqAddDep('${node.id}','${key}')" style="width:100%;padding:4px;background:transparent;border:1px dashed #1e3a1e;border-radius:3px;color:#84cc16;font-family:var(--font);font-size:9px;cursor:pointer;margin-bottom:10px">+ Add Dependent Variable</button>`;

        // ── Independent variables ──
        html += `<div style="font-size:9px;color:#f59e0b;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px">Independent Variables</div>`;
        html += `<button onclick="rsqPopulateIndep('${node.id}','${key}')" style="width:100%;padding:4px;background:transparent;border:1px dashed #3a2a00;border-radius:3px;color:#f59e0b;font-family:var(--font);font-size:9px;cursor:pointer;margin-bottom:6px">⚡ Populate All (non-dependent) Fields</button>`;
        if (indep.length) {
          html += `<div style="max-height:160px;overflow-y:auto;border:1px solid #1e1e3a;border-radius:4px;padding:4px">`;
          indep.forEach((iv, ii) => {
            html += `<label style="display:flex;align-items:center;gap:6px;padding:2px 4px;font-size:9px;color:#e2e8f0;cursor:pointer">
              <input type="checkbox" ${iv.enabled!==false?'checked':''} onchange="rsqToggleIndep('${node.id}','${key}',${ii},this.checked)">
              <span style="flex:1">${escH(iv.name)}</span>
            </label>`;
          });
          html += `</div>`;
        } else {
          html += `<div style="font-size:9px;color:#475569;font-style:italic;padding:4px">No independent variables configured — click Populate above.</div>`;
        }
      } else if (cfg.t === 'mvcfg') {
        const upFields = getUpstreamFields(node.id);
        const mvVal = (typeof val === 'object' && val !== null) ? val : { dep: [], indep: [] };
        const dep   = Array.isArray(mvVal.dep)   ? mvVal.dep   : [];
        const indep = Array.isArray(mvVal.indep)  ? mvVal.indep  : [];
        const sx = `width:100%;box-sizing:border-box;background:#080810;border:1px solid #1e1e3a;border-radius:3px;color:#e2e8f0;padding:4px 6px;font-family:var(--font);font-size:10px`;

        // Check if rsq is connected — show notice if so
        const rsqConnected = edges.some(e => e.to === node.id && e.toPort === 'rsq');
        if (rsqConnected) {
          html += `<div style="font-size:9px;color:#f59e0b;background:#1a1200;border:1px solid #3a2a00;border-radius:4px;padding:6px;margin-bottom:8px">⚡ RSQ input connected — dependent variables and feature order will be auto-configured from Pearson R² output at run time. Manual config below used as fallback only.</div>`;
        }

        // ── Dependent variables ──
        html += `<div style="font-size:9px;color:#06b6d4;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px">Dependent (Target) Variables</div>`;
        dep.forEach((d, di) => {
          html += `<div style="display:flex;gap:4px;margin-bottom:4px;align-items:center">`;
          if (upFields.length) {
            html += `<select style="${sx}" onchange="mvUpdateDep('${node.id}','${key}',${di},this.value)">
              <option value="">— field —</option>
              ${upFields.map(f=>`<option value="${f}" ${d===f?'selected':''}>${escH(f)}</option>`).join('')}
            </select>`;
          } else {
            html += `<input type="text" value="${escH(d)}" placeholder="field name" style="${sx}" onchange="mvUpdateDep('${node.id}','${key}',${di},this.value)">`;
          }
          html += `<button onclick="mvRemoveDep('${node.id}','${key}',${di})" style="background:#1a0a0a;border:1px solid #3a1a1a;border-radius:3px;color:#ef4444;cursor:pointer;font-size:11px;padding:2px 6px">✕</button>`;
          html += `</div>`;
        });
        html += `<button onclick="mvAddDep('${node.id}','${key}')" style="width:100%;padding:4px;background:transparent;border:1px dashed #1e3a1e;border-radius:3px;color:#84cc16;font-family:var(--font);font-size:9px;cursor:pointer;margin-bottom:10px">+ Add Dependent Variable</button>`;

        // ── Independent variables ──
        html += `<div style="font-size:9px;color:#f59e0b;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px">Independent Variables</div>`;
        html += `<button onclick="mvPopulateIndep('${node.id}','${key}')" style="width:100%;padding:4px;background:transparent;border:1px dashed #3a2a00;border-radius:3px;color:#f59e0b;font-family:var(--font);font-size:9px;cursor:pointer;margin-bottom:6px">⚡ Populate All (non-dependent) Fields</button>`;
        if (indep.length) {
          html += `<div style="max-height:160px;overflow-y:auto;border:1px solid #1e1e3a;border-radius:4px;padding:4px">`;
          indep.forEach((iv, ii) => {
            html += `<label style="display:flex;align-items:center;gap:6px;padding:2px 4px;font-size:9px;color:#e2e8f0;cursor:pointer">
              <input type="checkbox" ${iv.enabled!==false?'checked':''} onchange="mvToggleIndep('${node.id}','${key}',${ii},this.checked)">
              <span style="flex:1">${escH(iv.name)}</span>
            </label>`;
          });
          html += `</div>`;
        } else {
          html += `<div style="font-size:9px;color:#475569;font-style:italic;padding:4px">No independent variables configured — click Populate above.</div>`;
        }
      } else if (cfg.t === 'rfmodelinfo') {
        // This type is never in MOD cfg — rendered inline below for rand_forest
      } else if (cfg.t === 'colorder') {
        // val is an array of {name, visible} — or empty meaning "auto from upstream"
        const cols = Array.isArray(val) && val.length ? val : [];
        const upFields = getUpstreamFields(node.id);
        if (!upFields.length && !cols.length) {
          html += `<div class="colorder-empty">⚡ Connect upstream node to configure columns</div>`;
        } else {
          // Merge: keep existing order/visibility, append any new upstream fields
          const merged = mergeColOrder(cols, upFields);
          // Persist merged back silently so it's ready at run time
          if (configs[node.id]) configs[node.id][key] = merged;
          html += `<div class="colorder-wrap" id="colorder-${node.id}-${key}">`;
          html += `<div class="colorder-hint">☰ drag to reorder · ✓ check to show</div>`;
          merged.forEach((col, i) => {
            html += `<div class="col-item" draggable="true"
              data-node="${node.id}" data-key="${key}" data-idx="${i}"
              ondragstart="colDragStart(event,${i})"
              ondragover="colDragOver(event,${i})"
              ondragleave="colDragLeave(event)"
              ondrop="colDrop(event,'${node.id}','${key}',${i})"
              ondragend="colDragEnd(event)">
              <span class="col-drag-handle">⠿</span>
              <input type="checkbox" class="col-check" ${col.visible!==false?'checked':''}
                onchange="colToggleVisible('${node.id}','${key}',${i},this.checked)">
              <span class="col-name" title="${escH(col.name)}">${escH(col.name)}</span>
            </div>`;
          });
          html += `</div>`;
          html += `<div class="colorder-actions">
            <button class="colorder-btn" onclick="colCheckAll('${node.id}','${key}',true)">All</button>
            <button class="colorder-btn" onclick="colCheckAll('${node.id}','${key}',false)">None</button>
            <button class="colorder-btn" onclick="colReset('${node.id}','${key}')">Reset</button>
          </div>`;
        }
      } else if (cfg.t === 'fieldpick') {
        // Multi-select checkboxes from upstream fields — all checked by default
        const upFields = getUpstreamFields(node.id);
        const saved = Array.isArray(val) && val.length ? val : null;
        const cols = saved ? saved : upFields.map(f => ({ name: f, visible: true }));
        if (!upFields.length && !cols.length) {
          html += `<div class="colorder-empty">⚡ Connect upstream node to select fields</div>`;
        } else {
          // Merge: keep saved state, append any new upstream fields
          const merged = mergeColOrder(cols, upFields.length ? upFields : cols.map(c=>c.name));
          if (configs[node.id]) configs[node.id][key] = merged;
          html += `<div class="colorder-wrap" id="colorder-${node.id}-${key}">`;
          html += `<div class="colorder-hint">✓ check fields to include · ☰ drag to reorder</div>`;
          merged.forEach((col, i) => {
            html += `<div class="col-item" draggable="true"
              ondragstart="colDragStart(event,${i})"
              ondragover="colDragOver(event,${i})"
              ondragleave="colDragLeave(event)"
              ondrop="colDrop(event,'${node.id}','${key}',${i})"
              ondragend="colDragEnd(event)">
              <span class="col-drag-handle">⠿</span>
              <input type="checkbox" class="col-check" ${col.visible!==false?'checked':''}
                onchange="colToggleVisible('${node.id}','${key}',${i},this.checked)">
              <span class="col-name" title="${escH(col.name)}">${escH(col.name)}</span>
            </div>`;
          });
          html += `</div>`;
          html += `<div class="colorder-actions">
            <button class="colorder-btn" onclick="colCheckAll('${node.id}','${key}',true)">All</button>
            <button class="colorder-btn" onclick="colCheckAll('${node.id}','${key}',false)">None</button>
            <button class="colorder-btn" onclick="colReset('${node.id}','${key}')">Reset</button>
          </div>`;
        }
      } else if (cfg.t === 'textarea') {
        html += renderField(node.id, key, cfg, val);
      } else if (cfg.t === 'number' || cfg.t === 'text') {
        html += renderField(node.id, key, cfg, val);
      } else if (cfg.t === 'fnpick') {
        // ── Module/function picker ────────────────────────────────────
        const catOrder = Object.keys(CATS);
        const grouped = {};
        catOrder.forEach(c => { grouped[c] = []; });
        Object.entries(MOD).forEach(([id, def]) => {
          if (def._isViz) return;
          const c = def.cat || 'dataproc';
          if (!grouped[c]) grouped[c] = [];
          grouped[c].push({ id, label: def.label });
        });
        const fnNames = Object.keys(functions);
        html += `<select class="field-select" data-node="${node.id}" data-key="${key}" onchange="updateCfg(this);renderInspector()">
          <option value="">— select module or function —</option>`;
        catOrder.forEach(c => {
          if (!grouped[c]?.length) return;
          html += `<optgroup label="${CATS[c].l}">`;
          grouped[c].forEach(m => {
            html += `<option value="mod::${m.id}" ${val===`mod::${m.id}`?'selected':''}>${m.label}</option>`;
          });
          html += `</optgroup>`;
        });
        if (fnNames.length) {
          html += `<optgroup label="── User Functions ──">`;
          fnNames.forEach(n => {
            html += `<option value="fn::${n}" ${val===`fn::${n}`?'selected':''}>${n}</option>`;
          });
          html += `</optgroup>`;
        }
        html += `</select>`;

        // ── Dynamically render the selected module's own config fields ─
        if (val && val.startsWith('mod::')) {
          const innerModId = val.slice(5);
          const innerDef = MOD[innerModId];
          if (innerDef && innerDef.cfg) {
            const innerCfgEntries = Object.entries(modCfg(innerDef))
              .filter(([k]) => !['seriesrows','condrows','colorder','fnpick'].includes(innerDef.cfg[k]?.t));
            if (innerCfgEntries.length) {
              html += `<div style="margin-top:6px;padding:6px 8px;background:#0d0d1a;border:1px solid #1e1e3a;border-radius:4px">`;
              html += `<div style="font-size:9px;color:#a855f7;letter-spacing:1px;margin-bottom:5px">↻ ${innerDef.label} PARAMS</div>`;
              innerCfgEntries.forEach(([iKey, iCfg]) => {
                // Skip for_each's own reserved keys to avoid collision
                if (iKey === 'key_field' || iKey === 'fn_name') return;
                // Read value from node config, fall back to inner module default
                const iVal = configs[node.id]?.[iKey] ?? iCfg.d;
                const fieldHtml = renderField(node.id, iKey, iCfg, iVal);
                if (!fieldHtml) return;
                html += `<div class="field-group"><label class="field-label">${iCfg.l}</label>${fieldHtml}</div>`;
              });
              html += `</div>`;
            }
          }
        } else if (val && val.startsWith('fn::')) {
          html += `<div style="margin-top:4px;font-size:9px;color:var(--dim)">User function — configure inside the saved flow.</div>`;
        }
      } else if (cfg.t === 'bool') {
        html += renderField(node.id, key, cfg, val);
      }
      html += `</div>`;
    });
    html += `</div>`;
  } else {
    html += `<div class="no-cfg">No configuration options.</div>`;
  }

  // Ports
  if (def.in.length || def.out.length) {
    html += `<div class="insp-section"><div class="insp-section-title">Ports</div>`;
    def.in.forEach(p => { html += `<div class="port-list-item">← ${p}</div>`; });
    def.out.forEach(p => { html += `<div class="port-list-item">→ ${p}</div>`; });
    html += `</div>`;
  }

  // Connections
  const nodeEdges = edges.filter(e => e.from === node.id || e.to === node.id);
  if (nodeEdges.length) {
    html += `<div class="insp-section"><div class="insp-section-title">Connections</div>`;
    nodeEdges.forEach(edge => {
      const otherId = edge.from === node.id ? edge.to : edge.from;
      const other = nodes.find(n => n.id === otherId);
      const otherDef = other ? MOD[other.moduleId] : null;
      const dir = edge.from === node.id ? '→' : '←';
      html += `<div class="conn-row">
        <span style="color:${def.color}">${dir}</span>
        <span style="color:${otherDef?.color||'#888'}">${otherDef?.label||'?'}</span>
        <span style="color:var(--muted);font-size:9px">.${edge.from===node.id?edge.fromPort:edge.toPort}</span>
        <button class="conn-del" onclick="deleteEdge('${edge.id}')">×</button>
      </div>`;
    });
    html += `</div>`;
  }

  content.innerHTML = html;
}

function getUpstreamFields(nodeId, visited) {
  visited = visited || new Set();
  if (visited.has(nodeId)) return [];
  visited.add(nodeId);

  const fields = new Set();
  edges.filter(e => e.to === nodeId).forEach(e => {
    const upNode = nodes.find(n => n.id === e.from);
    if (!upNode) return;

    // 1. Runtime headers on this node — best source, use directly.
    // If the edge comes from a named port (e.g. 'actuals' from convergences),
    // check for a port-specific _headers_<port> entry first.
    const portKey = e.fromPort && e.fromPort !== 'data' ? `_headers_${e.fromPort}` : null;
    const portHeaders = portKey ? configs[upNode.id]?.[portKey] : null;
    if (Array.isArray(portHeaders) && portHeaders.length) {
      portHeaders.forEach(f => fields.add(f));
      return;
    }
    const liveHeaders = configs[upNode.id]?._headers;
    if (Array.isArray(liveHeaders) && liveHeaders.length) {
      liveHeaders.forEach(f => fields.add(f));
      return;
    }

    // 2. If upstream node is a pass-through transform (filter, multi_filter,
    //    select_fields, join, dataset, dp_precision, symbol_intersect, transpose)
    //    it hasn't run yet so _headers is empty — recurse further up the chain.
    const passThroughMods = new Set([
      'filter','multi_filter','select_fields','join','dataset',
      'dp_precision','symbol_intersect','transpose','gate_and',
      'gate_or','gate_nand','gate_nor','gate_xor','gate_inverter'
    ]);
    if (passThroughMods.has(upNode.moduleId)) {
      getUpstreamFields(upNode.id, visited).forEach(f => fields.add(f));
      return;
    }

    // 3. Last resort — hardcoded MOD out ports (only 'data' now, not useful for field names)
    // Skip 'data' since it's not a real field name
    MOD[upNode.moduleId].out.filter(p => p !== 'data').forEach(f => fields.add(f));
  });

  return [...fields].filter(f => !f.startsWith('_'));
}

function updateCfg(el) {
  const {node: nid, key} = el.dataset;
  configs[nid][key] = el.type === 'number' ? Number(el.value) : el.value;
  if (key === '_label') { const n = nodes.find(x=>x.id===nid); if (n) updateNodeEl(n); }
}

function addSeriesRow(nodeId) {
  if (!configs[nodeId]) configs[nodeId] = {};
  const arr = Array.isArray(configs[nodeId].series) ? [...configs[nodeId].series] : [];
  arr.push({ x_field:'', y_field:'', axis:'pri', line_style:'straight', line_weight:1.5, line_alpha:80, marker_style:'off', marker_size:4, marker_alpha:80, zoom_include:true });
  configs[nodeId].series = arr;
  renderInspector();
}

function removeSeriesRow(nodeId, idx) {
  if (!configs[nodeId]) return;
  const arr = Array.isArray(configs[nodeId].series) ? [...configs[nodeId].series] : [];
  arr.splice(idx, 1);
  configs[nodeId].series = arr;
  renderInspector();
}

function updateSeriesRow(nodeId, idx, prop, value) {
  if (!configs[nodeId]) configs[nodeId] = {};
  const arr = Array.isArray(configs[nodeId].series) ? [...configs[nodeId].series] : [];
  if (!arr[idx]) arr[idx] = {};
  arr[idx] = { ...arr[idx], [prop]: value };
  configs[nodeId].series = arr;
}

function addCondRow(nodeId, key) {
  if (!configs[nodeId]) configs[nodeId] = {};
  const arr = Array.isArray(configs[nodeId][key]) ? [...configs[nodeId][key]] : [];
  arr.push({ field:'', op:'is_true', value:'' });
  configs[nodeId][key] = arr;
  renderInspector();
}

function removeCondRow(nodeId, key, idx) {
  if (!configs[nodeId]) return;
  const arr = Array.isArray(configs[nodeId][key]) ? [...configs[nodeId][key]] : [];
  arr.splice(idx, 1);
  configs[nodeId][key] = arr;
  renderInspector();
}

function updateCondRow(nodeId, key, idx, prop, value) {
  if (!configs[nodeId]) configs[nodeId] = {};
  const arr = Array.isArray(configs[nodeId][key]) ? [...configs[nodeId][key]] : [];
  if (!arr[idx]) arr[idx] = { field:'', op:'is_true', value:'' };
  arr[idx] = { ...arr[idx], [prop]: value };
  configs[nodeId][key] = arr;
  // Hide/show value input without full re-render
  const NO_VAL_OPS = ['is_true','is_false'];
  const row = document.querySelectorAll(`#condrows-${nodeId}-${key} .cond-row`)[idx];
  if (row) {
    const valInput = row.querySelectorAll('input[type=text]')[prop==='field'?0:0];
    const allInputs = row.querySelectorAll('input[type=text]');
    const lastInput = allInputs[allInputs.length-1];
    if (prop === 'op' && lastInput) {
      lastInput.style.display = NO_VAL_OPS.includes(value) ? 'none' : 'block';
    }
  }
}

// ── RSQ config helpers ──
function rsqGetVal(nodeId, key) {
  const v = configs[nodeId]?.[key];
  return (v && typeof v === 'object') ? v : { dep: [], indep: [] };
}
function rsqSave(nodeId, key, val) {
  if (!configs[nodeId]) configs[nodeId] = {};
  configs[nodeId][key] = val;
  renderInspector();
}
function rsqAddDep(nodeId, key) {
  const v = rsqGetVal(nodeId, key);
  rsqSave(nodeId, key, { ...v, dep: [...v.dep, ''] });
}
function rsqRemoveDep(nodeId, key, idx) {
  const v = rsqGetVal(nodeId, key);
  const dep = v.dep.filter((_, i) => i !== idx);
  rsqSave(nodeId, key, { ...v, dep });
}
function rsqUpdateDep(nodeId, key, idx, val) {
  const v = rsqGetVal(nodeId, key);
  const dep = [...v.dep]; dep[idx] = val;
  rsqSave(nodeId, key, { ...v, dep });
}
function rsqToggleIndep(nodeId, key, idx, enabled) {
  const v = rsqGetVal(nodeId, key);
  const indep = v.indep.map((iv, i) => i === idx ? { ...iv, enabled } : iv);
  if (!configs[nodeId]) configs[nodeId] = {};
  configs[nodeId][key] = { ...v, indep };
  // No full re-render needed for checkbox toggle
}
function rsqPopulateIndep(nodeId, key) {
  const v = rsqGetVal(nodeId, key);
  const upFields = getUpstreamFields(nodeId);
  const depSet = new Set(v.dep.filter(Boolean));
  // Keep existing indep entries, append any new fields not already in list
  const existingNames = new Set(v.indep.map(iv => iv.name));
  const newEntries = upFields
    .filter(f => !depSet.has(f) && !existingNames.has(f))
    .map(f => ({ name: f, enabled: true }));
  const indep = [
    ...v.indep.filter(iv => !depSet.has(iv.name)), // remove any that became dependent
    ...newEntries
  ];
  rsqSave(nodeId, key, { ...v, indep });
}

// ── Column order helpers ──

// Merge saved col order with live upstream fields.
// Keeps existing order/visibility, appends unseen fields as visible.
function mergeColOrder(saved, upFields) {
  const seen = new Set(saved.map(c => c.name));
  const merged = saved.filter(c => upFields.length === 0 || upFields.includes(c.name));
  upFields.forEach(f => { if (!seen.has(f)) merged.push({ name: f, visible: true }); });
  return merged;
}

// Drag state
let colDragIdx = null;

function colDragStart(e, idx) {
  colDragIdx = idx;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function colDragOver(e, idx) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (idx !== colDragIdx) e.currentTarget.classList.add('drag-over');
}

function colDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function colDrop(e, nodeId, key, toIdx) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (colDragIdx === null || colDragIdx === toIdx) return;
  const arr = [...(configs[nodeId][key] || [])];
  const [moved] = arr.splice(colDragIdx, 1);
  arr.splice(toIdx, 0, moved);
  configs[nodeId][key] = arr;
  colDragIdx = null;
  renderInspector();
}

function colDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  colDragIdx = null;
}

function colToggleVisible(nodeId, key, idx, checked) {
  const arr = configs[nodeId][key];
  if (arr && arr[idx]) arr[idx].visible = checked;
}

function colCheckAll(nodeId, key, checked) {
  const arr = configs[nodeId][key];
  if (arr) arr.forEach(c => c.visible = checked);
  renderInspector();
}

function colReset(nodeId, key) {
  const upFields = getUpstreamFields(nodeId);
  configs[nodeId][key] = upFields.map(f => ({ name: f, visible: true }));
  renderInspector();
}

function toggleChip(btn) {
  const {node: nid, key, val} = btn.dataset;
  let arr = Array.isArray(configs[nid][key]) ? [...configs[nid][key]] : [];
  if (arr.includes(val)) arr = arr.filter(x=>x!==val); else arr.push(val);
  configs[nid][key] = arr;
  btn.classList.toggle('on', arr.includes(val));
}

function toggleBool(btn) {
  const {node: nid, key, val} = btn.dataset;
  configs[nid][key] = val === 'true';
  btn.closest('.bool-row').querySelectorAll('.bool-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

function tapAddModule(moduleId) {
  // On mobile, tap = add to center of canvas
  const rect = canvasRect();
  const w = screenToWorld(rect.width/2, rect.height/2);
  addNode(moduleId, snap(w.x - NODE_W/2 + (Math.random()-0.5)*80), snap(w.y - 40 + (Math.random()-0.5)*60));
  if (window.innerWidth <= 768) closeSidebar();
}

// Touch drag from palette
let paletteDragModuleId = null, paletteDragActive = false;
function paletteTouchStart(e, moduleId) {
  paletteDragModuleId = moduleId;
  paletteDragActive = false;
}
function paletteTouchMove(e) {
  if (!paletteDragModuleId) return;
  paletteDragActive = true;
  const ghost = document.getElementById('drag-ghost');
  const t = e.touches[0];
  ghost.textContent = MOD[paletteDragModuleId].icon + ' ' + MOD[paletteDragModuleId].label;
  ghost.style.display = 'block';
  ghost.style.left = (t.clientX - 60) + 'px';
  ghost.style.top = (t.clientY - 20) + 'px';
}
function paletteTouchEnd(e, moduleId) {
  const ghost = document.getElementById('drag-ghost');
  ghost.style.display = 'none';
  if (!paletteDragActive) { tapAddModule(moduleId); paletteDragModuleId=null; return; }
  paletteDragActive = false;
  const t = e.changedTouches[0];
  const rect = canvasRect();
  // check if dropped on canvas
  if (t.clientX >= rect.left && t.clientX <= rect.right && t.clientY >= rect.top && t.clientY <= rect.bottom) {
    const w = screenToWorld(t.clientX - rect.left, t.clientY - rect.top);
    addNode(moduleId, snap(w.x - NODE_W/2), snap(w.y - 40));
    if (window.innerWidth <= 768) closeSidebar();
  }
  paletteDragModuleId = null;
}

// Cycle logic
let cycleTimer = null;
function startCycle() {
  cycleRunning = true; cycleIndex = 0;
  clearInterval(cycleTimer);
  renderCredsTab();
  // In a real app this would iterate and call API per account
  // Here we simulate cycling every 2s for demo
  cycleTimer = setInterval(() => {
    const enabled = accounts.filter(a=>a.cycleEnabled);
    if (!enabled.length) return;
    cycleIndex = (cycleIndex+1) % enabled.length;
    activeAccountId = enabled[cycleIndex].id;
    renderCredsTab();
  }, 2000);
}
function stopCycle() {
  cycleRunning = false; clearInterval(cycleTimer);
  renderCredsTab();
}
function stepCycle() {
  const enabled = accounts.filter(a=>a.cycleEnabled);
  if (!enabled.length) return;
  cycleIndex = (cycleIndex+1) % enabled.length;
  activeAccountId = enabled[cycleIndex].id;
  renderCredsTab();
}

// FLOW SERIALIZATION
// ═══════════════════════════════════════════════════════════════════════
function getFlowObject() {
  return {
    name: document.getElementById('flow-name').value || 'Unnamed',
    version: "1.2",
    created: new Date().toISOString(),
    accounts: accounts.map(a => ({ id:a.id, name:a.name, env:a.env, key:a.key, secret:a.secret, cycleEnabled:a.cycleEnabled })),
    activeAccountId,
    nodes: nodes.map(n => ({ id:n.id, moduleId:n.moduleId, x:n.x, y:n.y, config:configs[n.id]||{} })),
    edges,
    viewport: { pan, zoom },
    functions,  // entire named flows map persists here
    rf_models: configs['__rf_models__'] || {}  // cumulative RF models persist with flow
  };
}

function loadFlowObject(flow) {
  document.getElementById('flow-name').value = flow.name || '';
  nodes = (flow.nodes||[]).map(n => ({ id:n.id, moduleId:n.moduleId, x:n.x, y:n.y }));
  edges = flow.edges||[];
  configs = {};
  (flow.nodes||[]).forEach(n => { configs[n.id] = n.config||{}; });
  accounts = (flow.accounts||[]);
  activeAccountId = flow.activeAccountId||accounts[0]?.id||null;
  if (flow.viewport) { pan = flow.viewport.pan||{x:0,y:0}; zoom = flow.viewport.zoom||1; }
  // Restore named flows if present
  if (flow.functions && typeof flow.functions === 'object') {
    functions = flow.functions;
  }
  if (flow.rf_models && typeof flow.rf_models === 'object') {
    configs['__rf_models__'] = flow.rf_models;
  }
  const maxId = nodes.reduce((m,n) => { const num = parseInt(n.id.replace('n','')); return isNaN(num)?m:Math.max(m,num); }, 0);
  nodeIdCounter = maxId + 1;
  runResults = {};
  updateGrid(); renderAllNodes(); renderEdges(); renderCredsTab(); renderInspector(); updateZoomLabel();
  renderFuncsTab();
  buildPalette();
}

function saveFlow() {
  const flow = getFlowObject();
  const idx = savedFlows.findIndex(f => f.name === flow.name);
  if (idx >= 0) savedFlows[idx] = flow; else savedFlows.push(flow);
  renderSavedTab();
  switchTab('saved');
  flashMsg('Flow saved!', 'var(--green)');
}

function loadSaved(name) {
  const flow = savedFlows.find(f => f.name === name);
  if (flow) { loadFlowObject(flow); switchTab('modules'); }
}

function exportSaved(name) {
  const flow = savedFlows.find(f => f.name === name);
  if (flow) downloadJson(flow, flow.name);
}

function deleteSaved(name) {
  savedFlows = savedFlows.filter(f => f.name !== name);
  renderSavedTab();
}

function exportFlow() {
  downloadJson(getFlowObject(), document.getElementById('flow-name').value || 'flow');
}

function downloadJson(obj, filename) {
  const blob = new Blob([JSON.stringify(obj, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename.replace(/\s+/g,'_') + '.flow.json'; a.click();
  URL.revokeObjectURL(url);
}

function importFlow(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const flow = JSON.parse(ev.target.result);
      loadFlowObject(flow);
      flashMsg('Flow imported!', 'var(--cyan)');
    } catch { flashMsg('Invalid flow file', 'var(--red)'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function clearCanvas() {
  if (!confirm('Clear the canvas?')) return;
  nodes = []; edges = []; configs = {}; selectedId = null;
  renderAllNodes(); renderEdges(); renderInspector();
}

// ═══════════════════════════════════════════════════════════════════════
// CODE EXPORT
// ═══════════════════════════════════════════════════════════════════════
function generateCode() {
  const flow = getFlowObject();
  const order = topoSort();

  // Build a readable execution trace of the live flow
  const sections = [];

  // Header
  sections.push(`◈ FLOW: ${flow.name}`);
  sections.push(`Generated: ${new Date().toLocaleString()}`);
  sections.push(`Nodes: ${flow.nodes.length}  Edges: ${flow.edges.length}  Account: ${flow.accounts.find(a=>a.id===activeAccountId)?.name||'(none)'}`);
  sections.push(`${'─'.repeat(60)}`);

  // Execution order with full config and wiring for each node
  sections.push(`\nEXECUTION ORDER\n`);
  order.forEach((nodeId, i) => {
    const n = flow.nodes.find(x=>x.id===nodeId);
    if (!n) return;
    const def = MOD[n.moduleId];
    const cfg = n.config || {};
    const inEdges  = flow.edges.filter(e=>e.to===nodeId);
    const outEdges = flow.edges.filter(e=>e.from===nodeId);

    sections.push(`[${i+1}] ${def.icon} ${def.label}  (${nodeId})`);

    // Config values (skip internal _headers etc)
    const cfgEntries = Object.entries(cfg).filter(([k])=>!k.startsWith('_'));
    if (cfgEntries.length) {
      cfgEntries.forEach(([k,v]) => {
        sections.push(`     cfg.${k} = ${JSON.stringify(v)}`);
      });
    }

    // Discovered headers if available
    if (Array.isArray(cfg._headers) && cfg._headers.length) {
      sections.push(`     headers: [${cfg._headers.join(', ')}]`);
    }

    // Wiring
    inEdges.forEach(e => {
      const src = flow.nodes.find(x=>x.id===e.from);
      sections.push(`     ← ${MOD[src?.moduleId]?.label||'?'} (${e.from}).${e.fromPort}  →  .${e.toPort}`);
    });
    outEdges.forEach(e => {
      const dst = flow.nodes.find(x=>x.id===e.to);
      sections.push(`     → .${e.fromPort}  →  ${MOD[dst?.moduleId]?.label||'?'} (${e.to}).${e.toPort}`);
    });

    // Runtime result summary if flow has been run
    const result = runResults[nodeId];
    if (result) {
      if (result.error) {
        sections.push(`     ✕ ERROR: ${result.error}`);
      } else {
        const rows = result.data?._rows || result.data?.data;
        if (Array.isArray(rows)) {
          sections.push(`     ✓ ${rows.length} rows out`);
          if (rows.length) {
            sections.push(`     keys: ${Object.keys(rows[0]).filter(k=>!k.startsWith('_')).join(', ')}`);
            sections.push(`     row[0]: ${JSON.stringify(rows[0]).slice(0,300)}`);
          } else {
            sections.push(`     ⚠ 0 rows — nothing passed through`);
          }
        }
      }
    } else {
      sections.push(`     (not run)`);
    }
    sections.push('');
  });

  // Edge map
  sections.push(`${'─'.repeat(60)}\nEDGE MAP\n`);
  flow.edges.forEach(e => {
    const fn = flow.nodes.find(n=>n.id===e.from);
    const tn = flow.nodes.find(n=>n.id===e.to);
    sections.push(`  ${MOD[fn?.moduleId]?.label||'?'} (${e.from}).${e.fromPort}`);
    sections.push(`    → ${MOD[tn?.moduleId]?.label||'?'} (${e.to}).${e.toPort}`);
  });

  // Account info (keys redacted)
  sections.push(`\n${'─'.repeat(60)}\nACCOUNTS\n`);
  flow.accounts.forEach(a => {
    sections.push(`  ${a.name} [${a.env}]  key: ${a.key ? a.key.slice(0,8)+'…' : '(none)'}`);
  });

  const text = sections.join('\n');

  // Show in popup
  let ov = document.getElementById('code-ov');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'code-ov';
    ov.style.cssText = [
      'position:fixed','top:50%','left:50%','transform:translate(-50%,-50%)',
      'background:#0d0d1a','border:2px solid #f59e0b','border-radius:8px',
      'padding:0','z-index:9999','width:min(780px,94vw)','max-height:82vh',
      'display:flex','flex-direction:column',
      'font-family:JetBrains Mono,Courier New,monospace',
      'box-shadow:0 0 60px rgba(245,158,11,0.25)'
    ].join(';');
    document.body.appendChild(ov);
  }
  ov.innerHTML =
    `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#111122;border-bottom:1px solid #1e1e3a;flex-shrink:0">` +
      `<span style="color:#f59e0b;font-size:12px;font-weight:700;letter-spacing:2px">◈ FLOW TRACE</span>` +
      `<div style="display:flex;gap:8px;align-items:center">` +
        `<button onclick="navigator.clipboard.writeText(document.getElementById('code-pre').textContent).then(()=>flashMsg('Copied!','var(--green)'))" ` +
          `style="background:transparent;border:1px solid #f59e0b44;color:#f59e0b;border-radius:3px;padding:3px 10px;font-family:inherit;font-size:10px;cursor:pointer">Copy</button>` +
        `<button onclick="document.getElementById('code-ov').style.display='none'" ` +
          `style="background:transparent;border:none;color:#ef4444;font-size:20px;cursor:pointer;line-height:1">×</button>` +
      `</div>` +
    `</div>` +
    `<pre id="code-pre" style="margin:0;padding:14px 18px;overflow:auto;font-size:11px;color:#e2e8f0;white-space:pre-wrap;word-break:break-all;flex:1">${escH(text)}</pre>`;
  ov.style.display = 'flex';
}

// EXECUTABLE CODE GENERATOR (engine-clone approach)
// ═══════════════════════════════════════════════════════════════════════
function generateExecutableCode() {
  const flow = getFlowObject();
  const acct = accounts.find(a => a.id === activeAccountId);

  // Extract a named function verbatim from the live page source
  function extractFn(src, fnName) {
    const startRe = new RegExp(`(async\\s+)?function\\s+${fnName}\\s*\\(`);
    const startIdx = src.search(startRe);
    if (startIdx === -1) return `// ERROR: could not extract ${fnName}`;
    let depth = 0, i = startIdx, inStr = false, strChar = '', escape = false;
    while (i < src.length) {
      const ch = src[i];
      if (escape) { escape = false; i++; continue; }
      if (ch === '\\' && inStr) { escape = true; i++; continue; }
      if (!inStr && (ch === '"' || ch === "'" || ch === '`')) { inStr = true; strChar = ch; i++; continue; }
      if (inStr && ch === strChar) { inStr = false; i++; continue; }
      if (!inStr && ch === '{') depth++;
      if (!inStr && ch === '}') { depth--; if (depth === 0) return src.slice(startIdx, i + 1); }
      i++;
    }
    return `// ERROR: brace mismatch extracting ${fnName}`;
  }

  const allSrc = [...document.querySelectorAll('script:not([src])')].map(s => s.textContent).join('\n');

  const scalarPortsCode = allSrc.match(/const SCALAR_PORTS\s*=\s*new Set\([^)]+\);/)?.[0]
    || "const SCALAR_PORTS = new Set(['start','end','name','a','b','timestamp','ref']);";
  const topoSortCode   = extractFn(allSrc, 'topoSort');
  const resolveCode    = extractFn(allSrc, 'resolveInputs');
  const callModCode    = extractFn(allSrc, 'callModule');

  const lines = [];
  lines.push(`// ${'='.repeat(60)}`);
  lines.push(`// Flow: ${flow.name}`);
  lines.push(`// Generated: ${new Date().toLocaleString()}`);
  lines.push(`// Engine-clone export — all modules supported automatically.`);
  lines.push(`// Run in browser console or Node.js (with node-fetch).`);
  lines.push(`// ${'='.repeat(60)}`);
  lines.push(``);
  lines.push(`// ── Credentials ──────────────────────────────────────────────`);
  lines.push(`// WARNING: keep this file private — it contains your API keys.`);
  lines.push(`const CRED_KEY    = '${acct?.key    || 'YOUR_KEY_HERE'}';`);
  lines.push(`const CRED_SECRET = '${acct?.secret || 'YOUR_SECRET_HERE'}';`);
  lines.push(`const CRED_ENV    = '${acct?.env    || 'paper'}';`);
  lines.push(``);
  lines.push(`// ── Flow data ─────────────────────────────────────────────────`);
  lines.push(`let nodes    = ${JSON.stringify(nodes.map(n=>({id:n.id,moduleId:n.moduleId,x:n.x,y:n.y})), null, 2)};`);
  lines.push(`let edges    = ${JSON.stringify(edges.map(e=>({id:e.id,from:e.from,to:e.to,fromPort:e.fromPort,toPort:e.toPort})), null, 2)};`);
  lines.push(`let configs  = ${JSON.stringify(JSON.parse(JSON.stringify(configs)), null, 2)};`);
  lines.push(`let functions = ${JSON.stringify(JSON.parse(JSON.stringify(functions)), null, 2)};`);
  lines.push(``);
  lines.push(`// ── Module definitions ────────────────────────────────────────`);
  lines.push(`const MOD = ${JSON.stringify(MOD, null, 2)};`);
  lines.push(``);
  lines.push(`// ── Stub globals ──────────────────────────────────────────────`);
  lines.push(`let runResults = {};`);
  lines.push(`let activeAccountId = 'standalone';`);
  lines.push(`const accounts = [{ id:'standalone', name:'${(acct?.name||'Standalone').replace(/'/g,"\\'")}', env: CRED_ENV, key: CRED_KEY, secret: CRED_SECRET }];`);
  lines.push(`function flashMsg() {}`);
  lines.push(`function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }`);
  lines.push(``);
  lines.push(`// ── Engine (verbatim from running application) ───────────────`);
  lines.push(scalarPortsCode);
  lines.push(``);
  lines.push(topoSortCode);
  lines.push(``);
  lines.push(resolveCode);
  lines.push(``);
  lines.push(callModCode);
  lines.push(``);
  lines.push(`// ── Runner ───────────────────────────────────────────────────`);
  lines.push(`async function runFlow() {`);
  lines.push(`  const order = topoSort();`);
  lines.push(`  console.log('Order:', order.map(id => { const n=nodes.find(x=>x.id===id); return n?.moduleId+'('+id+')'; }).join(' → '));`);
  lines.push(`  runResults = {};`);
  lines.push(`  for (const nodeId of order) {`);
  lines.push(`    const node = nodes.find(n => n.id === nodeId);`);
  lines.push(`    if (!node) continue;`);
  lines.push(`    if (MOD[node.moduleId]?._isViz) {`);
  lines.push(`      const inp = resolveInputs(nodeId);`);
  lines.push(`      const rows = inp.data || [];`);
  lines.push(`      console.log('[VIZ ' + node.moduleId + ']', rows.slice ? rows.slice(0,5) : rows);`);
  lines.push(`      runResults[nodeId] = { status:'done', data:{ _rows: rows } };`);
  lines.push(`      continue;`);
  lines.push(`    }`);
  lines.push(`    try {`);
  lines.push(`      const data = await callModule(node, false);`);
  lines.push(`      runResults[nodeId] = { status:'done', data };`);
  lines.push(`      const rows = data._rows || [];`);
  lines.push(`      console.log('✓ [' + node.moduleId + '] ' + nodeId + ': ' + rows.length + ' rows', rows[0] || '');`);
  lines.push(`    } catch(err) {`);
  lines.push(`      runResults[nodeId] = { status:'error', error: err.message };`);
  lines.push(`      console.error('✕ [' + node.moduleId + '] ' + nodeId + ':', err.message);`);
  lines.push(`    }`);
  lines.push(`  }`);
  lines.push(`  return runResults;`);
  lines.push(`}`);
  lines.push(``);
  lines.push(`runFlow().then(() => console.log('Flow complete')).catch(e => console.error('Fatal:', e));`);

  const code = lines.join('\n');

  let ov = document.getElementById('excode-ov');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'excode-ov';
    ov.style.cssText = [
      'position:fixed','top:50%','left:50%','transform:translate(-50%,-50%)',
      'background:#0d0d1a','border:2px solid #6366f1','border-radius:8px',
      'padding:0','z-index:9999','width:min(900px,96vw)','max-height:86vh',
      'display:flex','flex-direction:column',
      'font-family:JetBrains Mono,Courier New,monospace',
      'box-shadow:0 0 60px rgba(99,102,241,0.25)'
    ].join(';');
    document.body.appendChild(ov);
  }
  const safeName = flow.name.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
  ov.innerHTML =
    `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#111122;border-bottom:1px solid #1e1e3a;flex-shrink:0">` +
      `<span style="color:#6366f1;font-size:12px;font-weight:700;letter-spacing:2px">＜/＞ CODE — ${escH(flow.name)}</span>` +
      `<div style="display:flex;gap:8px;align-items:center">` +
        `<button onclick="(()=>{const b=new Blob([document.getElementById('excode-pre').textContent],{type:'text/javascript'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='flow_${safeName}.js';a.click()})()" ` +
          `style="background:transparent;border:1px solid #6366f144;color:#6366f1;border-radius:3px;padding:3px 10px;font-family:inherit;font-size:10px;cursor:pointer">⬇ Download</button>` +
        `<button onclick="navigator.clipboard.writeText(document.getElementById('excode-pre').textContent).then(()=>flashMsg('Copied!','var(--green)'))" ` +
          `style="background:transparent;border:1px solid #6366f144;color:#6366f1;border-radius:3px;padding:3px 10px;font-family:inherit;font-size:10px;cursor:pointer">Copy</button>` +
        `<button onclick="document.getElementById('excode-ov').style.display='none'" ` +
          `style="background:transparent;border:none;color:#ef4444;font-size:20px;cursor:pointer;line-height:1">×</button>` +
      `</div>` +

    `<pre id="excode-pre" style="margin:0;padding:14px 18px;overflow:auto;font-size:11px;color:#e2e8f0;white-space:pre;flex:1">${escH(code)}</pre>`;
  ov.style.display = 'flex';

// ═══════════════════════════════════════════════════════════════════════
// RESPONSE PARSING & FLATTENING
// ═══════════════════════════════════════════════════════════════════════

// Recursively flatten a nested object into dot-notation keys.
// Arrays of primitives → comma-joined string.
// Arrays of objects → if small (<= 5 items) inline as indexed keys; otherwise count label.
function flattenObj(obj, prefix, out) {
  prefix = prefix || '';
  out = out || {};
  if (obj === null || obj === undefined) { if (prefix) out[prefix] = null; return out; }
  if (typeof obj !== 'object') { out[prefix || 'value'] = obj; return out; }
  if (Array.isArray(obj)) {
    if (!obj.length) { out[prefix] = '[]'; return out; }
    if (typeof obj[0] !== 'object') {
      out[prefix] = obj.join(', ');
    } else {
      // Small arrays of objects — inline as [0].key, [1].key etc.
      obj.forEach((item, i) => flattenObj(item, prefix ? `${prefix}[${i}]` : `[${i}]`, out));
    }
    return out;
  }
  for (const k of Object.keys(obj)) {
    const key = prefix ? `${prefix}.${k}` : k;
    const val = obj[k];
    if (val && typeof val === 'object') {
      flattenObj(val, key, out);
    } else {
      out[key] = val;
    }
  }
  return out;
}

// Given a list of row objects (possibly with different keys), compute the union
// of all keys preserving a sensible order: keys that appear most frequently first,
// with any explicit priority keys (symbol, direction, etc.) pinned to the front.
function unionKeys(rows) {
  const freq = {};
  rows.forEach(r => {
    if (!r || typeof r !== 'object' || Array.isArray(r)) return;
    Object.keys(r).forEach(k => { freq[k] = (freq[k] || 0) + 1; });
  });
  const PRIORITY = ['direction','symbol','name','ticker'];
  const sorted = Object.keys(freq).sort((a, b) => {
    const pa = PRIORITY.indexOf(a), pb = PRIORITY.indexOf(b);
    if (pa !== -1 && pb !== -1) return pa - pb;
    if (pa !== -1) return -1;
    if (pb !== -1) return 1;
    return freq[b] - freq[a]; // higher frequency first
  });
  return sorted.filter(k => k !== '_note' && k !== '_rows');
}

// Fully flatten one row object into scalar leaf values only.
// Nested objects become prefix_key, arrays of primitives become comma-joined strings,
// arrays of objects become prefix_0_key, prefix_1_key etc.
// No API-specific logic — works on any JSON structure.
function flattenRow(obj, prefix) {
  prefix = prefix || '';
  const out = {};
  if (obj === null || obj === undefined) return out;
  if (typeof obj !== 'object') { out[prefix || 'value'] = obj; return out; }
  if (Array.isArray(obj)) {
    if (!obj.length) { if (prefix) out[prefix] = ''; return out; }
    // Primitive array → comma-joined string in one cell
    if (typeof obj[0] !== 'object') { out[prefix || 'value'] = obj.join(', '); return out; }
    // Object array → flatten each element with index suffix
    obj.forEach((item, i) => {
      Object.assign(out, flattenRow(item, prefix ? `${prefix}_${i}` : String(i)));
    });
    return out;
  }
  // Plain object → recurse into each key
  for (const [k, v] of Object.entries(obj)) {
    const key = prefix ? `${prefix}_${k}` : k;
    if (v !== null && typeof v === 'object') {
      Object.assign(out, flattenRow(v, key));
    } else {
      out[key] = v;
    }
  }
  return out;
}

// After flattenRow, any field that was an array-of-strings becomes a comma-joined string.
// For "tag list" fields (like Alpaca's `attributes: ["has_options","fractional_eh_enabled"]`),
// expand each tag into its own boolean column so filters can use them directly.
// This is fully generic — works for any API that uses string-tag arrays.
function expandTagArrays(rows) {
  if (!rows.length) return rows;
  // Find fields whose values look like comma-joined tag lists (no spaces in individual tags)
  // We detect this by checking if the value matches "word, word, word" pattern
  const tagFields = new Set();
  rows.forEach(row => {
    for (const [k, v] of Object.entries(row)) {
      if (typeof v === 'string' && v.length > 0 && /^[a-z_]+(?:,[a-z_ ]+)*$/.test(v) && v.includes(',')) {
        tagFields.add(k);
      }
      // Also single-value tag fields (no comma but looks like a snake_case tag)
      if (typeof v === 'string' && /^[a-z][a-z_]+$/.test(v)) {
        // Could be a single tag — we'll expand these too if the field name suggests it
        if (k === 'attributes' || k === 'tags' || k === 'flags') tagFields.add(k);
      }
    }
  });
  if (!tagFields.size) return rows;
  return rows.map(row => {
    const out = { ...row };
    for (const field of tagFields) {
      const v = row[field];
      if (typeof v !== 'string' || !v) continue;
      const tags = v.split(',').map(t => t.trim()).filter(Boolean);
      // Add a boolean true column for each tag present
      tags.forEach(tag => { out[tag] = true; });
      // Any tag NOT present on this row should be false (for consistent filtering)
      // We'll collect all known tags in a second pass below
    }
    return out;
  });
}

// Collect all tags across all rows and ensure every row has false for absent tags
function normalizeTagColumns(rows, tagFields) {
  // Gather all tag values ever seen across all rows for these fields
  const allTags = new Set();
  rows.forEach(row => {
    for (const field of tagFields) {
      const v = row[field];
      if (typeof v === 'string' && v) {
        v.split(',').map(t => t.trim()).filter(Boolean).forEach(t => allTags.add(t));
      }
    }
  });
  if (!allTags.size) return rows;
  return rows.map(row => {
    const out = { ...row };
    allTags.forEach(tag => {
      if (!(tag in out)) out[tag] = false;
    });
    return out;
  });
}

// Generic record extractor: find the array of records inside any JSON response.
// Strategy: look for the first value that is either an array of objects,
// or an object whose values are arrays (symbol-keyed multi-bar/snapshot shape),
// or an object whose values are objects (symbol-keyed single-row shape).
// Every found record is fully flattened to scalars by flattenRow.
function extractRows(json) {
  if (!json) return [];

  // Already an array of records
  if (Array.isArray(json)) {
    if (!json.length) return [];
    if (typeof json[0] === 'object' && json[0] !== null) return json.map(r => flattenRow(r));
    return json.map(v => ({ value: v }));
  }

  if (typeof json !== 'object') return [{ value: json }];

  // Walk every top-level value and classify it
  for (const [key, val] of Object.entries(json)) {
    if (!val || key === 'next_page_token' || key === 'currency') continue;

    // Case A: value is an array of objects → these are the rows
    if (Array.isArray(val) && val.length > 0 && typeof val[0] === 'object') {
      // Multiple sibling arrays (e.g. gainers + losers) → tag with key name
      const otherArrays = Object.entries(json).filter(
        ([k2, v2]) => k2 !== key && Array.isArray(v2) && v2.length > 0 && typeof v2[0] === 'object'
      );
      if (otherArrays.length > 0) {
        // Merge all sibling arrays, tagging each row with the array's key
        const rows = [];
        [[key, val], ...otherArrays].forEach(([k2, arr]) => {
          arr.forEach(item => rows.push(flattenRow({ _group: k2, ...item })));
        });
        return rows;
      }
      return val.map(r => flattenRow(r));
    }

    // Case B: value is an object whose own values are arrays
    // → symbol-keyed multi-row shape: { bars: { SPY: [{...},...], AAPL: [{...},...] } }
    if (val && typeof val === 'object' && !Array.isArray(val)) {
      const subVals = Object.values(val);
      if (subVals.length > 0 && subVals.every(sv => Array.isArray(sv))) {
        const rows = [];
        for (const [sym, arr] of Object.entries(val)) {
          for (const item of arr) {
            rows.push(flattenRow({ symbol: sym, ...item }));
          }
        }
        if (rows.length) return rows;
      }
      // Case C: value is an object whose own values are objects
      // → symbol-keyed single-row shape: { snapshots: { SPY: {...}, AAPL: {...} } }
      if (subVals.length > 0 && subVals.every(sv => sv && typeof sv === 'object' && !Array.isArray(sv))) {
        const rows = Object.entries(val).map(([sym, obj]) => flattenRow({ symbol: sym, ...obj }));
        if (rows.length) return rows;
      }
    }
  }

  // Last resort: flatten the whole object as a single row
  return [flattenRow(json)];
}

// Post-process rows: expand any tag-array fields into individual boolean columns
function postProcessRows(rows) {
  if (!rows || !rows.length) return rows;
  // Find fields that are comma-joined tag strings or known tag array field names.
  // A "tag field" is any field whose values across all rows are exclusively
  // snake_case words (with optional commas) — never numbers, never sentences.
  const tagFields = new Set();
  rows.forEach(row => {
    for (const [k, v] of Object.entries(row)) {
      if (typeof v !== 'string' || !v.trim()) continue;
      const trimmed = v.trim();
      // Match one or more comma-separated snake_case tokens (no spaces within tokens)
      if (/^[a-z][a-z_0-9]*(?:,[a-z][a-z_0-9]*)*$/.test(trimmed)) tagFields.add(k);
    }
  });
  if (!tagFields.size) return rows;
  // Collect all unique tag values across all rows
  const allTags = new Set();
  rows.forEach(row => {
    tagFields.forEach(field => {
      const v = row[field];
      if (typeof v === 'string' && v) v.split(',').map(t=>t.trim()).filter(Boolean).forEach(t => allTags.add(t));
    });
  });
  // Expand: add boolean column per tag, true if present on this row, false if not
  return rows.map(row => {
    const out = { ...row };
    const presentTags = new Set();
    tagFields.forEach(field => {
      const v = row[field];
      if (typeof v === 'string' && v) v.split(',').map(t=>t.trim()).filter(Boolean).forEach(t => presentTags.add(t));
    });
    allTags.forEach(tag => { out[tag] = presentTags.has(tag); });
    return out;
  });
}

// Alias for any legacy call sites
function flattenObj(obj, prefix) { return flattenRow(obj, prefix); }

// ═══════════════════════════════════════════════════════════════════════
// DYNAMIC PRECISION
// ═══════════════════════════════════════════════════════════════════════
function dynPrec(val) {
  // Pass through non-numbers unchanged
  if (typeof val !== 'number' && typeof val !== 'string') return val;
  const n = typeof val === 'string' ? parseFloat(val) : val;
  if (isNaN(n) || !isFinite(n)) return val;

  // Integers or effectively-integer values >= 1: no decimal places
  if (Math.abs(n) >= 1 && Number.isInteger(n)) return n.toString();

  const abs = Math.abs(n);

  if (abs === 0) return '0';

  // Find the position of the first significant (non-zero) digit after decimal
  // log10 trick: for 0.0049 → floor(log10(0.0049)) = -3, so first sig digit is at position 3
  // For numbers >= 1: first sig digit is before decimal, we always want at least 2 decimal places
  // Rule: show digits until we have 4 significant figures, but minimum 2 decimal places always

  const log = Math.floor(Math.log10(abs));   // e.g. 1000→3, 1→0, 0.04→-2, 0.0004→-4
  // Number of decimal places needed to show 4 sig figs + at least 2 decimal places
  // sig figs start at position: for n>=1, log+1 digits are before decimal, so we need 4-(log+1) after
  // for n<1, all sig figs are after decimal, first at position -log, so need -log+3 places total
  let decimalPlaces;
  if (abs >= 1) {
    // e.g. 1000.x → log=3 → need max(4-4, 2)=2 places; 1.x → log=0 → need max(4-1,2)=3 places
    decimalPlaces = Math.max(4 - (log + 1), 2);
  } else {
    // e.g. 0.049 → log=-2 → need (-(-2))+3 = 5 places; 0.4 → log=-1 → need 1+3=4 places
    decimalPlaces = (-log) + 3;
  }

  const formatted = n.toFixed(decimalPlaces);

  // If result has a decimal point and all decimal digits are zero, strip them (integer result)
  if (abs >= 1 && formatted.includes('.') && parseFloat(formatted) === Math.round(parseFloat(formatted))) {
    return Math.round(n).toString();
  }

  return formatted;
}

function applyPrecisionToRows(rows) {
  if (!Array.isArray(rows)) return rows;
  return rows.map(row => {
    const out = {};
    for (const [k, v] of Object.entries(row)) {
      out[k] = (typeof v === 'number' || (typeof v === 'string' && v !== '' && !isNaN(Number(v)) && v.trim() !== ''))
        ? dynPrec(typeof v === 'number' ? v : Number(v))
        : v;
    }
    return out;
  });
}

// ═══════════════════════════════════════════════════════════════════════
// DATA TABLE MODAL
// ═══════════════════════════════════════════════════════════════════════
let tblState = { rows:[], keys:[], sortCol:null, sortDir:0, page:0, rpp:1000, colIsNum:{} };

function detectNumericCols(rows, keys) {
  // A column is numeric if >80% of non-empty values parse as finite numbers
  const result = {};
  keys.forEach(k => {
    const vals = rows.map(r => r[k]).filter(v => v !== null && v !== undefined && v !== '');
    if (!vals.length) { result[k] = false; return; }
    const numCount = vals.filter(v => !isNaN(Number(v)) && isFinite(Number(v))).length;
    result[k] = (numCount / vals.length) > 0.8;
  });
  return result;
}

function openTblModal(rows, title, colCfg) {
  if (!rows || !rows.length) { flashMsg('No data to display', 'var(--amber)'); return; }

  // Ensure every row is a plain object — strings/numbers get wrapped, re-extracted if needed
  rows = rows.map(r => {
    if (r && typeof r === 'object' && !Array.isArray(r)) return r;
    // Primitive (e.g. bare symbol string) — wrap it
    if (typeof r === 'string' || typeof r === 'number') return { value: r };
    // Array — shouldn't happen here but flatten it
    return flattenObj(r);
  });

  // If every row is just {value: string}, it means the upstream node passed an array
  // of primitives (e.g. symbols list). Try re-extracting via extractRows.
  const allPrimitive = rows.every(r => Object.keys(r).length === 1 && 'value' in r);
  if (allPrimitive) {
    // Nothing more we can do — show as-is, it's a scalar list
  }

  const allKeys = unionKeys(rows);

  // If the viz_table node has a column config, apply order + visibility from it
  let visibleKeys;
  if (colCfg && colCfg.length) {
    // Ordered visible columns from config; append any unseen keys at the end
    const cfgVisible = colCfg.filter(c => c.visible !== false).map(c => c.name);
    const cfgSeen = new Set(colCfg.map(c => c.name));
    const extra = allKeys.filter(k => !cfgSeen.has(k));
    visibleKeys = [...cfgVisible, ...extra].filter(k => allKeys.includes(k));
    if (!visibleKeys.length) visibleKeys = allKeys.slice();
  } else {
    visibleKeys = allKeys.slice();
  }

  tblState = {
    rows, allKeys,
    keys: visibleKeys,
    sortCol:null, sortDir:0, page:0, rpp:1000,
    colIsNum: detectNumericCols(rows, allKeys),
    colPickerOpen: false,
  };
  document.getElementById('tbl-modal-title').textContent = '◈ ' + (title || 'RESULTS');
  document.getElementById('tbl-rpp').value = '1000';
  document.getElementById('tbl-overlay').classList.add('show');
  tblRender();
}

function closeTblModal() {
  document.getElementById('tbl-overlay').classList.remove('show');
}

function tblOverlayClick(e) {
  if (e.target === document.getElementById('tbl-overlay')) closeTblModal();
}

function tblGetSorted() {
  if (!tblState.sortCol || tblState.sortDir === 0) return tblState.rows;
  const k = tblState.sortCol, isNum = tblState.colIsNum[k], dir = tblState.sortDir;
  return [...tblState.rows].sort((a, b) => {
    const av = a[k], bv = b[k];
    let cmp;
    if (isNum) {
      cmp = (Number(av) || 0) - (Number(bv) || 0);
    } else {
      cmp = String(av ?? '').localeCompare(String(bv ?? ''));
    }
    return dir === 1 ? cmp : -cmp;
  });
}

function tblRender() {
  const sorted = tblGetSorted();
  const { keys, allKeys, page, rpp, sortCol, sortDir, colIsNum, colPickerOpen } = tblState;
  const totalPages = Math.max(1, Math.ceil(sorted.length / rpp));
  const safePage = Math.min(page, totalPages - 1);
  tblState.page = safePage;
  const slice = sorted.slice(safePage * rpp, safePage * rpp + rpp);

  // Column picker panel (rendered above table when open)
  const pickerHtml = colPickerOpen ? `
    <div id="tbl-col-picker">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:10px;color:var(--cyan);letter-spacing:1px">COLUMNS</span>
        <button onclick="tblColAll(true)" style="font-size:9px;padding:2px 7px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--muted);cursor:pointer">All</button>
        <button onclick="tblColAll(false)" style="font-size:9px;padding:2px 7px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--muted);cursor:pointer">None</button>
        <button onclick="tblColReset()" style="font-size:9px;padding:2px 7px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--muted);cursor:pointer">Reset</button>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${allKeys.map(k => {
          const on = keys.includes(k);
          return `<button onclick="tblColToggle('${k.replace(/'/g,"\\'")}')" style="font-size:9px;padding:3px 8px;border-radius:3px;cursor:pointer;font-family:var(--font);border:1px solid ${on?'var(--cyan)':'var(--border)'};color:${on?'var(--cyan)':'var(--muted)'};background:${on?'rgba(0,212,255,0.1)':'transparent'}">${escH(k)}</button>`;
        }).join('')}
      </div>
    </div>` : '';

  // Inject picker above scroll wrap
  const pickerEl = document.getElementById('tbl-col-picker-wrap');
  if (pickerEl) pickerEl.innerHTML = pickerHtml;

  // Header
  const arrowMap = { 0:'⇅', 1:'↑', 2:'↓' };
  const thead = `<thead><tr>${keys.map(k => {
    const isSorted = sortCol === k;
    const dir = isSorted ? sortDir : 0;
    const cls = dir === 1 ? 'sort-asc' : dir === 2 ? 'sort-desc' : '';
    return `<th class="${cls}" onclick="tblSort('${k.replace(/'/g,"\\'")}')">${escH(k)}<span class="sort-arrow">${arrowMap[dir]}</span></th>`;
  }).join('')}</tr></thead>`;

  // Body
  const tbody = `<tbody>${slice.map(row =>
    `<tr>${keys.map(k => {
      const raw = row[k];
      const isNum = colIsNum[k];
      const display = (isNum && raw !== null && raw !== undefined && raw !== '')
        ? dynPrec(typeof raw === 'number' ? raw : Number(raw))
        : escH(String(raw ?? ''));
      return `<td class="${isNum ? 'num' : ''}">${display}</td>`;
    }).join('')}</tr>`
  ).join('')}</tbody>`;

  document.getElementById('tbl-table').innerHTML = thead + tbody;

  // Pagination
  document.getElementById('tbl-page-info').textContent =
    `Page ${safePage + 1} of ${totalPages} · ${sorted.length.toLocaleString()} rows`;
  document.getElementById('tbl-prev').disabled = safePage === 0;
  document.getElementById('tbl-next').disabled = safePage >= totalPages - 1;
  document.getElementById('tbl-modal-meta').textContent =
    `${keys.length} of ${allKeys.length} cols`;
}

// ── Column picker helpers ──
function tblToggleColPicker() {
  tblState.colPickerOpen = !tblState.colPickerOpen;
  tblRender();
}
function tblColToggle(k) {
  const idx = tblState.keys.indexOf(k);
  if (idx >= 0) {
    if (tblState.keys.length === 1) return; // always keep at least 1
    tblState.keys.splice(idx, 1);
  } else {
    // Insert in allKeys order
    const pos = tblState.allKeys.indexOf(k);
    let inserted = false;
    for (let i = 0; i < tblState.keys.length; i++) {
      if (tblState.allKeys.indexOf(tblState.keys[i]) > pos) {
        tblState.keys.splice(i, 0, k);
        inserted = true; break;
      }
    }
    if (!inserted) tblState.keys.push(k);
  }
  tblState.page = 0;
  tblRender();
}
function tblColAll(on) {
  tblState.keys = on ? tblState.allKeys.slice() : [tblState.allKeys[0]];
  tblState.page = 0;
  tblRender();
}
function tblColReset() {
  tblState.keys = tblState.allKeys.slice();
  tblState.page = 0;
  tblRender();
}

function tblSort(col) {
  if (tblState.sortCol === col) {
    tblState.sortDir = (tblState.sortDir + 1) % 3; // 0→1→2→0
    if (tblState.sortDir === 0) tblState.sortCol = null;
  } else {
    tblState.sortCol = col;
    tblState.sortDir = 1;
  }
  tblState.page = 0;
  tblRender();
}

function tblPage(delta) {
  const sorted = tblGetSorted();
  const totalPages = Math.max(1, Math.ceil(sorted.length / tblState.rpp));
  tblState.page = Math.max(0, Math.min(tblState.page + delta, totalPages - 1));
  tblRender();
}

function tblSetRpp(n) {
  tblState.rpp = n;
  tblState.page = 0;
  tblRender();
}

// ═══════════════════════════════════════════════════════════════════════
// FLOW EXECUTION ENGINE
// ═══════════════════════════════════════════════════════════════════════
let runResults = {};

// ── Topological sort ──
function topoSort() {
  const inDeg = {}, adj = {};
  nodes.forEach(n => { inDeg[n.id] = 0; adj[n.id] = []; });
  edges.forEach(e => { inDeg[e.to] = (inDeg[e.to]||0) + 1; adj[e.from].push(e.to); });
  const queue = nodes.filter(n => inDeg[n.id] === 0).map(n => n.id);
  const order = [];
  while (queue.length) {
    const id = queue.shift(); order.push(id);
    (adj[id]||[]).forEach(nxt => { if (--inDeg[nxt] === 0) queue.push(nxt); });
  }
  return order;
}

// ── Build resolved config: merge node config + connected upstream outputs ──
// DATA PORTS: any port named 'data','filtered_data','joined_data','left','right','candidates','whitelist'
// always receives the full flat row objects (_rows), never a column-slice array.
// SCALAR PORTS: 'symbols','start','end','timestamp','name','symbol','qty','side','type','limit_price'
// receive the explicit port value (array of scalars or single value).
// All ports except the named scalar inputs on bars/write nodes carry full row objects.
const SCALAR_PORTS = new Set(['start','end','name','a','b','timestamp','ref']);
const SEQ_PORTS = new Set(['enable','status']);
function resolveInputs(nodeId) {
  const incoming = edges.filter(e => e.to === nodeId);
  const resolved = {};
  incoming.forEach(e => {
    if (SEQ_PORTS.has(e.toPort)) return; // sequence ports carry no data — ordering only
    const upstreamData = runResults[e.from]?.data;
    if (!upstreamData) return;
    const rows = upstreamData._rows;

    // Side-chain ports: any port named _sc_<fromNodeId> — extract scalar value
    if (e.toPort.startsWith('_sc_')) {
      const sc = upstreamData._scalar;
      if (sc !== undefined) { resolved[e.toPort] = sc; return; }
      if (Array.isArray(rows) && rows.length) {
        const firstRow = rows[0];
        const tsField = Object.keys(firstRow).find(k => typeof firstRow[k] === 'string' && /\d{4}-\d{2}-\d{2}/.test(firstRow[k]));
        const firstVal = tsField ? firstRow[tsField] : firstRow[Object.keys(firstRow)[0]];
        resolved[e.toPort] = typeof firstVal === 'object' ? JSON.stringify(firstVal) : String(firstVal ?? '');
      }
      return;
    }
    if (SCALAR_PORTS.has(e.toPort)) {
      // For scalar ports, extract a single string value — never pass a row object
      // Check _scalar first (set by date_max, date_min, time_offset)
      if (upstreamData._scalar !== undefined) {
        resolved[e.toPort] = upstreamData._scalar;
        return;
      }
      // Then check explicit named port
      const explicit = upstreamData[e.fromPort];
      if (explicit !== undefined && explicit !== null && !Array.isArray(explicit) && typeof explicit !== 'object') {
        resolved[e.toPort] = explicit;
        return;
      }
      // Otherwise extract from rows — find first field that looks like a timestamp string,
      // or just grab the first field value of the first row
      if (Array.isArray(rows) && rows.length) {
        const firstRow = rows[0];
        // If e.fromPort is a real field name in the row, use it
        if (e.fromPort && firstRow[e.fromPort] !== undefined) {
          const v = firstRow[e.fromPort];
          resolved[e.toPort] = (typeof v === 'object' && v !== null) ? JSON.stringify(v) : String(v ?? '');
          return;
        }
        // Otherwise find the first timestamp-looking field
        const tsField = Object.keys(firstRow).find(k => typeof firstRow[k] === 'string' && /\d{4}-\d{2}-\d{2}/.test(firstRow[k]));
        if (tsField) {
          resolved[e.toPort] = firstRow[tsField];
          return;
        }
        // Last resort: first field value as string
        const firstVal = firstRow[Object.keys(firstRow)[0]];
        resolved[e.toPort] = (typeof firstVal === 'object' && firstVal !== null) ? JSON.stringify(firstVal) : String(firstVal ?? '');
      }
    } else {
      // data / left / right / features / actuals — always full rows
      // Check if upstream has a named port output (e.g. features/actuals from convergences)
      if (e.fromPort && upstreamData._outputs && upstreamData._outputs[e.fromPort] !== undefined) {
        resolved[e.toPort] = Array.isArray(upstreamData._outputs[e.fromPort]) ? upstreamData._outputs[e.fromPort] : [];
      } else {
        resolved[e.toPort] = Array.isArray(rows) ? rows : [];
      }
    }
  });
  return resolved;
}

// ── Merge all array-valued inputs for viz nodes (supports multi-source connections) ──
// Concatenates rows from every port that carries an array, deduplicating by reference.
function mergeVizInputs(inputs) {
  const seen = new Set();
  const merged = [];
  Object.values(inputs).forEach(val => {
    if (!Array.isArray(val)) return;
    val.forEach(row => {
      if (!seen.has(row)) { seen.add(row); merged.push(row); }
    });
  });
  return merged;
}

// ── Random Forest Dashboard ───────────────────────────────────────────
function openRFDashboard(rfResults, depVars, dataRF, testSet, storedModel, storedPreds, storedOverallR2, dvWeights, modelMode, freshW, storedW) {
  storedModel    = storedModel    || null;
  storedPreds    = storedPreds    || {};
  storedOverallR2 = storedOverallR2 || {};
  dvWeights      = dvWeights      || {};
  modelMode      = modelMode      || 'New';
  freshW         = freshW         ?? 1;
  storedW        = storedW        ?? 0;

  const existing = document.getElementById('rf-dashboard-overlay');
  if (existing) existing.remove();

  const ov = document.createElement('div');
  ov.id = 'rf-dashboard-overlay';
  ov.style.cssText = 'position:fixed;inset:0;background:#000000cc;z-index:4000;display:flex;flex-direction:column;font-family:var(--font)';

  const modal = document.createElement('div');
  modal.style.cssText = 'display:flex;flex-direction:column;background:#0d0d1a;border:1px solid #1e1e3a;border-radius:8px;margin:16px;flex:1;overflow:hidden;max-height:calc(100vh - 32px)';

  const hdr = document.createElement('div');
  hdr.style.cssText = 'display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid #1e1e3a;flex-shrink:0';
  const modeLabel = modelMode === 'Both' ? ` — Fresh (${(freshW*100).toFixed(0)}%) + Stored (${(storedW*100).toFixed(0)}%)` : ` — ${modelMode}`;
  hdr.innerHTML = `<span style="color:#84cc16;font-size:12px;font-weight:700;letter-spacing:1px;flex:1">🌲 RANDOM FOREST DASHBOARD${modeLabel}</span>
    <button onclick="document.getElementById('rf-dashboard-overlay').remove()" style="background:transparent;border:none;color:#475569;font-size:18px;cursor:pointer;padding:0 4px">×</button>`;

  const body = document.createElement('div');
  body.style.cssText = 'flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:20px';

  // ── Determine which panels to show ───────────────────────────────
  const showFresh  = modelMode === 'New'  || modelMode === 'Both';
  const showStored = modelMode === 'Stored' || (modelMode === 'Both' && storedModel);

  // ── Helper: compute R² for a prediction array vs yCol ────────────
  function computeR2(predsArr, yCol, idxSet) {
    const xs = [], ys = [];
    idxSet.forEach(i => {
      const p = predsArr[i], a = yCol[i];
      if (p !== null && p !== undefined && a !== null && a !== undefined) { xs.push(p); ys.push(a); }
    });
    if (xs.length < 2) return 0;
    const mx = xs.reduce((s,v)=>s+v,0)/xs.length;
    const my = ys.reduce((s,v)=>s+v,0)/ys.length;
    let num=0,dx2=0,dy2=0;
    xs.forEach((_,i)=>{num+=(xs[i]-mx)*(ys[i]-my);dx2+=(xs[i]-mx)**2;dy2+=(ys[i]-my)**2;});
    const d=Math.sqrt(dx2*dy2); if(!d) return 0;
    return Math.round((num/d)**2 * 1e4)/1e4;
  }

  // ── Helper: render a section (diag + importance + scatter) ────────
  function renderSection(sectionLabel, sectionColor, predsMap, getStats) {
    // predsMap: dv → predictions array
    // getStats(dv): returns { trainR2, testR2, nTrain, nTest, importance, nEng, engImpTotal, baseFeats }

    const secDiv = document.createElement('div');
    secDiv.style.cssText = `border:1px solid ${sectionColor}33;border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:12px`;

    // Section label
    const secLbl = document.createElement('div');
    secLbl.style.cssText = `font-size:11px;font-weight:700;color:${sectionColor};text-transform:uppercase;letter-spacing:1px;margin-bottom:2px`;
    secLbl.textContent = sectionLabel;
    secDiv.appendChild(secLbl);

    // ── Diagnostics grid ─────────────────────────────────────────
    const diagGrid = document.createElement('div');
    diagGrid.style.cssText = `display:grid;grid-template-columns:repeat(${Math.min(depVars.length,4)}, 1fr);gap:8px`;

    depVars.forEach(dv => {
      const st = getStats(dv);
      const card = document.createElement('div');
      card.style.cssText = 'background:#0a0a18;border:1px solid #1e1e3a;border-radius:6px;padding:8px';
      const isStored = st.overallR2 !== undefined && st.nTrain === null;
      const r2display = isStored
        ? [['Overall R²', (st.overallR2??0).toFixed(4), st.overallR2>=0.7?'#10b981':st.overallR2>=0.4?'#f59e0b':'#ef4444'],
           ['Sample N',   dataRF.length, '#94a3b8']]
        : [['Train R²',  (st.trainR2??0).toFixed(4), st.trainR2>=0.7?'#10b981':st.trainR2>=0.4?'#f59e0b':'#ef4444'],
           ['Test R²',   (st.testR2??0).toFixed(4),  st.testR2>=0.7?'#10b981':st.testR2>=0.4?'#f59e0b':'#ef4444'],
           ['Train N',   st.nTrain??'—',              '#94a3b8'],
           ['Test N',    st.nTest??'—',               '#94a3b8']];
      const rows = [
        ...r2display,
        ['Features',  st.baseFeats?.length??'—',   '#06b6d4'],
        ['Interactions', st.nEng??0,               '#a855f7'],
        ['Eng. Imp',  st.engImpTotal!=null?(st.engImpTotal*100).toFixed(1)+'%':'—', '#f472b6'],
        ...(!isStored ? [['Overfit', st.trainR2!=null&&st.testR2!=null?(st.trainR2-st.testR2>=0.2?'⚠ High':'✓ OK'):'—',
                      (st.trainR2-st.testR2)>=0.2?'#ef4444':'#10b981']] : []),
        ...(modelMode==='Both'&&dvWeights[dv]?[
          ['Fresh Wt',  ((dvWeights[dv].freshW||0)*100).toFixed(0)+'%',  '#10b981'],
          ['Stored Wt', ((dvWeights[dv].storedW||0)*100).toFixed(0)+'%', '#a855f7'],
        ]:[]),
        ...(storedModel&&(modelMode==='Both'||modelMode==='Stored')?[
          ['Stored Runs', storedModel.runCount||0,    '#94a3b8'],
          ['Stored N',    storedModel.totalSamples||0,'#94a3b8'],
        ]:[]),
      ];
      card.innerHTML = `<div style="color:${sectionColor};font-size:9px;font-weight:700;margin-bottom:6px">🎯 ${dv}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px 10px">
          ${rows.map(([l,v,c])=>`<div style="font-size:8px;color:#475569">${l}</div><div style="font-size:9px;font-weight:700;color:${c}">${v}</div>`).join('')}
        </div>`;
      diagGrid.appendChild(card);
    });
    secDiv.appendChild(diagGrid);

    // ── Feature importance bar charts ─────────────────────────────
    const impLbl = document.createElement('div');
    impLbl.style.cssText = 'color:#f59e0b;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px';
    impLbl.textContent = 'Feature Importance';
    secDiv.appendChild(impLbl);

    const impGrid = document.createElement('div');
    impGrid.style.cssText = `display:grid;grid-template-columns:repeat(${Math.min(depVars.length,2)},1fr);gap:8px`;

    depVars.forEach(dv => {
      const st = getStats(dv);
      const imp = st.importance || {};
      const sorted = Object.entries(imp).sort((a,b)=>b[1]-a[1]).slice(0,15);
      const maxImp = sorted[0]?.[1] || 1;
      const wrap = document.createElement('div');
      wrap.style.cssText = 'background:#0a0a18;border:1px solid #1e1e3a;border-radius:6px;padding:8px';
      let html = `<div style="color:${sectionColor};font-size:8px;font-weight:700;margin-bottom:6px">${dv}</div>`;
      sorted.forEach(([feat,val]) => {
        const pct=(val/maxImp*100).toFixed(1), barW=(val/maxImp*100).toFixed(0);
        const sf=feat.length>24?feat.slice(0,22)+'…':feat;
        html+=`<div style="margin-bottom:4px">
          <div style="display:flex;justify-content:space-between;margin-bottom:1px">
