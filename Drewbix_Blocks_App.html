function closeChartModal() {
  document.getElementById('chart-modal-overlay').style.display = 'none';
}

function closeChartGrid() {
  document.getElementById('chart-grid-overlay').style.display = 'none';
}

function openChartGrid(rows, cfg) {
  const keyField = cfg.key_field || 'symbol';
  const colsCfg  = cfg.cols || 'auto';

  // Collect unique keys, sort alphabetically by chart title
  const seen = new Set(), keys = [];
  rows.forEach(r => {
    const k = String(r[keyField] ?? '');
    if (k && !seen.has(k)) { seen.add(k); keys.push(k); }
  });
  keys.sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
  if (!keys.length) return;

  const ov = document.getElementById('chart-grid-overlay');
  ov.style.display = 'flex';
  document.getElementById('chart-grid-title').textContent = `⊞ CHART GRID — ${keys.length} charts`;

  // Determine column count
  const viewW = window.innerWidth - 60; // account for modal margins/padding
  let cols;
  if (colsCfg === 'auto') {
    cols = keys.length === 1 ? 1 : keys.length === 2 ? 2 : keys.length <= 4 ? 2 : keys.length <= 6 ? 3 : keys.length <= 12 ? 4 : keys.length <= 20 ? 5 : 6;
  } else {
    cols = parseInt(colsCfg) || 2;
  }
  cols = Math.min(cols, keys.length);

  // Chart cell height: aim for ~16:9-ish cells, max 4 rows visible
  const cellW = Math.floor((viewW - (cols - 1) * 8) / cols);
  const cellH = Math.round(cellW * 0.55);

  const body = document.getElementById('chart-grid-body');
  body.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  body.innerHTML = '';

  keys.forEach(key => {
    const subset = rows.filter(r => String(r[keyField] ?? '') === key);
    const cell = document.createElement('div');
    cell.style.cssText = `background:#0a0a14;border:1px solid #1e1e3a;border-radius:5px;overflow:hidden;height:${cellH}px;display:flex;flex-direction:column`;

    // Title bar
    const titleBar = document.createElement('div');
    titleBar.style.cssText = 'padding:3px 8px;border-bottom:1px solid #1e1e3a;flex-shrink:0;display:flex;align-items:center';
    titleBar.innerHTML = `<span style="font-size:9px;color:#06b6d4;font-weight:700;letter-spacing:0.5px">${key}</span>`;
    cell.appendChild(titleBar);

    // Canvas wrapper
    const wrap = document.createElement('div');
    wrap.style.cssText = 'flex:1;position:relative;overflow:hidden';
    const canvas = document.createElement('canvas');
    canvas.style.cssText = 'width:100%;height:100%;display:block';
    wrap.appendChild(canvas);
    cell.appendChild(wrap);
    body.appendChild(cell);

    // Render after DOM is painted so dimensions are correct
    requestAnimationFrame(() => {
      const dpr = window.devicePixelRatio || 1;
      canvas.width  = wrap.clientWidth  * dpr;
      canvas.height = wrap.clientHeight * dpr;
      canvas.style.width  = wrap.clientWidth  + 'px';
      canvas.style.height = wrap.clientHeight + 'px';
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      renderChartToContext(ctx, wrap.clientWidth, wrap.clientHeight, subset, cfg);
    });
  });
}

function openChartModal(rows, cfg, title) {
  const ov = document.getElementById('chart-modal-overlay');
  ov.style.display = 'flex';
  document.getElementById('chart-modal-title').textContent = '◈ ' + (title || 'CHART');
  // Defer render until modal is visible and sized
  requestAnimationFrame(() => renderChart(rows, cfg));
}

function renderChart(rows, cfg) {
  const canvas = document.getElementById('chart-canvas');
  const container = canvas.parentElement;
  canvas.width  = container.clientWidth  * (window.devicePixelRatio || 1);
  canvas.height = container.clientHeight * (window.devicePixelRatio || 1);
  canvas.style.width  = container.clientWidth  + 'px';
  canvas.style.height = container.clientHeight + 'px';
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  ctx.scale(dpr, dpr);
  renderChartToContext(ctx, container.clientWidth, container.clientHeight, rows, cfg);
}

function renderChartToContext(ctx, W, H, rows, cfg) {
  ctx.clearRect(0, 0, W, H);

  const series = Array.isArray(cfg.series) ? cfg.series.filter(s => s.x_field && s.y_field) : [];
  if (!series.length || !rows.length) {
    ctx.fillStyle = '#475569'; ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('No series configured — add series in inspector', W/2, H/2);
    return;
  }

  const MARGIN = { top: 30, right: 70, bottom: 50, left: 70 };
  const hasRight = series.some(s => s.axis === 'sec');
  if (!hasRight) MARGIN.right = 20;

  const overlap = cfg.overlap !== false; // default true
  const hasSeries_sec = series.some(s => s.axis === 'sec');
  const doSplit = !overlap && hasSeries_sec;

  const totalH = H - MARGIN.top - MARGIN.bottom;
  const priH = doSplit ? Math.floor(totalH * 0.75) - 4 : totalH;
  const secH = doSplit ? totalH - priH - 8 : 0;
  const secTop = doSplit ? MARGIN.top + priH + 8 : 0;

  const plotW = W - MARGIN.left - MARGIN.right;
  const plotH = priH; // primary plot height

  // Parse all series data
  const parsed = series.map(s => {
    const isSegment = s.line_style === 'segment';
    const isRay     = s.line_style === 'ray';
    const pts = rows.map(r => {
      const x = Number(r[s.x_field]), y = Number(r[s.y_field]);
      if (isNaN(x) || isNaN(y)) return null;
      const p = { x, y };
      if (isSegment) {
        p.x2 = Number(r[s.x2_field]); p.y2 = Number(r[s.y2_field]);
        if (isNaN(p.x2) || isNaN(p.y2)) return null;
      }
      if (isRay) {
        p.m = Number(r[s.m_field]); p.b = Number(r[s.b_field]);
        if (isNaN(p.m) || isNaN(p.b)) return null;
        if (s.x_end_field) p.xEnd = Number(r[s.x_end_field]);
      }
      return p;
    }).filter(Boolean);
    // Don't sort segment/ray — order irrelevant, each row is independent
    if (!isSegment && !isRay) pts.sort((a,b) => a.x - b.x);
    return { ...s, pts };
  });

  // Auto-range — only zoom_include series count toward bounds
  // For ray series, compute y at xMax to include in range (rays extend to right edge)
  const tempXMax = Math.max(...parsed.filter(s=>s.zoom_include!==false).flatMap(s=>s.pts).map(p=>p.x).filter(v=>!isNaN(v)), 1);
  const expandedPts = parsed.filter(s => s.zoom_include !== false).flatMap(s => {
    if (s.line_style === 'ray') {
      return s.pts.flatMap(p => [
        { x: p.x, y: p.y },
        { x: tempXMax, y: p.m * tempXMax + p.b }
      ]);
    }
    if (s.line_style === 'segment') {
      return s.pts.flatMap(p => [{ x: p.x, y: p.y }, { x: p.x2, y: p.y2 }]);
    }
    return s.pts;
  });
  const zoomPts = expandedPts;
  const priPts  = parsed.filter(s => (s.axis || 'pri') !== 'sec' && s.zoom_include !== false).flatMap(s => {
    if (s.line_style === 'ray') return s.pts.flatMap(p => [{ x: p.x, y: p.y }, { x: tempXMax, y: p.m * tempXMax + p.b }]);
    if (s.line_style === 'segment') return s.pts.flatMap(p => [{ x: p.x, y: p.y }, { x: p.x2, y: p.y2 }]);
    return s.pts;
  });
  const secPts  = parsed.filter(s => (s.axis || 'pri') === 'sec' && s.zoom_include !== false).flatMap(s => s.pts);

  if (!zoomPts.length) { ctx.fillStyle='#475569'; ctx.fillText('No data',W/2,H/2); return; }

  const xPadPct = parseFloat(cfg.x_pad || '10%') / 100;
  const yPadPct = parseFloat(cfg.y_pad || '10%') / 100;

  let xMin = Math.min(...zoomPts.map(p=>p.x));
  let xMax = Math.max(...zoomPts.map(p=>p.x));

  // Centroid logic — applies to primary axis and x range only
  const centroidField = cfg.centroid_field || '';
  const centroidPos   = cfg.centroid_pos   || 'off';
  if (centroidField && centroidPos !== 'off') {
    const centSeries = parsed.find(s => s.y_field === centroidField || s.x_field === centroidField);
    if (centSeries && centSeries.pts.length) {
      const cPts = centSeries.pts;
      const ci = centroidPos === 'first' ? 0
               : centroidPos === 'last'  ? cPts.length - 1
               : Math.floor(cPts.length / 2);
      const cx = cPts[ci].x;
      const dLeft  = cx - xMin;
      const dRight = xMax - cx;
      const half = Math.max(dLeft, dRight);
      xMin = cx - half; xMax = cx + half;
    }
  }

  const xPad = (xMax - xMin || 1) * xPadPct;

  // Primary axis: centroid-aware y ranging
  function calcPriYRange(pts) {
    if (!pts.length) return { min: 0, max: 1 };
    let yMin = Math.min(...pts.map(p=>p.y));
    let yMax = Math.max(...pts.map(p=>p.y));
    if (centroidField && centroidPos !== 'off') {
      const centSeries = parsed.find(s => s.y_field === centroidField);
      if (centSeries && centSeries.pts.length) {
        const cPts = centSeries.pts;
        const ci = centroidPos === 'first' ? 0 : centroidPos === 'last' ? cPts.length-1 : Math.floor(cPts.length/2);
        const cy = cPts[ci].y;
        const dDown = cy - yMin, dUp = yMax - cy;
        const half = Math.max(dDown, dUp);
        // Enforce minimum pad symmetrically to preserve centroid
        const minPad = Math.max(half, (yMax - yMin || 1) * yPadPct);
        yMin = cy - minPad; yMax = cy + minPad;
        return { min: yMin, max: yMax };
      }
    }
    const yRange = yMax - yMin || 1;
    const yPad = yRange * yPadPct;
    return { min: yMin - yPad, max: yMax + yPad };
  }

  // Secondary axis: simple min/max + pad, completely independent, no centroid
  function calcSecYRange(pts) {
    if (!pts.length) return { min: 0, max: 1 };
    const yMin = Math.min(...pts.map(p=>p.y));
    const yMax = Math.max(...pts.map(p=>p.y));
    const yRange = yMax - yMin || 1;
    const yPad = yRange * yPadPct;
    return { min: yMin - yPad, max: yMax + yPad };
  }

  const priRange = calcPriYRange(priPts.length ? priPts : zoomPts);
  const secRange = calcSecYRange(secPts);
  const hasSec = secPts.length > 0;

  const xMinP = xMin - xPad, xMaxP = xMax + xPad;

  function toCanvasX(x) { return MARGIN.left + (x - xMinP) / (xMaxP - xMinP) * plotW; }
  function toCanvasY(y, axis) {
    if (axis === 'sec') {
      if (doSplit) {
        // Map into secondary panel
        return secTop + (1 - (y - secRange.min) / (secRange.max - secRange.min)) * secH;
      }
      // Overlapping — use primary panel area, secondary scale
      return MARGIN.top + (1 - (y - secRange.min) / (secRange.max - secRange.min)) * plotH;
    }
    return MARGIN.top + (1 - (y - priRange.min) / (priRange.max - priRange.min)) * plotH;
  }

  // ── Background
  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, W, H);

  // ── Split panel divider and secondary background
  if (doSplit) {
    ctx.fillStyle = '#0a0a16';
    ctx.fillRect(MARGIN.left, secTop, plotW, secH);
    ctx.strokeStyle = '#334155'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(MARGIN.left, secTop - 4);
    ctx.lineTo(MARGIN.left + plotW, secTop - 4);
    ctx.stroke();
    // Sec label
    ctx.fillStyle = '#475569'; ctx.font = `9px monospace`;
    ctx.textAlign = 'left';
    ctx.fillText('SEC', MARGIN.left + 3, secTop + 10);
  }

  // ── Grid lines
  function niceStep(range, targetCount) {
    const rough = range / targetCount;
    const mag = Math.pow(10, Math.floor(Math.log10(rough)));
    const norm = rough / mag;
    const nice = norm < 1.5 ? 1 : norm < 3.5 ? 2 : norm < 7.5 ? 5 : 10;
    return nice * mag;
  }

  const xStep = niceStep(xMaxP - xMinP, 8);
  const xStart = Math.ceil(xMinP / xStep) * xStep;
  const yStepL = niceStep(priRange.max - priRange.min, 6);
  const yStartL = Math.ceil(priRange.min / yStepL) * yStepL;

  // Minor grid (5 subdivisions)
  ctx.strokeStyle = '#0f0f1e'; ctx.lineWidth = 0.5;
  const xMinorStep = xStep / 5;
  for (let x = Math.ceil(xMinP / xMinorStep) * xMinorStep; x <= xMaxP; x += xMinorStep) {
    const cx2 = toCanvasX(x);
    ctx.beginPath(); ctx.moveTo(cx2, MARGIN.top); ctx.lineTo(cx2, MARGIN.top + plotH); ctx.stroke();
  }
  const yMinorStep = yStepL / 5;
  for (let y = Math.ceil(priRange.min / yMinorStep) * yMinorStep; y <= priRange.max; y += yMinorStep) {
    const cy2 = toCanvasY(y, 'left');
    ctx.beginPath(); ctx.moveTo(MARGIN.left, cy2); ctx.lineTo(MARGIN.left + plotW, cy2); ctx.stroke();
  }

  // Secondary panel grid (split mode)
  if (doSplit && secH > 0) {
    ctx.strokeStyle = '#0f0f1e'; ctx.lineWidth = 0.5;
    const secYMinorStep = niceStep(secRange.max - secRange.min, 6) / 5;
    for (let y = Math.ceil(secRange.min / secYMinorStep) * secYMinorStep; y <= secRange.max; y += secYMinorStep) {
      const cy2 = toCanvasY(y, 'sec');
      ctx.beginPath(); ctx.moveTo(MARGIN.left, cy2); ctx.lineTo(MARGIN.left + plotW, cy2); ctx.stroke();
    }
    ctx.strokeStyle = '#1e1e3a'; ctx.lineWidth = 1;
    const secYStep = niceStep(secRange.max - secRange.min, 5);
    const secYStart = Math.ceil(secRange.min / secYStep) * secYStep;
    for (let y = secYStart; y <= secRange.max + secYStep*0.01; y += secYStep) {
      const cy2 = toCanvasY(y, 'sec');
      ctx.beginPath(); ctx.moveTo(MARGIN.left, cy2); ctx.lineTo(MARGIN.left + plotW, cy2); ctx.stroke();
    }
    // Sec axis border
    ctx.strokeStyle = '#334155'; ctx.lineWidth = 1;
    ctx.strokeRect(MARGIN.left, secTop, plotW, secH);
    // Sec y-axis labels
    ctx.fillStyle = '#475569'; ctx.font = `9px monospace`;
    ctx.textAlign = 'left';
    for (let y = secYStart; y <= secRange.max + secYStep*0.01; y += secYStep) {
      const cy2 = toCanvasY(y, 'sec');
      if (cy2 < secTop - 5 || cy2 > secTop + secH + 5) continue;
      ctx.fillText(fmtNumR(y), MARGIN.left + plotW + 4, cy2 + 3);
    }
  }

  // Major grid
  ctx.strokeStyle = '#1e1e3a'; ctx.lineWidth = 1;
  for (let x = xStart; x <= xMaxP + xStep*0.01; x += xStep) {
    const cx2 = toCanvasX(x);
    ctx.beginPath(); ctx.moveTo(cx2, MARGIN.top); ctx.lineTo(cx2, MARGIN.top + plotH); ctx.stroke();
  }
  for (let y = yStartL; y <= priRange.max + yStepL*0.01; y += yStepL) {
    const cy2 = toCanvasY(y, 'pri');
    ctx.beginPath(); ctx.moveTo(MARGIN.left, cy2); ctx.lineTo(MARGIN.left + plotW, cy2); ctx.stroke();
  }

  // ── Axes
  ctx.strokeStyle = '#334155'; ctx.lineWidth = 1.5;
  ctx.strokeRect(MARGIN.left, MARGIN.top, plotW, plotH);

  // ── Axis labels
  ctx.fillStyle = '#475569'; ctx.font = `9px ${getComputedStyle(document.body).fontFamily}`;
  ctx.textAlign = 'right';

  const xFmt     = cfg.x_fmt     || 'none';
  const yPriFmt  = cfg.y_pri_fmt || 'none';
  const ySecFmt  = cfg.y_sec_fmt || 'none';

  function fmtRaw(v) {
    const abs = Math.abs(v);
    if (abs >= 1e9) return (v/1e9).toPrecision(3)+'B';
    if (abs >= 1e6) return (v/1e6).toPrecision(3)+'M';
    if (abs >= 1e3) return (v/1e3).toPrecision(3)+'K';
    if (abs >= 100) return v.toFixed(0);
    if (abs >= 1)   return v.toPrecision(4);
    return v.toPrecision(3);
  }

  function fmtDate(v) {
    // v is expected to be ms epoch or a day-based tREL value
    // If value looks like epoch ms (> 1e10), format as date
    if (Math.abs(v) > 1e10) {
      const d = new Date(v);
      if (!isNaN(d)) return `${d.getMonth()+1}/${d.getDate()}/${String(d.getFullYear()).slice(2)}`;
    }
    // Otherwise treat as day offset
    const sign = v < 0 ? '-' : '';
    const days = Math.abs(Math.round(v));
    if (days >= 365) return `${sign}${(days/365).toFixed(1)}y`;
    if (days >= 30)  return `${sign}${Math.round(days/30)}mo`;
    return `${sign}${days}d`;
  }

  function fmtAxis(v, fmt) {
    if (fmt === 'date') return fmtDate(v);
    if (fmt === '%')    return (v * 100).toFixed(1) + '%';
    if (fmt === '$')    return '$' + fmtRaw(v);
    return fmtRaw(v);
  }

  const fmtNum  = v => fmtAxis(v, xFmt);      // x axis labels
  const fmtNumL = v => fmtAxis(v, yPriFmt);   // pri y axis labels
  const fmtNumR = v => fmtAxis(v, ySecFmt);   // sec y axis labels
  for (let y = yStartL; y <= priRange.max + yStepL*0.01; y += yStepL) {
    const cy2 = toCanvasY(y, 'pri');
    if (cy2 < MARGIN.top - 5 || cy2 > MARGIN.top + plotH + 5) continue;
    ctx.fillText(fmtNumL(y), MARGIN.left - 4, cy2 + 3);
  }
  if (hasRight && hasSec) {
    ctx.textAlign = 'left';
    const yStepR = niceStep(secRange.max - secRange.min, 6);
    const yStartR = Math.ceil(secRange.min / yStepR) * yStepR;
    for (let y = yStartR; y <= secRange.max + yStepR*0.01; y += yStepR) {
      const cy2 = toCanvasY(y, 'sec');
      if (cy2 < MARGIN.top - 5 || cy2 > MARGIN.top + plotH + 5) continue;
      ctx.fillText(fmtNumR(y), MARGIN.left + plotW + 4, cy2 + 3);
    }
  }
  ctx.textAlign = 'center';
  for (let x = xStart; x <= xMaxP + xStep*0.01; x += xStep) {
    const cx2 = toCanvasX(x);
    if (cx2 < MARGIN.left - 5 || cx2 > MARGIN.left + plotW + 5) continue;
    // For date format, stagger every other label to avoid overlap
    const label = fmtNum(x);
    const labelY = (xFmt === 'date') ? MARGIN.top + plotH + 14 : MARGIN.top + plotH + 14;
    ctx.fillText(label, cx2, labelY);
  }

  // ── Clip to plot area (primary)
  ctx.save();
  ctx.beginPath();
  ctx.rect(MARGIN.left, MARGIN.top, plotW, plotH);
  ctx.clip();

  // ── Draw each series
  parsed.forEach(s => {
    if (!s.pts.length) return;
    const isSec = (s.axis || 'pri') === 'sec';
    // In split mode, clip each series to its own panel
    if (doSplit) {
      ctx.restore();
      ctx.save();
      if (isSec) {
        ctx.beginPath(); ctx.rect(MARGIN.left, secTop, plotW, secH); ctx.clip();
      } else {
        ctx.beginPath(); ctx.rect(MARGIN.left, MARGIN.top, plotW, plotH); ctx.clip();
      }
    }

    const rawColor = s.color || '#00d4ff';
    function hexAlpha(hex, a) {
      const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${a/100})`;
    }
    const lineAlpha   = s.line_alpha  ?? 80;
    const markerAlpha = s.marker_alpha ?? 80;
    const axis = s.axis || 'pri';

    // Bar chart
    if (s.line_style === 'bar') {
      const panelTop    = isSec && doSplit ? secTop    : MARGIN.top;
      const panelHeight = isSec && doSplit ? secH      : plotH;
      const range       = isSec ? secRange : priRange;
      const zeroY       = toCanvasY(Math.max(range.min, Math.min(0, range.max)), axis);
      // Bar width = spacing between points / 2, capped sensibly
      const barW = s.pts.length > 1
        ? Math.max(1, Math.min(20, (toCanvasX(s.pts[1].x) - toCanvasX(s.pts[0].x)) * 0.7))
        : 8;
      ctx.fillStyle = hexAlpha(rawColor, lineAlpha);
      ctx.strokeStyle = hexAlpha(rawColor, Math.min(100, lineAlpha + 15));
      ctx.lineWidth = 0.5;
      s.pts.forEach(p => {
        const cx2 = toCanvasX(p.x);
        const cy2 = toCanvasY(p.y, axis);
        const barTop    = Math.min(cy2, zeroY);
        const barBottom = Math.max(cy2, zeroY);
        const h = Math.max(1, barBottom - barTop);
        ctx.fillRect(cx2 - barW/2, barTop, barW, h);
        ctx.strokeRect(cx2 - barW/2, barTop, barW, h);
      });
    }

    // Segment — each row is an independent line from (x,y) to (x2,y2)
    if (s.line_style === 'segment') {
      ctx.strokeStyle = hexAlpha(rawColor, lineAlpha);
      ctx.lineWidth = s.line_weight || 1.5;
      ctx.setLineDash([]); 
      s.pts.forEach(p => {
        if (isNaN(p.x2) || isNaN(p.y2)) return;
        ctx.beginPath();
        ctx.moveTo(toCanvasX(p.x),  toCanvasY(p.y,  axis));
        ctx.lineTo(toCanvasX(p.x2), toCanvasY(p.y2, axis));
        ctx.stroke();
      });
    }

    // Ray — starts at (x,y), extends right using slope m and intercept b
    // If x_end_field is set, each row's ray stops at that x value instead of xMaxP
    if (s.line_style === 'ray') {
      ctx.strokeStyle = hexAlpha(rawColor, lineAlpha);
      ctx.lineWidth = s.line_weight || 1;
      ctx.setLineDash([4, 4]);
      s.pts.forEach(p => {
        const xEnd = (s.x_end_field && p.xEnd !== undefined && !isNaN(p.xEnd)) ? p.xEnd : xMaxP;
        const yEnd = p.m * xEnd + p.b;
        ctx.beginPath();
        ctx.moveTo(toCanvasX(p.x),   toCanvasY(p.y,   axis));
        ctx.lineTo(toCanvasX(xEnd),  toCanvasY(yEnd,  axis));
        ctx.stroke();
      });
      ctx.setLineDash([]);
    }

    // Line
    if (s.line_style && s.line_style !== 'off' && s.line_style !== 'bar' && s.line_style !== 'segment' && s.line_style !== 'ray') {
      ctx.strokeStyle = hexAlpha(rawColor, lineAlpha);
      ctx.lineWidth = s.line_weight || 1.5;
      ctx.setLineDash(s.line_style === 'dashed' ? [6,4] : s.line_style === 'dotted' ? [2,3] : []);
      ctx.beginPath();
      s.pts.forEach((p, i) => {
        const cx2 = toCanvasX(p.x), cy2 = toCanvasY(p.y, axis);
        i === 0 ? ctx.moveTo(cx2, cy2) : ctx.lineTo(cx2, cy2);
      });
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Markers
    if (s.marker_style && s.marker_style !== 'off') {
      ctx.strokeStyle = hexAlpha(rawColor, markerAlpha);
      ctx.fillStyle   = hexAlpha(rawColor, markerAlpha);
      ctx.lineWidth = s.line_weight || 1.5;
      const sz = s.marker_size || 4;
      s.pts.forEach(p => {
        const cx2 = toCanvasX(p.x), cy2 = toCanvasY(p.y, axis);
        ctx.beginPath();
        if (s.marker_style === 'o') {
          ctx.arc(cx2, cy2, sz/2, 0, Math.PI*2); ctx.fill();
        } else if (s.marker_style === 'x') {
          ctx.moveTo(cx2-sz/2,cy2-sz/2); ctx.lineTo(cx2+sz/2,cy2+sz/2);
          ctx.moveTo(cx2+sz/2,cy2-sz/2); ctx.lineTo(cx2-sz/2,cy2+sz/2);
          ctx.stroke();
        } else if (s.marker_style === '+') {
          ctx.moveTo(cx2,cy2-sz/2); ctx.lineTo(cx2,cy2+sz/2);
          ctx.moveTo(cx2-sz/2,cy2); ctx.lineTo(cx2+sz/2,cy2);
          ctx.stroke();
        } else if (s.marker_style === '*') {
          for (let a=0;a<3;a++) {
            const ang = a*Math.PI/3;
            ctx.moveTo(cx2+Math.cos(ang)*sz/2, cy2+Math.sin(ang)*sz/2);
            ctx.lineTo(cx2-Math.cos(ang)*sz/2, cy2-Math.sin(ang)*sz/2);
          }
          ctx.stroke();
        } else if (s.marker_style === '-') {
          ctx.moveTo(cx2-sz/2,cy2); ctx.lineTo(cx2+sz/2,cy2); ctx.stroke();
        }
      });
    }
  });

  ctx.restore();

  // ── Title
  if (cfg.title) {
    ctx.fillStyle = '#06b6d4'; ctx.font = `bold 11px ${getComputedStyle(document.body).fontFamily}`;
    ctx.textAlign = 'center';
    ctx.fillText(cfg.title, W/2, 16);
  }

  // ── Legend
  let legX = MARGIN.left + 8, legY = MARGIN.top + 12;
  ctx.font = `9px ${getComputedStyle(document.body).fontFamily}`;
  parsed.forEach(s => {
    const col = s.color || '#00d4ff';
    ctx.fillStyle = col;
    ctx.fillRect(legX, legY - 7, 16, 3);
    ctx.fillStyle = '#e2e8f0';
    ctx.textAlign = 'left';
    ctx.fillText(`${s.y_field} (${s.axis||'pri'})`, legX + 20, legY);
    legX += ctx.measureText(`${s.y_field} (${s.axis||'pri'})`).width + 50;
    if (legX > W - 120) { legX = MARGIN.left + 8; legY += 14; }
  });
}

function deleteFunction(name) {
  if (!confirm(`Delete flow "${name}"?`)) return;
  delete functions[name];
  renderFuncsTab();
  buildPalette();
}

function renderFuncsTab() {
  const el = document.getElementById('tab-content-funcs');
  const names = Object.keys(functions);

  let html = `<div style="padding:8px 10px">
    <button onclick="saveFunction()" style="width:100%;padding:7px;background:transparent;border:1px solid #a855f744;border-radius:5px;color:#a855f7;font-family:var(--font);font-size:11px;cursor:pointer;margin-bottom:10px;transition:all 0.15s" onmouseover="this.style.borderColor='#a855f7'" onmouseout="this.style.borderColor='#a855f744'">ƒ Save Current Canvas as Flow</button>`;

  if (!names.length) {
    html += `<div style="color:var(--dim);font-size:11px;text-align:center;padding:20px 0">No flows saved yet.<br><span style="font-size:9px">Use the button above to save the current canvas as a named flow.</span></div>`;
  } else {
    names.forEach(name => {
      const fn = functions[name];
      const mod = fn.modified ? new Date(fn.modified).toLocaleString() : '';
      html += `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:8px 10px;margin-bottom:8px">
        <div style="font-size:12px;color:#a855f7;font-weight:600;margin-bottom:2px">${escH(name)}</div>
        <div style="font-size:9px;color:var(--muted);margin-bottom:6px">${fn.nodes?.length||0} nodes · ${fn.edges?.length||0} edges · ${mod}</div>
        <div style="display:flex;gap:5px">
          <button onclick="loadFunction('${escH(name)}')" style="flex:2;background:transparent;border:1px solid #a855f744;color:#a855f7;border-radius:3px;padding:3px 0;font-family:var(--font);font-size:10px;cursor:pointer">Load</button>
          <button onclick="saveFunction();document.getElementById('savefn-input').value='${escH(name)}'" style="flex:1;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:3px;padding:3px 0;font-family:var(--font);font-size:10px;cursor:pointer">Rename</button>
          <button onclick="deleteFunction('${escH(name)}')" style="flex:1;background:transparent;border:1px solid #ef444444;color:#ef4444;border-radius:3px;padding:3px 0;font-family:var(--font);font-size:10px;cursor:pointer">Del</button>
        </div>
      </div>`;
    });
  }
  html += `</div>`;
  el.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════
buildPalette();
renderCredsTab();
renderSavedTab();
updateGrid();
renderAllNodes();

// ── Auto-prompt to load a flow on startup ──
(function autoLoadPrompt() {
  setTimeout(() => {
    if (nodes.length > 0) return;

    // Build modal overlay
    const ov = document.createElement('div');
    ov.style.cssText = [
      'position:fixed','inset:0','background:#000000bb',
      'z-index:9000','display:flex','align-items:center','justify-content:center'
    ].join(';');

    ov.innerHTML = `
      <div style="background:#0d0d1a;border:1px solid #1e1e3a;border-radius:8px;padding:28px 32px;max-width:400px;width:90%;font-family:'JetBrains Mono','Courier New',monospace;box-shadow:0 0 60px rgba(0,212,255,0.15)">
        <div style="font-size:22px;margin-bottom:6px">◈</div>
        <div style="font-size:15px;font-weight:700;color:#00d4ff;letter-spacing:2px;margin-bottom:8px">FLOW BUILDER</div>
        <div style="font-size:11px;color:#475569;margin-bottom:24px;line-height:1.6">Load a saved flow configuration,<br>or start fresh and enter credentials manually.</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <button id="al-load" style="background:transparent;border:1px solid #00d4ff;color:#00d4ff;border-radius:5px;padding:10px 0;font-family:inherit;font-size:12px;cursor:pointer;transition:all 0.15s;letter-spacing:1px">
            📂  Load Flow (.json)
          </button>
          <button id="al-fresh" style="background:transparent;border:1px solid #1e1e3a;color:#475569;border-radius:5px;padding:10px 0;font-family:inherit;font-size:12px;cursor:pointer;transition:all 0.15s;letter-spacing:1px">
            Start Fresh
          </button>
        </div>
        <div id="al-err" style="margin-top:12px;font-size:10px;color:#ef4444;display:none"></div>
      </div>`;

    document.body.appendChild(ov);

    const loadBtn  = ov.querySelector('#al-load');
    const freshBtn = ov.querySelector('#al-fresh');
    const errEl    = ov.querySelector('#al-err');

    // Hover effects
    loadBtn.addEventListener('mouseenter',  () => { loadBtn.style.background  = 'rgba(0,212,255,0.08)'; });
    loadBtn.addEventListener('mouseleave',  () => { loadBtn.style.background  = 'transparent'; });
    freshBtn.addEventListener('mouseenter', () => { freshBtn.style.borderColor = '#475569'; freshBtn.style.color = '#e2e8f0'; });
    freshBtn.addEventListener('mouseleave', () => { freshBtn.style.borderColor = '#1e1e3a'; freshBtn.style.color = '#475569'; });

    function dismiss() { document.body.removeChild(ov); }

    // Load button — trigger hidden file input
    loadBtn.addEventListener('click', () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.style.display = 'none';
      document.body.appendChild(input);
      input.addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const flow = JSON.parse(ev.target.result);
            loadFlowObject(flow);
            dismiss();
            flashMsg('Flow loaded!', 'var(--cyan)');
          } catch {
            errEl.textContent = 'Invalid .json file — please try again.';
            errEl.style.display = 'block';
          }
        };
        reader.readAsText(file);
        document.body.removeChild(input);
      });
      input.addEventListener('cancel', () => { document.body.removeChild(input); });
      input.click();
    });

    // Start Fresh — just close
    freshBtn.addEventListener('click', dismiss);

  }, 300);
})();
</script>
