            <span style="font-size:7px;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:75%" title="${feat}">${sf}</span>
            <span style="font-size:7px;color:#f59e0b">${pct}%</span>
          </div>
          <div style="height:5px;background:#1e1e3a;border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${barW}%;background:linear-gradient(90deg,#f59e0b,${sectionColor});border-radius:3px"></div>
          </div>
        </div>`;
      });
      if (st.nEng > 0) {
        const ep=((st.engImpTotal||0)*100).toFixed(1), ew=((st.engImpTotal||0)/maxImp*100).toFixed(0);
        html+=`<div style="margin-top:4px;padding-top:4px;border-top:1px solid #1e1e3a">
          <div style="display:flex;justify-content:space-between;margin-bottom:1px">
            <span style="font-size:7px;color:#a855f7">interactions (${st.nEng})</span>
            <span style="font-size:7px;color:#a855f7">${ep}%</span>
          </div>
          <div style="height:5px;background:#1e1e3a;border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${ew}%;background:#a855f7;border-radius:3px"></div>
          </div>
        </div>`;
      }
      wrap.innerHTML = html;
      impGrid.appendChild(wrap);
    });
    secDiv.appendChild(impGrid);

    // ── Predicted vs Actual scatter ───────────────────────────────
    const scatLbl = document.createElement('div');
    scatLbl.style.cssText = 'color:#06b6d4;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px';
    scatLbl.textContent = 'Predicted vs Actual';
    secDiv.appendChild(scatLbl);

    const scatGrid = document.createElement('div');
    scatGrid.style.cssText = `display:grid;grid-template-columns:repeat(${Math.min(depVars.length,2)},1fr);gap:8px`;

    depVars.forEach(dv => {
      const st  = getStats(dv);
      const preds = predsMap[dv] || [];
      const wrap = document.createElement('div');
      wrap.style.cssText = 'background:#0a0a18;border:1px solid #1e1e3a;border-radius:6px;padding:8px';
      wrap.innerHTML = `<div style="color:#06b6d4;font-size:8px;font-weight:700;margin-bottom:4px">${dv}</div>
        <div style="display:flex;gap:10px;margin-bottom:4px">
          <span style="font-size:7px;color:#10b981">● Train</span>
          <span style="font-size:7px;color:#f59e0b">● Test</span>
        </div>`;
      const canvas = document.createElement('canvas');
      canvas.width=400; canvas.height=200;
      canvas.style.cssText='width:100%;height:200px;display:block';
      wrap.appendChild(canvas);
      scatGrid.appendChild(wrap);

      requestAnimationFrame(() => {
        const ctx = canvas.getContext('2d');
        const W=canvas.width, H=canvas.height, pad=30;
        const trainPts=[], testPts=[];
        const yCol = st.yCol || rfResults[dv]?.yCol;
        if (yCol && preds.length) {
          dataRF.forEach((_,i) => {
            const act=yCol[i], pred=preds[i];
            if (act==null||pred==null) return;
            (testSet.has(i)?testPts:trainPts).push({x:act,y:pred});
          });
        }
        const allPts=[...trainPts,...testPts];
        if (!allPts.length) { ctx.fillStyle='#0a0a18'; ctx.fillRect(0,0,W,H); return; }
        const xs=allPts.map(p=>p.x), ys=allPts.map(p=>p.y);
        const xMin=Math.min(...xs),xMax=Math.max(...xs);
        const yMin=Math.min(...ys),yMax=Math.max(...ys);
        const xR=xMax-xMin||1, yR=yMax-yMin||1;
        const toX=v=>pad+(v-xMin)/xR*(W-2*pad);
        const toY=v=>H-pad-(v-yMin)/yR*(H-2*pad);
        ctx.fillStyle='#0a0a18'; ctx.fillRect(0,0,W,H);
        ctx.strokeStyle='#1e1e3a'; ctx.lineWidth=0.5;
        for(let i=0;i<=4;i++){
          const x=pad+i*(W-2*pad)/4; ctx.beginPath();ctx.moveTo(x,pad);ctx.lineTo(x,H-pad);ctx.stroke();
          const y=pad+i*(H-2*pad)/4; ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(W-pad,y);ctx.stroke();
        }
        const lMin=Math.min(xMin,yMin),lMax=Math.max(xMax,yMax);
        ctx.strokeStyle='#334155';ctx.lineWidth=1;ctx.setLineDash([4,4]);
        ctx.beginPath();ctx.moveTo(toX(lMin),toY(lMin));ctx.lineTo(toX(lMax),toY(lMax));ctx.stroke();
        ctx.setLineDash([]);
        [[trainPts,'#10b981'],[testPts,'#f59e0b']].forEach(([pts,col])=>{
          ctx.fillStyle=col+'aa';
          pts.forEach(p=>{ctx.beginPath();ctx.arc(toX(p.x),toY(p.y),2.5,0,Math.PI*2);ctx.fill();});
        });
        ctx.fillStyle='#475569';ctx.font='7px monospace';ctx.textAlign='center';
        ctx.fillText(xMin.toFixed(2),pad,H-4);ctx.fillText(xMax.toFixed(2),W-pad,H-4);
        ctx.fillText('Actual →',W/2,H-4);
        ctx.save();ctx.translate(10,H/2);ctx.rotate(-Math.PI/2);ctx.fillText('Predicted',0,0);ctx.restore();
      });
    });
    secDiv.appendChild(scatGrid);
    return secDiv;
  }

  // ── Render Fresh section ──────────────────────────────────────────
  if (showFresh) {
    const freshPredsMap = {};
    depVars.forEach(dv => { freshPredsMap[dv] = rfResults[dv]?.preds || []; });
    const freshStats = dv => rfResults[dv] || {};
    body.appendChild(renderSection('🌱 Fresh Model', '#84cc16', freshPredsMap, freshStats));
  }

  // ── Render Stored section ─────────────────────────────────────────
  if (showStored && storedModel) {
    // Stored model: single overall R² against all current rows — no train/test split
    const storedStats = {};
    depVars.forEach(dv => {
      const sp  = storedPreds[dv] || [];
      const fr  = rfResults[dv]   || {};

      // Read per-dep-var registry (new structure).
      // Fall back to flat featureRegistry for legacy stored models.
      const dvReg = storedModel.featureRegistries?.[dv]
                 || storedModel.featureRegistry
                 || {};
      const importance = Object.fromEntries(
        Object.entries(dvReg)
          .filter(([,v]) => v.active !== false)
          .map(([k,v]) => [k, v.emaImp || 0])
      );

      storedStats[dv] = {
        overallR2: storedOverallR2[dv] ?? 0,
        nTrain: null, nTest: null,
        importance,
        nEng: 0, engImpTotal: null,
        baseFeats: storedModel.featureSet?.[dv] || [],
        yCol: fr.yCol, preds: sp,
        trainIdx: [...(fr.trainIdx||[]), ...(fr.testIdx||[])],
        testIdx: []
      };
    });
    const getStoredStats = dv => ({ ...storedStats[dv] });
    body.appendChild(renderSection(`🗄 Stored Model — ${storedModel.name} (${storedModel.runCount} runs, ${storedModel.totalSamples} samples)`, '#a855f7', storedPreds, getStoredStats));
  }

  modal.appendChild(hdr);
  modal.appendChild(body);
  ov.appendChild(modal);
  document.body.appendChild(ov);
}

// ── Alpaca API call per module ──
async function callModule(node, dryRun) {
  const def = MOD[node.moduleId];
  const cfg = configs[node.id] || {};
  const inputs = resolveInputs(node.id);
  const acct = accounts.find(a => a.id === activeAccountId);

  if (!acct || (!acct.key && !dryRun)) throw new Error('No active account credentials');

  const BASE = acct.env === 'live' ? 'https://api.alpaca.markets' : 'https://paper-api.alpaca.markets';
  const DATA = 'https://data.alpaca.markets';
  const headers = { 'APCA-API-KEY-ID': acct.key, 'APCA-API-SECRET-KEY': acct.secret };

  // Dry run: return mock shape
  if (dryRun) {
    await new Promise(r => setTimeout(r, 120 + Math.random()*200));
    const mock = {};
    def.out.forEach(k => { mock[k] = `[${k}]`; });
    return { _rows: [{...mock, _note:'dry run — no API call made'}], ...mock };
  }

  let url, params = new URLSearchParams();

  switch (node.moduleId) {
    case 'clock': {
      // Fetch current market clock from Alpaca
      const clockResp = await fetch(`${BASE}/v2/clock`, { headers });
      if (!clockResp.ok) throw new Error(`${clockResp.status} ${await clockResp.text()}`);
      const clockJson = await clockResp.json();

      // Determine offset in days
      // Unit → days conversion factors
      const unitToDays = { minutes: 1/1440, hours: 1/24, days: 1, weeks: 7, years: 365 };

      // Offset source: prefer connected input if available and offset_src is 'input'
      const offsetSrc = cfg.offset_src || 'input';
      const hasInputOffset = inputs.offset !== undefined && inputs.offset !== null;
      let offsetDays = 0;

      if (offsetSrc === 'input' && hasInputOffset) {
        // Input connection — value arrives as scalar number (days) or single-field row
        let rawVal = inputs.offset;
        if (Array.isArray(rawVal) && rawVal.length) rawVal = rawVal[0];
        if (typeof rawVal === 'object' && rawVal !== null) {
          // Single-field row — grab first numeric value
          rawVal = Object.values(rawVal).find(v => !isNaN(Number(v))) ?? 0;
        }
        const inputNum = Number(rawVal);
        // Input is treated as days directly (matches app's x-unit convention)
        offsetDays = isNaN(inputNum) ? 0 : inputNum;
      } else {
        // Manual entry — apply unit conversion
        const manualVal  = Number(cfg.offset_val  ?? 0);
        const unit       = cfg.offset_unit || 'days';
        offsetDays = manualVal * (unitToDays[unit] ?? 1);
      }

      // Apply offset to timestamp: subtract offsetDays from clock timestamp
      const clockTs   = clockJson.timestamp ? new Date(clockJson.timestamp) : new Date();
      const offsetMs  = offsetDays * 24 * 60 * 60 * 1000;
      const offsetTs  = new Date(clockTs.getTime() - offsetMs);

      // Preserve timezone suffix from original timestamp if present
      const origSuffix = typeof clockJson.timestamp === 'string'
        ? (clockJson.timestamp.match(/([+-]\d{2}:\d{2}|Z)$/) || ['Z'])[0] : 'Z';
      const pad = n => String(n).padStart(2,'0');
      const fmtTs = ts => {
        if (origSuffix === 'Z') return ts.toISOString();
        // Format with original offset suffix preserved
        return `${ts.getFullYear()}-${pad(ts.getMonth()+1)}-${pad(ts.getDate())}T` +
               `${pad(ts.getHours())}:${pad(ts.getMinutes())}:${pad(ts.getSeconds())}${origSuffix}`;
      };

      const shiftTs = ts => {
        if (!ts) return ts;
        const d = new Date(ts);
        if (isNaN(d.getTime())) return ts;
        return fmtTs(new Date(d.getTime() - offsetMs));
      };

      const outRow = {
        ...clockJson,
        timestamp:           fmtTs(offsetTs),
        timestamp_original:  clockJson.timestamp,
        next_open:           shiftTs(clockJson.next_open),
        next_open_original:  clockJson.next_open,
        next_close:          shiftTs(clockJson.next_close),
        next_close_original: clockJson.next_close,
        offset_days:         Math.round(offsetDays * 1e6) / 1e6
      };

      const clockRows = [outRow];
      configs[node.id]._headers = Object.keys(outRow).filter(k => !k.startsWith('_'));
      return { data: clockRows, _rows: clockRows };
    }
    case 'calendar': {
      url = `${BASE}/v2/calendar`;
      // Use ref input if connected (from clock or time_offset), otherwise use now
      let refDate;
      const refInput = inputs.ref;
      if (refInput) {
        // ref may be a string scalar, an array of rows, or a single row object
        if (typeof refInput === 'string') {
          refDate = new Date(refInput);
        } else if (Array.isArray(refInput) && refInput.length) {
          const r = refInput[0];
          const tsVal = typeof r === 'string' ? r
            : r.timestamp || r.next_open || r.next_close
            || Object.values(r).find(v => typeof v === 'string' && /\d{4}-\d{2}-\d{2}/.test(v));
          refDate = new Date(tsVal);
        } else if (typeof refInput === 'object' && refInput !== null) {
          const tsVal = refInput.timestamp || Object.values(refInput).find(v => typeof v === 'string' && /\d{4}-\d{2}-\d{2}/.test(v));
          refDate = new Date(tsVal);
        }
      }
      if (!refDate || isNaN(refDate.getTime())) refDate = new Date();
      const daysBack = Number(cfg.days_back ?? -365);
      const daysFwd  = Number(cfg.days_forward ?? 365);
      const calStart = new Date(refDate); calStart.setDate(calStart.getDate() + Math.min(daysBack, 0));
      const calEnd   = new Date(refDate); calEnd.setDate(calEnd.getDate() + Math.max(daysFwd, 0));
      params.set('start', calStart.toISOString().slice(0,10));
      params.set('end',   calEnd.toISOString().slice(0,10));
      break;
    }
    case 'assets':
      url = `${BASE}/v2/assets`;
      params.set('asset_class', cfg.asset_class||'us_equity');
      params.set('status', cfg.status||'active');
      break;
    case 'movers':
      url = `${DATA}/v1beta1/screener/${cfg.market_type||'stocks'}/movers`;
      params.set('top', cfg.top||20);
      break;
    case 'actives':
      url = `${DATA}/v1beta1/screener/${cfg.market_type||'stocks'}/most-actives`;
      params.set('top', cfg.top||20);
      break;
    case 'bars': {
      const rawSyms = inputs.symbols || [];
      // Accept: pre-joined string, array of strings, array of row objects
      let symStr;
      if (typeof rawSyms === 'string' && rawSyms.includes(',')) {
        symStr = rawSyms; // already joined by Collect block
      } else {
        const symArr = Array.isArray(rawSyms) ? rawSyms : [rawSyms];
        const symStrs = symArr.map(s => {
          if (typeof s === 'string') return s;
          if (s && typeof s === 'object') return s.symbol || s.value || Object.values(s)[0] || '';
          return String(s);
        }).filter(Boolean);
        symStr = symStrs.join(',');
      }
      const isCrypto = (cfg.asset_class || 'us_equity') === 'crypto';
      const maxRows = Number(cfg.limit || 10000);
      const barsBase = isCrypto ? `${DATA}/v1beta3/crypto/us/bars` : `${DATA}/v2/stocks/bars`;
      const barsParams = new URLSearchParams();
      barsParams.set('symbols', symStr);
      barsParams.set('timeframe', cfg.timeframe || '1D');
      barsParams.set('limit', Math.min(maxRows, 10000));
      if (!isCrypto) {
        barsParams.set('feed', cfg.feed || 'sip');
        barsParams.set('adjustment', cfg.adjustment || 'all');
      }
      if (inputs.start) barsParams.set('start', inputs.start);
      if (inputs.end)   barsParams.set('end', inputs.end);
      // Paginate through all pages up to maxRows
      let allBarsRows = [], nextPageToken = null;
      do {
        if (nextPageToken) barsParams.set('page_token', nextPageToken);
        const r = await fetch(`${barsBase}?${barsParams}`, { headers });
        if (!r.ok) throw new Error(`${r.status} ${await r.text()}`);
        const j = await r.json();
        const pageRows = extractRows(j).filter(r => r && typeof r === 'object' && !Array.isArray(r));
        allBarsRows = allBarsRows.concat(pageRows);
        nextPageToken = j.next_page_token || null;
      } while (nextPageToken && allBarsRows.length < maxRows);
      const processedBars = postProcessRows(allBarsRows);
      if (processedBars.length) configs[node.id]._headers = Object.keys(processedBars[0]).filter(k => !k.startsWith('_'));
      return { data: processedBars, _rows: processedBars };
    }
    case 'snapshots': {
      const rawSyms = inputs.symbols || [];
      let symStr;
      if (typeof rawSyms === 'string' && rawSyms.includes(',')) {
        symStr = rawSyms;
      } else {
        const symArr = Array.isArray(rawSyms) ? rawSyms : [rawSyms];
        const symStrs = symArr.map(s => {
          if (typeof s === 'string') return s;
          if (s && typeof s === 'object') return s.symbol || s.value || Object.values(s)[0] || '';
          return String(s);
        }).filter(Boolean);
        symStr = symStrs.join(',');
      }

      const isCrypto = (cfg.asset_class || 'us_equity') === 'crypto';
      const snapUrl = isCrypto ? `${DATA}/v1beta3/crypto/us/snapshots` : `${DATA}/v2/stocks/snapshots`;
      const snapParams = new URLSearchParams();
      snapParams.set('symbols', symStr);
      if (!isCrypto) snapParams.set('feed', cfg.feed||'sip');
      const r = await fetch(`${snapUrl}?${snapParams}`, { headers });
      if (!r.ok) throw new Error(`${r.status} ${await r.text()}`);
      const j = await r.json();
      const flatRows = postProcessRows(extractRows(j).filter(r => r && typeof r === 'object' && !Array.isArray(r)));
      if (flatRows.length) configs[node.id]._headers = Object.keys(flatRows[0]).filter(k => !k.startsWith('_'));
      return { data: flatRows, _rows: flatRows };
    }
    case 'watchlists':  url = `${BASE}/v2/watchlists`; break;
    case 'balances':    url = `${BASE}/v2/account`; break;
    case 'positions':   url = `${BASE}/v2/positions`; break;
    case 'open_orders': {
      // Paginate open orders
      let allOrders = []; let afterId = null;
      do {
        const op = new URLSearchParams({ status: cfg.status||'open', limit: '500' });
        if (afterId) op.set('after', afterId);
        const r = await fetch(`${BASE}/v2/orders?${op}`, { headers });
        if (!r.ok) throw new Error(`${r.status} ${await r.text()}`);
        const page = await r.json();
        if (!Array.isArray(page) || !page.length) break;
        allOrders = allOrders.concat(page);
        afterId = page.length === 500 ? page[page.length-1].id : null;
      } while (afterId);
      const flatOrders = allOrders.map(r => flattenObj(r)).filter(r => r && typeof r === 'object');
      if (flatOrders.length) configs[node.id]._headers = Object.keys(flatOrders[0]).filter(k => !k.startsWith('_'));
      return { data: flatOrders, _rows: flatOrders };
    }
    case 'activities': {
      // Alpaca activities supports page_token pagination
      let allActs = []; let pageToken = null;
      const actTypes = cfg.activity_types?.length ? cfg.activity_types.join(',') : 'FILL';
      do {
        const ap = new URLSearchParams({ activity_types: actTypes, page_size: '100' });
        if (pageToken) ap.set('page_token', pageToken);
        const r = await fetch(`${BASE}/v2/account/activities?${ap}`, { headers });
        if (!r.ok) throw new Error(`${r.status} ${await r.text()}`);
        const page = await r.json();
        if (!Array.isArray(page) || !page.length) break;
        allActs = allActs.concat(page);
        pageToken = page.length === 100 ? page[page.length-1].id : null;
      } while (pageToken);
      const flatActs = allActs.map(r => flattenObj(r)).filter(r => r && typeof r === 'object');
      if (flatActs.length) configs[node.id]._headers = Object.keys(flatActs[0]).filter(k => !k.startsWith('_'));
      return { data: flatActs, _rows: flatActs };
    }
    case 'portfolio_history':
      url = `${BASE}/v2/account/portfolio/history`;
      params.set('period', cfg.period||'1M');
      params.set('timeframe', cfg.timeframe||'1D');
      break;
    case 'write_watchlist': {
      const body = { name: inputs.name||'Flow Watchlist', symbols: inputs.symbols||[] };
      const resp = await fetch(`${BASE}/v2/watchlists`, { method:'POST', headers:{...headers,'Content-Type':'application/json'}, body: JSON.stringify(body) });
      if (!resp.ok) throw new Error(`${resp.status} ${await resp.text()}`);
      return await resp.json();
    }
    case 'write_order': {
      const body = { symbol: inputs.symbol, qty: inputs.qty, side: inputs.side||'buy', type: inputs.type||'market', time_in_force: cfg.time_in_force||'day' };
      if (inputs.limit_price) body.limit_price = String(inputs.limit_price);
      if (cfg.extended_hours) body.extended_hours = true;
      const resp = await fetch(`${BASE}/v2/orders`, { method:'POST', headers:{...headers,'Content-Type':'application/json'}, body: JSON.stringify(body) });
      if (!resp.ok) throw new Error(`${resp.status} ${await resp.text()}`);
      return await resp.json();
    }
    // Transforms and gates — compute locally
    case 'filter': {
      const raw = inputs.data || [];
      const data = Array.isArray(raw) ? raw : (raw ? [raw] : []);
      const { field, operator } = cfg;
      // Resolve value: sc::fieldname or manual entry
      const valueSrc = cfg.value_src || 'manual';
      let value = cfg.value || '';
      if (valueSrc.startsWith('sc::') && inputs.sc !== undefined) {
        const scField = valueSrc.slice(4);
        const scRows = inputs.sc;
        if (Array.isArray(scRows) && scRows.length) {
          value = String(scRows[0][scField] ?? '');
        } else if (scRows && typeof scRows === 'object' && !Array.isArray(scRows)) {
          value = String(scRows[scField] ?? '');
        } else if (typeof scRows === 'string') {
          value = scRows; // fallback if only a plain string arrived
        }
      }
      if (!field) return { data, _rows: data };
      // DEBUG: log first row comparison so we can see exact values
      if (data.length) {
        const _dbgV = data[0][field];
        console.log(`[filter] field="${field}" operator="${operator}" value="${value}" valueSrc="${valueSrc}" row[field]=${_dbgV} (${typeof _dbgV}) Number(row[field])=${Number(_dbgV)} Number(value)=${Number(value)}`);
      }
      const filtered = data.filter(row => {
        const v = row[field];
        const vStr = String(v ?? '');
        const vNum = Number(v);
        switch(operator) {
          case '==':      return vStr === String(value);
          case '!=':      return vStr !== String(value);
          case '>':       return !isNaN(vNum) && vNum > Number(value);
          case '<':       return !isNaN(vNum) && vNum < Number(value);
          case '>=':      return !isNaN(vNum) && vNum >= Number(value);
          case '<=':      return !isNaN(vNum) && vNum <= Number(value);
          case 'in':             return String(value).split(',').map(s=>s.trim()).includes(vStr);
          case 'not_in':         return !String(value).split(',').map(s=>s.trim()).includes(vStr);
          case 'starts_with':    return vStr.startsWith(String(value));
          case 'not_starts_with':return !vStr.startsWith(String(value));
          case 'ends_with':      return vStr.endsWith(String(value));
          case 'not_ends_with':  return !vStr.endsWith(String(value));
          case 'contains':       return vStr.includes(String(value));
          case 'not_contains':   return !vStr.includes(String(value));
          case 'is_true':  return v === true || v === 'true' || v === 1 || v === '1' || v === 'True';
          case 'is_false': return v === false || v === 'false' || v === 0 || v === '0' || v === 'False' || v === null || v === undefined || v === '';
          default: return true;
        }
      });
      // Propagate headers — use filtered rows if available, fall back to input schema
      const filteredHdrs = filtered.length ? Object.keys(filtered[0])
        : data.length ? Object.keys(data[0]) : [];
      configs[node.id]._headers = filteredHdrs.filter(k => !k.startsWith('_'));
      return { data: filtered, _rows: filtered };
    }
    case 'join': {
      // Normalize inputs: both left and right should be arrays of objects
      const normalizeInput = (inp) => {
        if (!inp) return [];
        if (!Array.isArray(inp)) return [inp];
        return inp.map(r => {
          if (r && typeof r === 'object' && !Array.isArray(r)) return r;
          if (typeof r === 'string') return { value: r };
          return { value: String(r) };
        });
      };
      const left = normalizeInput(inputs.left);
      const right = normalizeInput(inputs.right);
      const key = cfg.on || 'symbol';
      const how = cfg.how || 'inner';

      const rightMap = new Map();
      right.forEach(r => {
        const k = r[key];
        if (k !== undefined && k !== null) rightMap.set(String(k), r);
      });

      const joined = [];
      left.forEach(l => {
        const k = l[key];
        const r = k !== undefined ? rightMap.get(String(k)) : undefined;
        if (how === 'inner' && !r) return;
        joined.push({ ...l, ...(r || {}) });
      });

      // Also handle right/outer joins
      if (how === 'right' || how === 'outer') {
        const leftKeys = new Set(left.map(l => String(l[key])));
        right.forEach(r => {
          const k = String(r[key]);
          if (!leftKeys.has(k)) joined.push({ ...r });
        });
      }

      if (joined.length) configs[node.id]._headers = Object.keys(joined[0]).filter(k => !k.startsWith('_'));
      return { data: joined, _rows: joined };
    }
    case 'select_fields': {
      const raw = inputs.data || [];
      const data = Array.isArray(raw) ? raw : (raw ? [raw] : []);
      let fields;
      if (Array.isArray(cfg.fields) && cfg.fields.length) {
        fields = cfg.fields.filter(f => f.visible !== false).map(f => f.name);
      } else {
        fields = [];
      }
      if (!fields.length) {
        // Pass all through — propagate headers from input
        const hdrs = data.length ? Object.keys(data[0]).filter(k => !k.startsWith('_')) : [];
        configs[node.id]._headers = hdrs;
        return { data, _rows: data };
      }
      const result = data.map(row => {
        const out = {};
        fields.forEach(f => { out[f] = row[f] ?? null; });
        return out;
      });
      // Always set _headers to the selected field names so downstream dropdowns populate
      configs[node.id]._headers = fields;
      return { data: result, _rows: result };
    }
    case 'time_offset': {
      const raw = inputs.data || [];
      const dataRows = Array.isArray(raw) ? raw : (raw ? [raw] : []);
      const field = cfg.field || '';
      const amt = Number(cfg.amount || 0);
      const mult = { minutes:60000, hours:3600000, days:86400000, weeks:604800000 }[cfg.unit||'minutes'] || 60000;
      const roundMode = cfg.round || 'no_change';
      const roundUnit = cfg.round_unit || '1D';

      // Round-unit to milliseconds map
      const ROUND_MS = { '1T':60000,'5T':300000,'10T':600000,'20T':1200000,'30T':1800000,'1H':3600000,'2H':7200000,'4H':14400000,'8H':28800000,'12H':43200000,'1D':86400000 };
      const rms = ROUND_MS[roundUnit] || 86400000;

      // Extract tz suffix from sc sidechain if connected, otherwise from the timestamp itself
      const FALLBACK_TZ = '-04:00';
      let scTzSuffix = null;
      if (inputs.sc !== undefined) {
        const tzSrc = cfg.tz_field || 'manual';
        const scRows = inputs.sc;
        let scTsStr = null;
        if (tzSrc.startsWith('sc::')) {
          const scField = tzSrc.slice(4);
          if (Array.isArray(scRows) && scRows.length) scTsStr = String(scRows[0][scField] ?? '');
          else if (scRows && typeof scRows === 'object') scTsStr = String(scRows[scField] ?? '');
        } else if (typeof scRows === 'string') {
          scTsStr = scRows;
        } else if (Array.isArray(scRows) && scRows.length) {
          // No field specified — find first timestamp-looking value
          const firstRow = scRows[0];
          const tsKey = Object.keys(firstRow).find(k => typeof firstRow[k] === 'string' && /[+-]\d{2}:\d{2}$/.test(firstRow[k]));
          if (tsKey) scTsStr = firstRow[tsKey];
        }
        if (scTsStr) {
          const m = scTsStr.match(/([+-]\d{2}:\d{2}|Z)$/);
          if (m) scTzSuffix = m[1];
        }
        if (!scTzSuffix) scTzSuffix = FALLBACK_TZ;
      }

      function processTs(tsRaw) {
        if (!tsRaw) return null;
        const tsStr = String(tsRaw);
        // Use sc-derived tz suffix if available, otherwise parse from the timestamp itself
        const tzMatch = tsStr.match(/([+-]\d{2}:\d{2}|Z)$/);
        const tzSuffix = scTzSuffix || (tzMatch ? tzMatch[1] : '');


        const d = new Date(tsStr);
        if (isNaN(d.getTime())) return tsRaw; // not a parseable timestamp, pass through

        // Apply offset
        let ms = d.getTime() + amt * mult;

        // Apply rounding
        if (roundMode === 'round_down') {
          ms = Math.floor(ms / rms) * rms;
        } else if (roundMode === 'round_up') {
          ms = Math.ceil(ms / rms) * rms;
        }

        const result = new Date(ms);
        // Reconstruct ISO string preserving original tz suffix
        if (tzSuffix && tzSuffix !== 'Z') {
          // Format as local-like string with original offset appended
          const pad = n => String(n).padStart(2,'0');
          const iso = `${result.getUTCFullYear()}-${pad(result.getUTCMonth()+1)}-${pad(result.getUTCDate())}T${pad(result.getUTCHours())}:${pad(result.getUTCMinutes())}:${pad(result.getUTCSeconds())}${tzSuffix}`;
          return iso;
        }
        return result.toISOString();
      }

      // If a field is specified and we have rows, transform that field in-place on all rows
      if (field && dataRows.length) {
        const out = dataRows.map(row => ({ ...row, [field]: processTs(row[field]) }));
        if (out.length) configs[node.id]._headers = Object.keys(out[0]).filter(k=>!k.startsWith('_'));
        return { data: out, _rows: out };
      }

      // No rows / no field — try scalar timestamp inputs (from clock piped directly)
      // Clock output rows look like: [{timestamp:"2026-...-05:00", is_open:true, ...}]
      if (dataRows.length) {
        // No field specified — find first field that looks like a timestamp
        const firstRow = dataRows[0];
        const tsField = field || Object.keys(firstRow).find(k => {
          const v = String(firstRow[k]);
          return /\d{4}-\d{2}-\d{2}T/.test(v);
        }) || 'timestamp';
        const out = dataRows.map(row => ({ ...row, [tsField]: processTs(row[tsField]) }));
        if (out.length) configs[node.id]._headers = Object.keys(out[0]).filter(k=>!k.startsWith('_'));
        return { data: out, _rows: out };
      }

      // Absolute fallback — use current time
      const nowTs = processTs(new Date().toISOString());
      const fallback = [{ offset_timestamp: nowTs }];
      configs[node.id]._headers = ['offset_timestamp'];
      return { data: fallback, _rows: fallback };
    }
    case 'gate_and':      return { data:[{a:inputs.a, b:inputs.b, result:!!(inputs.a&&inputs.b)}],  _rows:[{a:inputs.a, b:inputs.b, result:!!(inputs.a&&inputs.b)}] };
    case 'gate_or':       return { data:[{a:inputs.a, b:inputs.b, result:!!(inputs.a||inputs.b)}],  _rows:[{a:inputs.a, b:inputs.b, result:!!(inputs.a||inputs.b)}] };
    case 'gate_nand':     return { data:[{a:inputs.a, b:inputs.b, result:!(inputs.a&&inputs.b)}],   _rows:[{a:inputs.a, b:inputs.b, result:!(inputs.a&&inputs.b)}] };
    case 'gate_nor':      return { data:[{a:inputs.a, b:inputs.b, result:!(inputs.a||inputs.b)}],   _rows:[{a:inputs.a, b:inputs.b, result:!(inputs.a||inputs.b)}] };
    case 'gate_xor':      return { data:[{a:inputs.a, b:inputs.b, result:!!(inputs.a)!==!!(inputs.b)}], _rows:[{a:inputs.a, b:inputs.b, result:!!(inputs.a)!==!!(inputs.b)}] };
    case 'gate_inverter': return { data:[{a:inputs.a, result:!inputs.a}], _rows:[{a:inputs.a, result:!inputs.a}] };
    case 'pearson_rsq': {
      const rawRSQ = inputs.data || [];
      const dataRSQ = Array.isArray(rawRSQ) ? rawRSQ : [];
      if (!dataRSQ.length) return { data: [], _rows: [] };

      const rsqCfg  = cfg.rsq || { dep: [], indep: [] };
      const depVars = (rsqCfg.dep || []).filter(Boolean);
      const indepVars = (rsqCfg.indep || []).filter(iv => iv.enabled !== false && iv.name);

      if (!depVars.length || !indepVars.length) return { data: [], _rows: [] };

      // Pearson R² between two numeric arrays (same length, skip pairs with NaN)
      function pearsonRSQ(xs, ys) {
        const pairs = xs.map((x, i) => [x, ys[i]]).filter(([x,y]) => !isNaN(x) && !isNaN(y) && x!==null && y!==null);
        const n = pairs.length;
        if (n < 2) return null;
        const mx = pairs.reduce((s,[x])=>s+x,0)/n;
        const my = pairs.reduce((s,[,y])=>s+y,0)/n;
        let num=0, dx2=0, dy2=0;
        pairs.forEach(([x,y]) => { num+=(x-mx)*(y-my); dx2+=(x-mx)**2; dy2+=(y-my)**2; });
        const denom = Math.sqrt(dx2*dy2);
        if (denom===0) return null;
        const r = num/denom;
        return Math.round(r*r*1e4)/1e4; // R²
      }

      // Extract column vectors
      const getCol = f => dataRSQ.map(r => { const v = Number(r[f]); return isNaN(v) ? null : v; });
      const depCols  = depVars.map(f => ({ name: f, vals: getCol(f) }));
      const indepCols = indepVars.map(iv => ({ name: iv.name, vals: getCol(iv.name) }));

      // Compute RSQ matrix: indep × dep
      const rsqMatrix = indepCols.map(iv => {
        const depRSQs = depCols.map(dv => pearsonRSQ(iv.vals, dv.vals));
        // Net RSQ: average of mean and median across dependent variables
        const valid = depRSQs.filter(v => v !== null);
        let netRSQ = null;
        if (valid.length) {
          const meanRSQ = valid.reduce((s,v)=>s+v,0)/valid.length;
          const sorted  = [...valid].sort((a,b)=>a-b);
          const medRSQ  = sorted.length%2===0
            ? (sorted[sorted.length/2-1]+sorted[sorted.length/2])/2
            : sorted[Math.floor(sorted.length/2)];
          netRSQ = Math.round(((meanRSQ+medRSQ)/2)*1e4)/1e4;
        }
        return { indep: iv.name, depRSQs, netRSQ };
      });

      // Sort descending by netRSQ
      rsqMatrix.sort((a,b) => {
        if (a.netRSQ===null && b.netRSQ===null) return 0;
        if (a.netRSQ===null) return 1;
        if (b.netRSQ===null) return -1;
        return b.netRSQ - a.netRSQ;
      });

      // Build output rows
      const outRSQ = rsqMatrix.map((row, ri) => {
        const r = { rank: ri+1, independent_variable: row.indep };
        depVars.forEach((dv, di) => { r[dv] = row.depRSQs[di]; });
        r['Net_RSQ'] = row.netRSQ;
        return r;
      });

      if (outRSQ.length) configs[node.id]._headers = Object.keys(outRSQ[0]).filter(k=>!k.startsWith('_'));
      return { data: outRSQ, _rows: outRSQ };
    }

    case 'mv_regression': {
      const p4 = v => Math.round(v * 1e4) / 1e4;
      const p6 = v => Math.round(v * 1e6) / 1e6;

      const rawMV  = inputs.data || [];
      const dataMV = Array.isArray(rawMV) ? rawMV : [];
      if (!dataMV.length) return { data: [], _rows: [] };

      // ── Resolve dep vars and feature order ───────────────────────────
      // If rsq input connected, read dep vars and ranked features from it.
      // rsq rows: { rank, independent_variable, <depVar1>, ..., Net_RSQ }
      const rsqRows = Array.isArray(inputs.rsq) ? inputs.rsq : [];
      let depVars, featuresOrdered;

      if (rsqRows.length) {
        // Auto-configure from pearson_rsq output
        // Dep vars = all column names except rank, independent_variable, Net_RSQ
        const skip = new Set(['rank','independent_variable','Net_RSQ']);
        depVars = Object.keys(rsqRows[0]).filter(k => !skip.has(k) && !k.startsWith('_'));
        // Features ordered by rank (ascending rank = descending Net_RSQ)
        featuresOrdered = [...rsqRows]
          .sort((a,b) => (a.rank||999) - (b.rank||999))
          .map(r => r.independent_variable)
          .filter(Boolean);
      } else {
        // Manual config
        const mvCfg = cfg.mv || { dep: [], indep: [] };
        depVars = (mvCfg.dep || []).filter(Boolean);
        featuresOrdered = (mvCfg.indep || [])
          .filter(iv => iv.enabled !== false && iv.name)
          .map(iv => iv.name);
      }

      if (!depVars.length || !featuresOrdered.length) return { data: dataMV.map(r=>({...r})), _rows: dataMV.map(r=>({...r})) };

      // ── Math helpers ──────────────────────────────────────────────────
      // Extract numeric column from dataMV, null for missing/NaN
      const getCol = f => dataMV.map(r => { const v = Number(r[f]); return isNaN(v) ? null : v; });

      // Pearson R² between two same-length arrays (skip nulls pairwise)
      function pearsonR2(xs, ys) {
        const pairs = xs.map((x,i)=>[x,ys[i]]).filter(([x,y])=>x!==null&&y!==null&&!isNaN(x)&&!isNaN(y));
        const n = pairs.length;
        if (n < 2) return 0;
        const mx = pairs.reduce((s,[x])=>s+x,0)/n;
        const my = pairs.reduce((s,[,y])=>s+y,0)/n;
        let num=0,dx2=0,dy2=0;
        pairs.forEach(([x,y])=>{num+=(x-mx)*(y-my);dx2+=(x-mx)**2;dy2+=(y-my)**2;});
        const denom = Math.sqrt(dx2*dy2);
        if (denom===0) return 0;
        const r = num/denom;
        return r*r;
      }

      // OLS via normal equations: β = (XᵀX)⁻¹Xᵀy
      // X includes intercept column. Returns null if singular.
      function ols(Xmat, y) {
        const n = y.length, k = Xmat[0].length;
        // XᵀX (k×k)
        const XtX = Array.from({length:k},()=>new Array(k).fill(0));
        for (let i=0;i<n;i++) for (let a=0;a<k;a++) for (let b=0;b<k;b++) XtX[a][b]+=Xmat[i][a]*Xmat[i][b];
        // Xᵀy (k×1)
        const Xty = new Array(k).fill(0);
        for (let i=0;i<n;i++) for (let a=0;a<k;a++) Xty[a]+=Xmat[i][a]*y[i];
        // Invert XᵀX via Gauss-Jordan
        const aug = XtX.map((row,i)=>[...row, ...Array.from({length:k},(_,j)=>i===j?1:0)]);
        for (let col=0;col<k;col++) {
          let pivot = -1, best = 0;
          for (let row=col;row<k;row++) if (Math.abs(aug[row][col])>best){best=Math.abs(aug[row][col]);pivot=row;}
          if (pivot<0||best<1e-12) return null; // singular
          [aug[col],aug[pivot]]=[aug[pivot],aug[col]];
          const sc = aug[col][col];
          for (let j=0;j<2*k;j++) aug[col][j]/=sc;
          for (let row=0;row<k;row++) {
            if (row===col) continue;
            const f = aug[row][col];
            for (let j=0;j<2*k;j++) aug[row][j]-=f*aug[col][j];
          }
        }
        const inv = aug.map(row=>row.slice(k));
        // β = inv × Xty
        return inv.map(row=>row.reduce((s,v,i)=>s+v*Xty[i],0));
      }

      // Build design matrix rows from dataMV using given feature list (with intercept col)
      function buildX(feats) {
        return dataMV.map(r => {
          const row = [1]; // intercept
          feats.forEach(f => { const v = Number(r[f]); row.push(isNaN(v)?0:v); });
          return row;
        });
      }

      // Compute predictions given coeff array [intercept, ...feats]
      function predict(feats, coeffs) {
        return dataMV.map(r => {
          let val = coeffs[0]; // intercept
          feats.forEach((f,i) => { const v = Number(r[f]); val += (isNaN(v)?0:v) * coeffs[i+1]; });
          return val;
        });
      }

      // ── Stepwise forward selection per dep var ────────────────────────
      // Result per dep var: { selectedFeats, coeffs, intercept, rsq }
      const modelResults = {};

      depVars.forEach(dv => {
        const yCol = getCol(dv);
        // Filter to rows where y is not null
        const validMask = yCol.map(v => v !== null);
        const yValid = yCol.filter((_,i) => validMask[i]);
        if (yValid.length < 3) { modelResults[dv] = { selectedFeats:[], coeffs:{}, intercept:0, rsq:0 }; return; }

        let selectedFeats = [];
        let currentR2 = 0;
        const droppedFeats = [];

        // Forward pass: add features in rank order
        for (const feat of featuresOrdered) {
          const candidate = [...selectedFeats, feat];
          const Xmat = buildX(candidate).filter((_,i) => validMask[i]);
          const coeffs = ols(Xmat, yValid);
          if (!coeffs) { droppedFeats.push(feat); continue; }
          const preds = predict(candidate, coeffs).filter((_,i) => validMask[i]);
          const r2 = pearsonR2(preds, yValid);
          if (r2 > currentR2 + 1e-6) {
            selectedFeats = candidate;
            currentR2 = r2;
          } else {
            droppedFeats.push(feat);
          }
        }

        // Second pass: retry dropped features with full selected set
        for (const feat of droppedFeats) {
          const candidate = [...selectedFeats, feat];
          const Xmat = buildX(candidate).filter((_,i) => validMask[i]);
          const coeffs = ols(Xmat, yValid);
          if (!coeffs) continue;
          const preds = predict(candidate, coeffs).filter((_,i) => validMask[i]);
          const r2 = pearsonR2(preds, yValid);
          if (r2 > currentR2 + 1e-6) {
            selectedFeats = candidate;
            currentR2 = r2;
          }
        }

        // Final OLS with selected features
        const finalXmat = buildX(selectedFeats).filter((_,i) => validMask[i]);
        const finalCoeffs = ols(finalXmat, yValid) || new Array(selectedFeats.length+1).fill(0);
        const intercept = finalCoeffs[0];
        const coeffMap = {};
        selectedFeats.forEach((f,i) => { coeffMap[f] = p6(finalCoeffs[i+1]); });
        // Zero out dropped features
        featuresOrdered.forEach(f => { if (!(f in coeffMap)) coeffMap[f] = 0; });

        modelResults[dv] = { selectedFeats, coeffMap, intercept: p6(intercept), rsq: p4(currentR2) };
      });

      // ── Build output rows ─────────────────────────────────────────────
      // Each row = original row + coeff columns + MV predictions + MV RSQ diagnostics
      const outMV = dataMV.map(r => {
        const outRow = { ...r };

        depVars.forEach(dv => {
          const { selectedFeats, coeffMap, intercept, rsq } = modelResults[dv] || { selectedFeats:[], coeffMap:{}, intercept:0, rsq:0 };

          // Add coefficient columns: coeff_<dv>_<feature>
          featuresOrdered.forEach(f => {
            outRow[`coeff_${dv}_${f}`] = coeffMap[f] ?? 0;
          });
          outRow[`coeff_${dv}_intercept`] = intercept;

          // MV prediction for this row
          let pred = intercept;
          selectedFeats.forEach(f => { const v = Number(r[f]); pred += (isNaN(v)?0:v) * (coeffMap[f]||0); });
          outRow[`MV_${dv}`] = p4(pred);

          // Overall model RSQ (same value on every row — diagnostic constant)
          outRow[`MV_RSQ_${dv}`] = rsq;
        });

        return outRow;
      });

      if (outMV.length) configs[node.id]._headers = Object.keys(outMV[0]).filter(k=>!k.startsWith('_'));
      return { data: outMV, _rows: outMV };
    }

    case 'rand_forest': {
      const p4 = v => Math.round(v * 1e4) / 1e4;
      const p6 = v => Math.round(v * 1e6) / 1e6;

      const rawRF  = inputs.data || [];
      const dataRF = Array.isArray(rawRF) ? rawRF : [];
      if (!dataRF.length) return { data: [], _rows: [] };

      // ── Seeded PRNG (Mulberry32) ──────────────────────────────────────
      const seedVal = Number(cfg.seed ?? 42);
      let _seed = seedVal >>> 0;
      function rng() {
        _seed += 0x6D2B79F5;
        let t = _seed;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      }
      function shuffle(arr) {
        for (let i = arr.length-1; i > 0; i--) {
          const j = Math.floor(rng() * (i+1));
          [arr[i],arr[j]] = [arr[j],arr[i]];
        }
        return arr;
      }
      function sample(arr, n) { // bootstrap sample with replacement
        return Array.from({length:n}, () => arr[Math.floor(rng()*arr.length)]);
      }

      // ── Resolve dep vars and features (same pattern as mv_regression) ──
      const rsqRows = Array.isArray(inputs.rsq) ? inputs.rsq : [];
      let depVars, featuresOrdered;
      if (rsqRows.length) {
        const skip = new Set(['rank','independent_variable','Net_RSQ']);
        depVars = Object.keys(rsqRows[0]).filter(k => !skip.has(k) && !k.startsWith('_'));
        featuresOrdered = [...rsqRows]
          .sort((a,b) => (a.rank||999) - (b.rank||999))
          .map(r => r.independent_variable).filter(Boolean);
      } else {
        const rfCfg = cfg.rf || { dep:[], indep:[] };
        depVars = (rfCfg.dep || []).filter(Boolean);
        featuresOrdered = (rfCfg.indep || []).filter(iv => iv.enabled!==false && iv.name).map(iv => iv.name);
      }
      if (!depVars.length || !featuresOrdered.length) return { data: dataRF.map(r=>({...r})), _rows: dataRF.map(r=>({...r})) };

      // ── Params ──────────────────────────────────────────────────────
      const nTrees       = parseInt(cfg.n_trees || '50');
      const maxDepth     = cfg.max_depth === 'unlimited' ? Infinity : parseInt(cfg.max_depth || '5');
      const minSamp      = parseInt(cfg.min_samples || '5');
      const testPct      = parseFloat((cfg.test_pct || '20%').replace('%','')) / 100;
      const featEng      = cfg.feat_eng !== false && cfg.feat_eng !== 'false';
      const maxThresh    = cfg.max_thresholds === 'All' ? Infinity : parseInt(cfg.max_thresholds || '20');
      const topNRaw      = cfg.top_feats === 'All' ? Infinity : parseInt(cfg.top_feats || '10');
      const modelName    = (cfg.model_name || '').trim();
      const modelMode    = cfg.model_mode || 'New';  // 'New' | 'Both' | 'Stored'
      const maxStoredTrees = parseInt(cfg.max_stored_trees || '100');
      const impPruneThr  = cfg.imp_prune_thr === 'Off' ? 0 : parseFloat((cfg.imp_prune_thr||'1%').replace('%',''))/100;

      // ── Load stored model (if named and mode is Both or Stored) ──────
      const registry = rfGetRegistry();
      // Replace = train fresh (same as New) but wipe the stored model first before saving
      const effectiveMode = modelMode === 'Replace' ? 'New' : modelMode;
      if (modelMode === 'Replace' && modelName && registry[modelName]) {
        delete registry[modelName];
      }
      const storedModel = (modelName && (effectiveMode === 'Both' || effectiveMode === 'Stored'))
        ? (registry[modelName] || null) : null;

      // ── Per-dep-var feature sets ──────────────────────────────────────
      // Each dep var gets: top N overall (by Net_RSQ rank) UNION top N for that specific dep var.
      // This ensures dep-var-specific strong predictors are never excluded.
      const overallTopFeats = topNRaw < Infinity ? featuresOrdered.slice(0, topNRaw) : featuresOrdered;

      // Build per-dep-var ranked feature list from rsqRows (if available)
      // rsqRows columns: rank, independent_variable, <dv1>, <dv2>..., Net_RSQ
      function getDepVarFeats(dv) {
        if (!rsqRows.length) return overallTopFeats;
        const ranked = [...rsqRows]
          .filter(r => r.independent_variable && r[dv] !== undefined && r[dv] !== null)
          .sort((a,b) => (b[dv]||0) - (a[dv]||0))
          .map(r => r.independent_variable);
        const dvTop = topNRaw < Infinity ? ranked.slice(0, topNRaw) : ranked;
        // Union: overall top + dep-var-specific top, preserving overall rank order first
        const union = [...overallTopFeats];
        dvTop.forEach(f => { if (!union.includes(f)) union.push(f); });
        return union;
      }

      // ── Feature Engineering helper (per feature set) ─────────────────
      const getNum = (row, f) => { const v = Number(row[f]); return isNaN(v) ? 0 : v; };

      function buildFeatContext(baseFeats) {
        const engFeatNames = [];
        if (featEng && baseFeats.length >= 2) {
          const topBase = baseFeats.slice(0, Math.min(5, baseFeats.length));
          for (let i = 0; i < topBase.length; i++)
            for (let j = i+1; j < topBase.length; j++) {
              engFeatNames.push(`__eng_mul_${i}_${j}`);
              engFeatNames.push(`__eng_div_${i}_${j}`);
            }
        }
        const allFeats = [...baseFeats, ...engFeatNames];
        const topBase5 = baseFeats.slice(0, Math.min(5, baseFeats.length));
        function rowToVec(row) {
          const base = baseFeats.map(f => getNum(row, f));
          if (!featEng || topBase5.length < 2) return base;
          const eng = [];
          for (let i = 0; i < topBase5.length; i++)
            for (let j = i+1; j < topBase5.length; j++) {
              eng.push(base[i] * base[j]);
              eng.push(base[j] !== 0 ? base[i] / base[j] : 0);
            }
          return [...base, ...eng];
        }
        const Xmat = dataRF.map(r => rowToVec(r));
        return { allFeats, engFeatNames, Xmat, nFeats: allFeats.length };
      }

      // Placeholder — will be set per dep var inside the forEach
      let Xall = [], nFeats = 0;

      // ── Train/test split ─────────────────────────────────────────────
      const indices = shuffle(Array.from({length:dataRF.length}, (_,i) => i));
      const nTest = Math.max(1, Math.round(dataRF.length * testPct));
      const testSet  = new Set(indices.slice(0, nTest));
      const trainIdx = indices.slice(nTest);
      const testIdx  = indices.slice(0, nTest);

      // ── CART decision tree (regression) ──────────────────────────────
      // Returns a tree node: { feat, thresh, left, right } or { val } for leaves
      function variance(ys) {
        if (!ys.length) return 0;
        const m = ys.reduce((s,v)=>s+v,0)/ys.length;
        return ys.reduce((s,v)=>s+(v-m)**2,0)/ys.length;
      }
      function mean(ys) { return ys.length ? ys.reduce((s,v)=>s+v,0)/ys.length : 0; }

      function bestSplit(rows, ys, featSubset, X) {
        let bestGain = 0, bestFeat = -1, bestThresh = 0;
        const parentVar = variance(ys) * ys.length;
        for (const fi of featSubset) {
          const vals = rows.map(r => X[r][fi]);
          let candidates = [...new Set(vals)].sort((a,b)=>a-b);
          if (maxThresh < Infinity && candidates.length > maxThresh) {
            const step = (candidates.length - 1) / (maxThresh - 1);
            candidates = Array.from({length: maxThresh}, (_,i) => candidates[Math.round(i * step)]);
          }
          for (let t = 0; t < candidates.length - 1; t++) {
            const thresh = (candidates[t] + candidates[t+1]) / 2;
            const leftY=[], rightY=[];
            vals.forEach((v,i) => (v<=thresh ? leftY : rightY).push(ys[i]));
            if (!leftY.length || !rightY.length) continue;
            const gain = parentVar - (variance(leftY)*leftY.length + variance(rightY)*rightY.length);
            if (gain > bestGain) { bestGain=gain; bestFeat=fi; bestThresh=thresh; }
          }
        }
        return { feat:bestFeat, thresh:bestThresh, gain:bestGain };
      }

      function buildTree(rows, ys, depth, impurityAccum, X, nF) {
        if (rows.length < minSamp || depth >= maxDepth || new Set(ys).size === 1) {
          return { val: mean(ys), n: rows.length };
        }
        const k = Math.max(1, Math.round(Math.sqrt(nF)));
        const featSubset = shuffle(Array.from({length:nF},(_,i)=>i)).slice(0, k);
        const { feat, thresh, gain } = bestSplit(rows, ys, featSubset, X);
        if (feat < 0 || gain <= 0) return { val: mean(ys), n: rows.length };
        if (impurityAccum) impurityAccum[feat] = (impurityAccum[feat] || 0) + gain;
        const leftRows=[], leftY=[], rightRows=[], rightY=[];
        rows.forEach((r,i) => {
          if (X[r][feat] <= thresh) { leftRows.push(r); leftY.push(ys[i]); }
          else { rightRows.push(r); rightY.push(ys[i]); }
        });
        return {
          feat, thresh, n: rows.length,
          left:  buildTree(leftRows,  leftY,  depth+1, impurityAccum, X, nF),
          right: buildTree(rightRows, rightY, depth+1, impurityAccum, X, nF)
        };
      }

      function predictTree(tree, rowIdx, X) {
        if ('val' in tree) return tree.val;
        return X[rowIdx][tree.feat] <= tree.thresh
          ? predictTree(tree.left,  rowIdx, X)
          : predictTree(tree.right, rowIdx, X);
      }

      // ── Pearson R² ───────────────────────────────────────────────────
      function pearsonR2(xs, ys) {
        const pairs = xs.map((x,i)=>[x,ys[i]]).filter(([x,y])=>x!==null&&y!==null&&!isNaN(x)&&!isNaN(y));
        const n = pairs.length;
        if (n < 2) return 0;
        const mx = pairs.reduce((s,[x])=>s+x,0)/n;
        const my = pairs.reduce((s,[,y])=>s+y,0)/n;
        let num=0,dx2=0,dy2=0;
        pairs.forEach(([x,y])=>{num+=(x-mx)*(y-my);dx2+=(x-mx)**2;dy2+=(y-my)**2;});
        const denom = Math.sqrt(dx2*dy2);
        if (denom===0) return 0;
        const r = num/denom;
        return r*r;
      }

      // ── Train a forest per dep var ────────────────────────────────────
      const rfResults = {};

      depVars.forEach(dv => {
        // ── Build this dep var's own feature set (overall top ∪ dv-specific top) ──
        const dvBaseFeats = getDepVarFeats(dv);
        const { allFeats: dvAllFeats, engFeatNames: dvEngFeats, Xmat: dvX, nFeats: dvNF } = buildFeatContext(dvBaseFeats);

        const yCol = dataRF.map(r => { const v = Number(r[dv]); return isNaN(v) ? null : v; });

        const trainRowsFull = trainIdx.filter(i => yCol[i] !== null);
        const testRowsFull  = testIdx.filter(i  => yCol[i] !== null);
        if (trainRowsFull.length < minSamp) {
          rfResults[dv] = { preds: dataRF.map(()=>null), trainR2:0, testR2:0, importance:{}, baseFeats: dvBaseFeats, nEng: dvEngFeats.length, nTrain: trainRowsFull.length, nTest: testRowsFull.length };
          return;
        }

        const impurityAccum = new Array(dvNF).fill(0);
        const forestPreds   = new Array(dataRF.length).fill(0);
        const forestCount   = new Array(dataRF.length).fill(0);
        const forest        = []; // collect tree roots for storage

        for (let t = 0; t < nTrees; t++) {
          const bootIdx = sample(trainRowsFull, trainRowsFull.length);
          const bootY   = bootIdx.map(i => yCol[i]);
          const tree    = buildTree(bootIdx, bootY, 0, impurityAccum, dvX, dvNF);
          forest.push(tree); // save root for storage
          for (let i = 0; i < dataRF.length; i++) {
            if (yCol[i] !== null) {
              forestPreds[i] += predictTree(tree, i, dvX);
              forestCount[i]++;
            }
          }
        }

        const preds = forestPreds.map((s,i) => forestCount[i] > 0 ? s/forestCount[i] : null);

        const trainPreds = trainRowsFull.map(i => preds[i]);
        const trainActs  = trainRowsFull.map(i => yCol[i]);
        const testPreds  = testRowsFull.map(i  => preds[i]);
        const testActs   = testRowsFull.map(i  => yCol[i]);
        const trainR2    = p4(pearsonR2(trainPreds, trainActs));
        const testR2     = p4(pearsonR2(testPreds,  testActs));

        // Normalize importance — base feats only (exclude engineered internals)
        const totalImp = impurityAccum.reduce((s,v)=>s+v,0) || 1;
        const importance = {};
        dvBaseFeats.forEach((f,i) => { importance[f] = p6(impurityAccum[i] / totalImp); });
        const engImpTotal = p6(dvEngFeats.reduce((s,_,i) => s + (impurityAccum[dvBaseFeats.length+i]||0), 0) / totalImp);

        rfResults[dv] = {
          preds, trainR2, testR2, importance,
          baseFeats: dvBaseFeats, allFeats: dvAllFeats, nEng: dvEngFeats.length, engImpTotal,
          nTrain: trainRowsFull.length, nTest: testRowsFull.length,
          trainIdx: trainRowsFull, testIdx: testRowsFull,
          yCol,
          trees: forest  // save actual trained tree roots for storage
        };
      });

      // ── Stored model inference (if mode = Both or Stored) ────────────
      // Run stored trees on current data — pure inference, no training.
      // Stored trees may reference features via index into their original featureSet.
      // If a feature is missing from current data, treat that node as a leaf.
      const storedPreds = {}; // dv → array of predictions per row

      if (storedModel) {
        depVars.forEach(dv => {
          const storedTrees = storedModel.trees?.[dv] || [];
          if (!storedTrees.length) return;

          // storedFeats is the full allFeats list (base + engineered) saved at training time.
          // We must rebuild the Xmat using buildFeatContext so engineered interaction
          // features (cx*OA, cx^2 etc) are computed properly — they don't exist as named
          // columns on data rows and cannot be looked up by field name.
          const storedBaseFeats = storedModel.baseFeatureSet?.[dv]
                                || storedModel.featureSet?.[dv]
                                || overallTopFeats;
          const { Xmat: Xstored } = buildFeatContext(storedBaseFeats);

          // Index-based tree traversal — identical to predictTree used during training
          function inferStoredTree(node, rowIdx) {
            if ('val' in node) return node.val;
            const v = Xstored[rowIdx]?.[node.feat] ?? 0;
            return v <= node.thresh
              ? inferStoredTree(node.left,  rowIdx)
              : inferStoredTree(node.right, rowIdx);
          }

          // Weighted average across stored trees
          const totalWeight = storedTrees.reduce((s,t) => s+(t.weight||1), 0) || 1;
          const preds = new Array(dataRF.length).fill(0);
          storedTrees.forEach(({ weight, nodes: treeRoot }) => {
            const w = (weight||1) / totalWeight;
            for (let i = 0; i < dataRF.length; i++) {
              preds[i] += inferStoredTree(treeRoot, i) * w;
            }
          });
          storedPreds[dv] = preds;
        });
      }

      // ── Compute stored model overall R² (no train/test split — no leakage risk) ──
      // Single R² against all current rows where y is not null.
      const storedOverallR2 = {}; // dv → R²
      if (storedModel) {
        depVars.forEach(dv => {
          const sp   = storedPreds[dv] || [];
          const yCol = dataRF.map(r => { const v = Number(r[dv]); return isNaN(v) ? null : v; });
          const pairs = dataRF.map((_,i) => [sp[i], yCol[i]])
            .filter(([p,a]) => p != null && a != null);
          if (pairs.length < 2) { storedOverallR2[dv] = 0; return; }
          const mx = pairs.reduce((s,[p])=>s+p,0)/pairs.length;
          const my = pairs.reduce((s,[,a])=>s+a,0)/pairs.length;
          let num=0,dx2=0,dy2=0;
          pairs.forEach(([p,a])=>{num+=(p-mx)*(a-my);dx2+=(p-mx)**2;dy2+=(a-my)**2;});
          const denom=Math.sqrt(dx2*dy2);
          storedOverallR2[dv] = denom ? p4((num/denom)**2) : 0;
        });
      }

      const nCurrent = dataRF.length; // row count for this run — used in model storage
      // ── Blend fresh + stored predictions — weighted by R² test performance ──
      // Each dep var gets its own weights based on its own test R² (fresh) vs overall R² (stored).
      // Better-performing model gets proportionally more weight. Floor at 0.01 to avoid zero-weight.
      const dvWeights = {}; // dv → { freshW, storedW }
      depVars.forEach(dv => {
        if (effectiveMode === 'New')    { dvWeights[dv] = { freshW:1, storedW:0 }; return; }
        if (effectiveMode === 'Stored') { dvWeights[dv] = { freshW:0, storedW:1 }; return; }
        const fr2 = Math.max(0.01, rfResults[dv]?.testR2  || 0.01);
        const sr2 = Math.max(0.01, storedOverallR2[dv]    || 0.01);
        const total = fr2 + sr2;
        dvWeights[dv] = { freshW: p4(fr2/total), storedW: p4(sr2/total) };
      });

      // Scalar blend weights for dashboard display — average across dep vars
      const freshW  = p4(depVars.reduce((s,dv)=>s+(dvWeights[dv]?.freshW||0),0)  / depVars.length);
      const storedW = p4(depVars.reduce((s,dv)=>s+(dvWeights[dv]?.storedW||0),0) / depVars.length);

      const finalPreds = {}; // dv → blended predictions
      depVars.forEach(dv => {
        const { freshW: fw, storedW: sw } = dvWeights[dv];
        const fp = rfResults[dv]?.preds || new Array(dataRF.length).fill(null);
        const sp = storedPreds[dv]      || new Array(dataRF.length).fill(null);
        finalPreds[dv] = dataRF.map((_, i) => {
          const fv = fp[i], sv = sp[i];
          if (effectiveMode === 'Stored') return sv ?? null;
          if (effectiveMode === 'New')    return fv ?? null;
          if (fv !== null && sv !== null) return p4(fv * fw + sv * sw);
          return fv ?? sv ?? null;
        });
      });

      // ── Update stored model ───────────────────────────────────────────
      if (modelName && effectiveMode !== 'Stored') {
        const existing = registry[modelName] || {
          name: modelName, runCount: 0, totalSamples: 0,
          trees: {}, featureSet: {}, featureRegistry: {}, depVars: []
        };

        const newTotalSamples = existing.totalSamples + nCurrent;
        const newRunCount     = existing.runCount + 1;

        // Merge trees per dep var
        const mergedTrees = { ...existing.trees };
        depVars.forEach(dv => {
          const freshRes = rfResults[dv];
          if (!freshRes || freshRes.trainR2 === 0) return;
          const dvBaseFeats = freshRes.baseFeats || overallTopFeats;

          // Save the ACTUAL trained trees directly — do NOT re-grow.
          // Re-growing with a different seed produces a different ensemble that
          // cannot match the performance of the original trained forest.
          // We save up to perDvMax trees from the already-trained forest,
          // selecting the ones that contributed most (all equal weight so just take first N).
          const perDvMax = Math.max(5, Math.floor(maxStoredTrees / depVars.length));

          // freshRes.trees holds the actual trained tree roots — saved during training below.
          // Each stored tree gets the full allFeats list (including engineered interactions)
          // so that node.feat indices resolve correctly during inference.
          const trainedTrees = freshRes.trees || [];
          const treesToStore = trainedTrees.slice(0, perDvMax);
          const treeWeight = freshRes.testR2 || 0.01;
          const newStorageTrees = treesToStore.map(treeRoot => ({
            weight: treeWeight,
            samples: nCurrent,
            testR2: freshRes.testR2,
            nodes: treeRoot
          }));

          // Merge with existing trees, re-weight existing by their sample proportion
          const existingTrees = (existing.trees[dv] || []).map(t => ({
            ...t,
            weight: (t.samples / newTotalSamples) * (t.testR2 || 0.01)
          }));

          // Combine and prune to perDvMax by keeping highest-weight trees
          let combined = [...existingTrees, ...newStorageTrees];
          combined.sort((a,b) => b.weight - a.weight);
          combined = combined.slice(0, perDvMax);
          mergedTrees[dv] = combined;
        });

        // Update feature registry — one independent registry per dep var
        // This ensures each model's feature importances are tracked separately
        // and not collapsed into a shared ranking that looks identical across models.
        const alpha = 0.3; // EMA smoothing — 30% weight to latest run
        const newRegistries = { ...(existing.featureRegistries || {}) };

        // Migrate legacy flat featureRegistry to per-dv structure on first run
        if (existing.featureRegistry && !existing.featureRegistries) {
          depVars.forEach(dv => {
            if (!newRegistries[dv]) newRegistries[dv] = { ...existing.featureRegistry };
          });
        }

        depVars.forEach(dv => {
          const imp     = rfResults[dv]?.importance || {};
          const dvReg   = { ...(newRegistries[dv] || {}) };
          Object.entries(imp).forEach(([f, v]) => {
            const prev   = dvReg[f] || { emaImp: 0, runs: 0, active: true };
            const newEma = prev.runs === 0 ? v : prev.emaImp * (1-alpha) + v * alpha;
            dvReg[f] = {
              emaImp: p6(newEma),
              runs:   prev.runs + 1,
              active: newEma >= impPruneThr || prev.runs < 3
            };
          });
          newRegistries[dv] = dvReg;
        });

        // featureSet stores the BASE features (input to buildFeatContext) per dep var.
        // During inference we call buildFeatContext(baseFeats) to rebuild the full Xmat
        // including engineered interactions — this ensures node.feat indices resolve correctly.
        const newFeatureSet = { ...existing.featureSet };
        const newBaseFeatureSet = { ...(existing.baseFeatureSet || {}) };
        depVars.forEach(dv => {
          newFeatureSet[dv]     = rfResults[dv]?.allFeats   || rfResults[dv]?.baseFeats || overallTopFeats;
          newBaseFeatureSet[dv] = rfResults[dv]?.baseFeats  || overallTopFeats;
        });

        registry[modelName] = {
          name: modelName,
          runCount: newRunCount,
          totalSamples: newTotalSamples,
          updated: new Date().toISOString(),
          depVars: [...new Set([...(existing.depVars||[]), ...depVars])],
          trees: mergedTrees,
          featureSet: newFeatureSet,
          baseFeatureSet: newBaseFeatureSet,
          featureRegistries: newRegistries
        };

        // Ensure global registry is stored so it persists with flow save
        configs['__rf_models__'] = registry;
      }

      // ── Build output rows — only RF predictions + train/test flag ────
      const outRF = dataRF.map((r, i) => {
        const outRow = { ...r };
        outRow['RF_train_test'] = testSet.has(i) ? 'test' : 'train';
        depVars.forEach(dv => {
          outRow[`RF_${dv}`] = finalPreds[dv]?.[i] !== null && finalPreds[dv]?.[i] !== undefined
            ? p4(finalPreds[dv][i]) : null;
        });
        return outRow;
      });

      // ── Auto-popup RF dashboard ───────────────────────────────────────
      openRFDashboard(rfResults, depVars, dataRF, testSet, storedModel, storedPreds, storedOverallR2, dvWeights, effectiveMode, freshW, storedW);

      if (outRF.length) configs[node.id]._headers = Object.keys(outRF[0]).filter(k=>!k.startsWith('_'));
      return { data: outRF, _rows: outRF };
    }

    case 'dp_precision': {
      const rows = Array.isArray(inputs.data) ? inputs.data : (inputs.data ? [inputs.data] : []);
      const processed = applyPrecisionToRows(rows);
      return { data: processed, _rows: processed };
    }
    case 'symbol_intersect': {
      const field = cfg.field||'symbol';
      const candidates = Array.isArray(inputs.candidates) ? inputs.candidates : [];
      const whitelist  = Array.isArray(inputs.whitelist)  ? inputs.whitelist  : [];
      const allowed = new Set(whitelist.map(r => String(typeof r==='object'?r[field]:r)));
      const result = candidates.filter(r => allowed.has(String(typeof r==='object'?r[field]:r)));
      return { data: result, _rows: result };
    }
    case 'multi_filter': {
      const rawMf = inputs.data || inputs.filtered_data || inputs.joined_data || [];
      const data = Array.isArray(rawMf) ? rawMf : (rawMf ? [rawMf] : []);
      const conditions = Array.isArray(cfg.conditions) ? cfg.conditions : [];
      const logic = cfg.logic||'AND';
      const evalCond = (row, cond) => {
        const {field, op, value_src} = cond;
        let value = cond.value || '';
        if (value_src && value_src.startsWith('sc::') && inputs.sc !== undefined) {
          const scField = value_src.slice(4);
          const scRows = inputs.sc;
          if (Array.isArray(scRows) && scRows.length) {
            value = String(scRows[0][scField] ?? '');
